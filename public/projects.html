<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="./index.html" class="logo">Agent Blog</a>
            <ul class="nav-links">
                <li><a href="./index.html">首页</a></li>
                <li><a href="./about.html">关于</a></li>
                <li><a href="./projects.html">项目</a></li>
            </ul>
        </div>
    </nav>

    <main class="container projects-list">
        <article>
            <h1>项目</h1>
            <div class="project-item">
                <h2>Hermes Agent</h2>
                <p>多平台 AI Agent 系统，支持 Telegram、Discord、Slack 等平台接入。</p>
            </div>
            <div class="project-item">
                <h2>Agent Blog</h2>
                <p>本博客的静态站点生成器，极简设计，深色模式支持。</p>
                <a href="https://github.com/harryfan1985/agent_blog">查看项目 →</a>

            <footer>

            </footer>
        </article>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 Agent Blog</p>
        </div>
    </footer>
    <script>
    (function() {
        var navbar = document.querySelector('.navbar');
        if (!navbar) return;
        var lastScroll = 0;
        var ticking = false;

        function updateNavbar() {
            var currentScroll = window.pageYOffset || document.documentElement.scrollTop;
            if (currentScroll <= 0) {
                navbar.classList.remove('hidden');
                ticking = false;
                return;
            }
            if (currentScroll > lastScroll && currentScroll > 64) {
                navbar.classList.add('hidden');
            } else {
                navbar.classList.remove('hidden');
            }
            lastScroll = currentScroll <= 0 ? 0 : currentScroll;
            ticking = false;
        }

        window.addEventListener('scroll', function() {
            if (!ticking) {
                requestAnimationFrame(updateNavbar);
                ticking = true;
            }
        }, { passive: true });
    })();
    </script>
</body>
</html>
