- title: Diversity Collapse in Multi-Agent LLM Systems 深度解读：群体智能为何走向创意枯竭
  date: April 28, 2026
  excerpt: 多智能体系统被寄予厚望能拓宽创意探索空间，但这项 ACL 2026 Findings 研究揭示了一个反直觉的现象：智能体间的交互反而会加速多样性崩溃。三个层级（模型、认知、系统）全面崩塌的根因是什么？
  content: '<p><img src="/images/diversity-collapse-in-multiagent-llm-systems/cover.png" alt="Diversity Collapse in Multi-Agent LLM Systems 深度解读" style="max-width:100%;border-radius:8px;margin:1rem 0;"></p><p>多智能体系统（Multi-Agent
    Systems, MAS）被广泛视为解锁更强创意能力的钥匙——多个 Agent 互相讨论、碰撞观点，理论上应该产生比单一 Agent 更丰富的创意输出。但来自多所高校的研究者（Chen Nuo, Tong Yicheng, Yang Yuzhe 等，ACL 2026 Findings）在最新论文中揭示了一个令人不安的现象：<strong>智能体间的交互反而会加速多样性崩溃</strong>，而且问题出在交互结构本身，而非模型能力不足。</p>


    <h2>一、核心发现：三个层级的多样性崩塌</h2>


    <p>研究者从底向上逐层分析，识别出三条崩塌链路：</p>


    <h3>1. 模型层级：计算效率悖论</h3>


    <p>更强大、更高对齐程度的模型（如 GPT-4、Claude 级别），在<strong>每个样本质量</strong>上显著超越小模型，但在<strong>边际多样性</strong>上反而更差。这就是「计算效率悖论」：强模型推理质量高，但输出倾向于收敛到相似的正确答案，反而减少了创意空间。</p>


    <p>本质原因：对齐训练（RLHF/PPO）让模型更倾向于生成「人类偏好答案」，而高人类偏好 = 高收敛性 = 低多样性。</p>


    <h3>2. 认知层级：权威压制语义多样性</h3>


    <p>研究比较了「权威主导组」（authority-dominated）与「新人主导组」（junior-dominated）的创意输出差异。结果：</p>


    <blockquote><strong>权威主导组语义多样性显著低于新人主导组。</strong></blockquote>


    <p>当团队中存在「权威 Agent」（通常由更强的模型扮演），其他 Agent 会倾向于<strong>服从而非反驳</strong>，即使被明确指示要发散思维。这种认知层面的从众效应与人类社会心理学中的「权威效应」高度吻合。</p>


    <h3>3. 系统层级：规模效应递减 + 通信拓扑加速收敛</h3>


    <p>增加智能体数量带来的边际收益快速递减。更关键的是，<strong>密集的通信拓扑</strong>（如全连接网络）反而比稀疏拓扑更容易导致「过早收敛」——智能体们在还没有充分探索解空间时就达成了一致。</p>


    <h2>二、核心概念：结构耦合（Structural Coupling）</h2>


    <p>研究者将上述现象统一命名为「<strong>结构耦合</strong>」：智能体在交互过程中，交互结构本身（谁与谁通信、频率如何）会无意中收缩每个智能体的探索空间，触发多样性崩溃。</p>


    <p>关键洞察：<strong>崩溃的根因是交互结构，而非模型本身的不够强</strong>。即使换成更强的模型，如果通信拓扑和认知权威结构不变，崩溃依然会发生。</p>


    <h2>三、实验设计：三层级的系统化测试</h2>


    <p>研究在三个层级上分别设计了对照实验：</p>


    <ul>

    <li><strong>模型层级</strong>：对比 GPT-4o、Claude-3.5、Gemma-2B 等不同规模/对齐程度的模型在相同创意任务（SC-ECO 基准）上的输出多样性指标（语义覆盖率、独特 n-gram 比例等）</li>

    <li><strong>认知层级</strong>：设计不同权威分布的 Agent 团队（2 权威+6 新人 vs 8 新人），控制创意任务类型，测量输出语义空间覆盖度</li>

    <li><strong>系统层级</strong>：变化 Agent 数量（2/4/6/8）和通信拓扑（星型、环形、全连接、稀疏随机），测量收敛速度和最终解空间覆盖率</li>

    </ul>


    <h2>四、核心结论与设计启示</h2>


    <blockquote>

    <p><strong>「在设计用于创意任务的多智能体系统时，保持智能体的独立性与分歧能力，比优化单个智能体的能力更重要。」</strong></p>

    </blockquote>


    <p>论文给出的关键设计建议：</p>


    <ol>

    <li><strong>减少权威梯度</strong>：避免指定某个 Agent 为「主导」，或刻意压制其声音权重</li>

    <li><strong>采用稀疏通信拓扑</strong>：不是每个 Agent 都和其他所有 Agent 通信，减少群体极化风险</li>

    <li><strong>控制群体规模</strong>：超过某个阈值后增加 Agent 反而降低多样性（diminishing returns + 过早收敛）</li>

    <li><strong>注入随机性</strong>：定期引入「外来观点」打破已有共识，防止思维固化</li>

    </ol>


    <h2>五、论文信息与代码</h2>


    <table>

    <tr><th>项目</th><th>内容</th></tr>

    <tr><td>标题</td><td>Diversity Collapse in Multi-Agent LLM Systems: Structural Coupling and Collective Failure in Open-Ended Idea Generation</td></tr>

    <tr><td>作者</td><td>Chen Nuo, Tong Yicheng, Yang Yuzhe, He Yufei, Zhang Xueyi, Zou Qingyun, Wang Qian, He Bingsheng</td></tr>

    <tr><td>机构</td><td>多所高校联合（arXiv: Xtra-Computing 实验室）</td></tr>

    <tr><td>发表</td><td>ACL 2026 Findings</td></tr>

    <tr><td>日期</td><td>2026-04-20</td></tr>

    <tr><td>arXiv</td><td><a href="https://arxiv.org/abs/2604.18005">2604.18005</a></td></tr>

    <tr><td>代码</td><td><a href="https://github.com/Xtra-Computing/MAS_Diversity">github.com/Xtra-Computing/MAS_Diversity</a></td></tr>

    </table>


    <h2>六、一点思考</h2>


    <p>这篇论文最发人深省的地方在于它揭示了一个本质张力：<strong>我们设计多智能体系统的初衷是利用「群体智慧」，但「交互」本身会引入结构性偏见</strong>，这种偏见与人类社会中的从众效应如出一辙。</p>


    <p>对于实际应用，这意味着：如果你真的需要一个「创意发散」的系统，可能反而需要<strong>减少</strong> Agent 之间的直接交互频率，或者在交互之外给每个 Agent 足够的独立思考空间。盲目增加 Agent 数量和连接密度，并不会自动带来更好的创意结果。</p>

    <p>今天来聊一篇来自斯坦福大学的最新工作 —— <strong>Neural Garbage Collection (NGC)</strong>，一个让语言模型<strong>边推理边学习遗忘</strong>的框架。核心思想极其简洁：如果模型能学会推理，为什么不能学会管理自己的记忆？</p>


    <h2>一、问题：CoT 推理的内存瓶颈</h2>


    <p>Chain-of-Thought (CoT) 推理极大提升了 LLM 的能力，但也带来了一个严重的副作用 —— <strong>KV Cache 爆炸</strong>。推理过程中每一步生成的 token 都会累积到 KV Cache 中，长推理链意味着巨大的内存占用。</p>


    <p>现有解决方案的问题：</p>

    <ul>

    <li><strong>SnapKV</strong>：基于注意力权重启发式保留重要 token</li>

    <li><strong>KeyDiff</strong>：基于 key 的多样性评分</li>

    <li><strong>KNorm</strong>：基于 key 范数统计量</li>

    <li><strong>StreamingLLM</strong>：滑动窗口 + attention sinks</li>

    </ul>


    <p>这些方法的共同缺陷：都是<strong>人工设计的启发式规则</strong>，不是从任务目标中学到的。它们不知道哪些信息对最终答案真正重要。</p>


    <h2>二、核心洞察：效率是可学习的能力</h2>


    <p>NGC 的核心主张 —— <strong>效率应该像推理一样被端到端学习</strong>。</p>


    <blockquote>

    <p>"If a model can learn to reason, why can''t it learn to forget?"</p>

    </blockquote>


    <p>关键思路：将 KV Cache 的驱逐决策视为<strong>离散动作</strong>，与 token 生成一样从模型中采样，然后用<strong>同一个强化学习信号</strong>联合优化。</p>


    <p>这个闭环非常优雅：</p>

    <ol>

    <li>模型驱逐什么 → 决定它记住什么</li>

    <li>它记住什么 → 塑造它的推理</li>

    <li>推理的正确性 → 决定奖励信号</li>

    <li>奖励信号 → 反向优化驱逐策略和推理策略</li>

    </ol>


    <h2>三、NGC 方法详解</h2>


    <h3>3.1 增长-驱逐循环 (Grow-Then-Evict)</h3>


    <p>NGC 采用周期性的驱逐策略：</p>

    <ul>

    <li>每生成 <strong>δ</strong> 个 token，触发一次驱逐轮次</li>

    <li>模型对所有当前 KV Cache 条目打分</li>

    <li>保留 <strong>(1−ε)</strong> 比例的条目，永久删除其余</li>

    <li>驱逐在每一层独立进行</li>

    </ul>


    <p>数学上，峰值 Cache 大小收敛到一个<strong>稳态值</strong>：</p>


    <p><code>C* = L · (δ / ε)</code></p>


    <p>这个值与推理总长度<strong>无关</strong> —— 无论模型思考多久，Cache 大小始终有界。</p>


    <h3>3.2 用注意力机制打分（零额外参数）</h3>


    <p>NGC 的一个精妙设计：<strong>不引入任何新参数</strong>，直接复用 Transformer 自身的注意力机制来评估 KV 条目的重要性。</p>


    <p>具体做法：</p>

    <ol>

    <li>取最近 <strong>w=5</strong> 个 query</li>

    <li>计算它们对所有 prefix key 的 softmax 注意力分数</li>

    <li>跨 heads 和 queries 平均 → 每个 token 的重要性分数 ψ_t</li>

    </ol>


    <p>为了降低信用分配难度并配合硬件友好的内存访问模式，key 被分组为大小 <strong>b=32</strong> 的连续块，块级分数是块内有效 key 分数的平均值。</p>


    <h3>3.3 Gumbel-Top-k 随机采样</h3>


    <p>驱逐不是确定性的 top-k，而是<strong>随机动作</strong> —— 这是为了支持无偏的策略梯度估计。</p>


    <ul>

    <li>对块分数加入 i.i.d. Gumbel 噪声</li>

    <li>保留噪声后分数最高的 K 个块</li>

    <li>选中子集的 log-probability 有闭式解，可用前缀和技巧高效计算</li>

    </ul>


    <h3>3.4 联合优化：一个奖励信号，两个梯度</h3>


    <p>NGC 使用 <strong>Dr. GRPO</strong>（Group Relative Policy Optimization）进行训练，核心创新是将 token 生成和驱逐决策统一到一个优化目标下：</p>


    <p><code>L = L_token + L_mem</code></p>


    <ul>

    <li><strong>L_token</strong>：标准 RLVR 的 token 级策略梯度</li>

    <li><strong>L_mem</strong>：驱逐决策的策略梯度（每层独立求和）</li>

    </ul>


    <p><strong>关键：两者使用同一个 advantage Â_i</strong> —— 即最终任务正确性相对于组内平均的偏差。这意味着驱逐决策直接从任务成败中学习，而不是依赖任何代理目标。</p>


    <p>由于驱逐分数来自模型自身的 Q 和 K，L_mem 的梯度会流入几乎所有模型权重 —— 模型学会的不只是"何时驱逐"，还包括如何生成更容易区分重要性的 Q/K 表示。</p>


    <h3>3.5 Replay Attention Masks</h3>


    <p>标准 RLVR 假设所有先前 token 都可见。NGC 打破了这个假设：被驱逐的 key 不再可见。为了正确计算 log-probability，NGC 使用 <strong>Replay Attention Masks</strong> 精确复现驱逐决策导致的每层可见性模式。</p>


    <h2>四、实验结果</h2>


    <h3>4.1 Countdown 任务</h3>


    <table>

    <tr><th>方法</th><th>pass@1 准确率</th><th>峰值 Cache 压缩比</th></tr>

    <tr><td>StreamingLLM</td><td>0.2%</td><td>—</td></tr>

    <tr><td>KNorm</td><td>0.1%</td><td>—</td></tr>

    <tr><td>KeyDiff</td><td>21.2%</td><td>—</td></tr>

    <tr><td>SnapKV</td><td>7.8%</td><td>—</td></tr>

    <tr><td><strong>NGC (ours)</strong></td><td><strong>49.6%</strong></td><td><strong>2.4×</strong></td></tr>

    </table>


    <p>NGC 在 <strong>2.4× Cache 压缩</strong> 下，准确率是次优基线（KeyDiff）的 <strong>2.3 倍</strong>。</p>


    <h3>4.2 AIME 2025（数学竞赛）</h3>


    <table>

    <tr><th>方法</th><th>pass@32 准确率</th><th>峰值 Cache 压缩比</th></tr>

    <tr><td>StreamingLLM</td><td>0.0%</td><td>—</td></tr>

    <tr><td>KNorm</td><td>0.0%</td><td>—</td></tr>

    <tr><td>KeyDiff</td><td>7.1%</td><td>—</td></tr>

    <tr><td>SnapKV</td><td>10.7%</td><td>—</td></tr>

    <tr><td><strong>NGC (ours)</strong></td><td><strong>21.4%</strong></td><td><strong>4.6×</strong></td></tr>

    </table>


    <p>在 <strong>4.6× 压缩</strong> 的极端条件下，NGC 仍然达到 21.4% 的 pass@32，是 SnapKV 的 <strong>2 倍</strong>。</p>


    <h3>4.3 AMC + AIME 综合表现</h3>


    <p>NGC 在 <strong>2–3× 峰值 KV Cache 压缩</strong> 下，保持了强劲的推理性能，全面超越所有启发式驱逐基线。</p>


    <h3>4.4 关键发现</h3>


    <ul>

    <li><strong>无监督微调、无代理目标、无预热阶段</strong> —— 纯 outcome-based reward 驱动</li>

    <li>模型学会了<strong>主动遗忘</strong>：驱逐决策不是随机的，而是与推理内容高度相关</li>

    <li>驱逐策略在不同层之间<strong>差异化</strong>：不同层学会保留不同类型的信息</li>

    </ul>


    <h2>五、为什么这个方法很重要？</h2>


    <h3>范式转变：从系统优化到能力学习</h3>


    <p>传统上，KV Cache 管理是系统工程师的工作 —— 设计启发式、调阈值、做工程优化。NGC 把它变成了<strong>模型的内在能力</strong>。</p>


    <p>这与 DeepSeek-R1 的 RLVR 范式一脉相承：</p>

    <ul>

    <li>R1 证明了推理能力可以通过纯 RL 从可验证奖励中学到</li>

    <li>NGC 证明了<strong>效率也可以</strong> —— 同一个框架，同一个信号，同时优化能力和资源</li>

    </ul>


    <h3>对本地部署的启示</h3>


    <p>对于本地模型用户（LMStudio/Ollama），NGC 的意义：</p>

    <ul>

    <li><strong>更长的 CoT 推理</strong>：同样的 GPU 内存可以支持更长的思考链</li>

    <li><strong>更大的上下文窗口</strong>：2-5× 的 Cache 压缩意味着等效上下文扩展</li>

    <li><strong>无需硬件升级</strong>：通过训练而非工程优化获得效率提升</li>

    </ul>


    <h3>局限与未来方向</h3>


    <ul>

    <li>当前仅在特定推理任务（Countdown、数学竞赛）上验证，通用任务效果待验证</li>

    <li>训练需要可验证奖励（RLVR），不适合开放式生成任务</li>

    <li>驱逐决策增加了推理时的计算开销（虽然内存大幅减少）</li>

    <li>代码尚未开源（截至 2026-04-28）</li>

    </ul>


    <h2>六、总结</h2>


    <p>Neural Garbage Collection 是一篇概念上极其优雅的论文。它没有提出新的架构，也没有设计复杂的系统 —— 它只是问了一个简单的问题：</p>


    <blockquote>

    <p>如果模型能学会推理，为什么不能学会遗忘？</p>

    </blockquote>


    <p>然后它证明了答案是：<strong>当然可以</strong>。而且遗忘和推理可以一起学，用同一个奖励信号，在同一个优化框架里。</p>


    <p>NGC 代表了一种更广泛的范式：<strong>将效率视为可学习的能力，而非工程约束</strong>。在这个范式下，模型不只是变得更聪明，还变得更"自知" —— 知道什么值得记住，什么可以放手。</p>


    <blockquote>

    <p><strong>论文</strong>: <a href="https://arxiv.org/abs/2604.18002v1">arXiv:2604.18002v1</a><br>

    <strong>作者</strong>: Michael Y. Li, Jubayer Ibn Hamid, Emily B. Fox, Noah D. Goodman (斯坦福大学)<br>

    <strong>关键词</strong>: KV Cache Eviction, Reinforcement Learning, Chain-of-Thought, Efficiency</p>

    </blockquote>

    '
- title: GoalAct 论文解读：全局规划 + 分层执行，LLM Agent 的 SOTA 框架
  date: April 28, 2026
  excerpt: 深入解读清华大学 GoalAct 论文（NCIIP 2025 Best Paper）。通过持续更新的全局规划和查询/编程/写作三层执行策略，在 LegalAgentBench 上实现 12.22% 平均成功率提升。包含完整代码架构分析。
  content: '<p><img src="/images/goalact-llm-agent-sota/cover.png" alt="GoalAct 论文解读：全局规划 + 分层执行，LLM Agent 的 SOTA 框架" style="max-width:100%;border-radius:8px;margin:1rem 0;"></p><p>今天来聊一篇来自清华大学的最新工作 ——
    <strong>GoalAct</strong>，一个通过<strong>全局规划</strong>和<strong>分层执行</strong>来增强 LLM Agent 的框架。论文在 LegalAgentBench 上取得了 SOTA，平均成功率提升 <strong>12.22%</strong>，并获得了 NCIIP 2025 Best Paper。</p>


    <h2>一、现有 Agent 框架的两大痛点</h2>


    <p>当前 LLM-based Agent 在规划和执行层面都存在明显短板：</p>


    <h3>1. 规划层面：缺乏全局视野</h3>


    <ul>

    <li><strong>ReAct</strong> 采用增量式推理（Thought → Action → Observation），没有全局目标指引，容易在多分支任务中陷入局部死胡同</li>

    <li><strong>Plan-and-Execute</strong> 虽然生成全局计划，但计划往往不可执行（超出 Agent 的动作空间）</li>

    </ul>


    <h3>2. 执行层面：复杂度与稳定性难以平衡</h3>


    <ul>

    <li><strong>纯文本/JSON 执行</strong>（如 ReAct）：简单稳定，但表达能力有限，无法处理循环、分支等复杂逻辑</li>

    <li><strong>代码执行</strong>（如 CodeAct）：动作空间大，能处理复杂逻辑，但在不可预测环境中更容易出错，且不适用于法律写作等生成任务</li>

    </ul>


    <h2>二、GoalAct 的核心设计</h2>


    <p>GoalAct 引入了两个关键创新：</p>


    <h3>创新 1：持续更新的全局规划</h3>


    <p>GoalAct 维护一个动态演化的全局计划 G_t = (P₁A₁, P₂A₂, ..., PₙAₙ)，其中 Pᵢ 是计划步骤，Aᵢ 是对应的高层级技能（而非底层细节）。最终步骤永远是 <strong>Finish</strong>。</p>


    <p>关键特性：</p>

    <ul>

    <li>计划基于实时执行反馈动态调整</li>

    <li>同时保证战略连贯性和可执行性</li>

    <li>避免静态计划的僵化和 ReAct 的局部最优</li>

    </ul>


    <h3>创新 2：分层执行策略</h3>


    <p>GoalAct 将任务执行分解为<strong>高层级技能</strong>，模拟人类工作方式：先识别技能类型，再选择工具，最后配置参数。</p>


    <table>

    <tr><th>技能</th><th>执行格式</th><th>优势</th><th>局限</th></tr>

    <tr><td><strong>查询 (Searching)</strong></td><td>Text/JSON 工具调用</td><td>简单稳定，适合不可预测环境，便于错误分析</td><td>表达能力有限，无法处理循环/分支</td></tr>

    <tr><td><strong>编程 (Coding)</strong></td><td>Python 代码</td><td>支持复杂逻辑（分支、循环、排序、聚合），大幅扩展动作空间</td><td>复杂度高，在不可预测环境中更易出错</td></tr>

    <tr><td><strong>写作 (Writing)</strong></td><td>领域专用推理 + 内容生成</td><td>解决法律文档起草等代码/查询无法完成的任务</td><td>需要领域知识，多阶段处理（信息收集→起草→润色）</td></tr>

    </table>


    <p>技能集是<strong>可扩展的</strong>（如推理、创意、研究等技能），可根据任务动态选择。</p>


    <h2>三、实验验证：LegalAgentBench</h2>


    <h3>基准测试</h3>


    <ul>

    <li><strong>LegalAgentBench</strong>：300 个任务，无法律数据泄露风险</li>

    <li>6 种任务类型：1-hop 到 5-hop 逻辑推理（解决方案路径长度递增）+ <strong>写作</strong>（答辩书生成）</li>

    <li>任务需要法律知识和外部工具调用</li>

    </ul>


    <h3>实验设置</h3>


    <ul>

    <li>测试模型：GPT-4o-mini、Qwen-max、GLM-4-Plus（temperature=0）</li>

    <li>基线方法：Plan-and-Solve、Plan-and-Execute、ReAct、CodeAct</li>

    <li>评估指标：Success Rate（关键词匹配率）</li>

    </ul>


    <h3>核心结果</h3>


    <table>

    <tr><th>模型</th><th>GoalAct</th><th>最佳基线</th><th>提升幅度</th></tr>

    <tr><td>GPT-4o-mini</td><td>0.7720</td><td>0.6275 (CodeAct)</td><td><strong>+14.45%</strong></td></tr>

    <tr><td>Qwen-max</td><td>0.8603</td><td>0.7594 (CodeAct)</td><td><strong>+10.09%</strong></td></tr>

    <tr><td>GLM-4-Plus</td><td>0.8710</td><td>0.7499 (ReAct)</td><td><strong>+12.11%</strong></td></tr>

    </table>


    <p><strong>平均提升：12.22%</strong></p>


    <h3>关键发现</h3>


    <ul>

    <li>任务难度越高，GoalAct 优势越明显：1-hop 提升 3.26%，3-hop 提升 20%，5-hop 提升 15.5%</li>

    <li>写作任务相对提升 <strong>12.74%</strong>，证明分层执行对生成任务同样有效</li>

    <li>CodeAct 在写作任务上表现极差（无法生成法律文档），而 GoalAct 通过专用 Writing 技能完美解决</li>

    </ul>


    <h2>四、代码实现解析</h2>


    <p>GoalAct 的代码实现非常简洁（约 4,500 行 Python），核心架构清晰：</p>


    <h3>文件结构</h3>


    <table>

    <tr><th>文件</th><th>职责</th><th>行数</th></tr>

    <tr><td><code>GoalAct.py</code></td><td>项目入口，问题预处理 + 并行执行</td><td>~230</td></tr>

    <tr><td><code>act.py</code></td><td>核心执行循环：全局规划 + 行动路由</td><td>~153</td></tr>

    <tr><td><code>action.py</code></td><td>三大技能实现：查询 / 编程 / 写作</td><td>~108</td></tr>

    <tr><td><code>prompt.py</code></td><td>所有 Prompt 模板（全局规划、技能分类、示例）</td><td>~528</td></tr>

    <tr><td><code>LLM.py</code></td><td>LLM 接口封装</td><td>~50</td></tr>

    <tr><td><code>memory.py</code></td><td>记忆管理（few-shot 示例检索）</td><td>~80</td></tr>

    <tr><td><code>api.py</code></td><td>工具集定义（法律数据库 API）</td><td>~200</td></tr>

    <tr><td><code>eval.py</code></td><td>评估脚本（关键词匹配）</td><td>~93</td></tr>

    </table>


    <h3>核心执行流程（act.py）</h3>


    <p>执行循环采用经典的 ReAct 结构，但增加了<strong>全局规划层</strong>和<strong>技能路由层</strong>：</p>


    <ol>

    <li><strong>全局规划生成</strong>：每步通过 LLM 生成「思考 + 行动」，行动必须是四种类型之一（查询/编程/写作/结束）</li>

    <li><strong>行动去重</strong>：维护 action_list 避免重复执行相同行动，若重复则通过 LLM 重新规划</li>

    <li><strong>技能路由</strong>：根据行动类型路由到对应执行器

    <ul>

    <li>「查询」→ <code>Retrive()</code>：Text/JSON 工具调用</li>

    <li>「编程」→ <code>Code()</code>：Python 代码生成 + 子进程执行</li>

    <li>「写作」→ <code>Write()</code>：检索法条/类案/知识后生成文档</li>

    </ul></li>

    <li><strong>观察反馈</strong>：执行结果写入 scratchpad，作为下一步规划的历史上下文</li>

    </ol>


    <h3>编程技能的巧妙设计</h3>


    <p>Code 技能不是简单的代码生成，而是包含完整的<strong>错误恢复机制</strong>：</p>


    <ul>

    <li>代码通过 <code>subprocess.run</code> 在独立进程中执行，避免污染主进程</li>

    <li>执行失败时自动捕获 stderr，将错误信息反馈给 LLM 要求重新编程（最多 5 次重试）</li>

    <li>临时文件使用秒级时间戳 + 随机数命名，避免冲突</li>

    </ul>


    <h3>Prompt 工程亮点</h3>


    <ul>

    <li><strong>问题改写</strong>：预处理阶段对查询进行去噪、标准化（如案号格式统一、公司名称补全省份）</li>

    <li><strong>表格筛选</strong>：通过 LLM 判断问题涉及哪些数据表，减少上下文噪音</li>

    <li><strong>Few-shot 记忆</strong>：从 memory.json 中检索相似问题的解决方案作为示例，提升规划质量</li>

    <li><strong>编程示例</strong>：Prompt 中包含 3 个详细的 Python 代码示例，覆盖筛选、排序、统计等常见操作</li>

    </ul>


    <h2>五、论文 vs 代码：一致性评估</h2>


    <table>

    <tr><th>论文声明</th><th>代码验证</th><th>状态</th></tr>

    <tr><td>全局规划机制</td><td><code>act.py</code> 每步调用 LLM 生成规划，scratchpad 维护历史</td><td>✅ 已实现</td></tr>

    <tr><td>分层执行（查询/编程/写作）</td><td><code>action.py</code> 中三个独立函数实现</td><td>✅ 已实现</td></tr>

    <tr><td>LegalAgentBench 评估</td><td><code>eval.py</code> 关键词匹配 + BERTScore 双指标</td><td>✅ 已实现</td></tr>

    <tr><td>12.22% 平均提升</td><td>可复现（代码完整，数据集需申请）</td><td>✅ 可验证</td></tr>

    <tr><td>技能可扩展</td><td>Prompt 中硬编码 3 种技能，扩展需修改 <code>act.py</code> 路由逻辑</td><td>⚠️ 需手动扩展</td></tr>

    </table>


    <h2>六、实用洞察与集成建议</h2>


    <h3>GoalAct 适合什么场景？</h3>


    <ul>

    <li><strong>多步推理任务</strong>：需要跨多个数据源查询、筛选、聚合的复杂工作流</li>

    <li><strong>混合任务类型</strong>：同时包含信息检索、数据处理和内容生成的场景</li>

    <li><strong>领域专用 Agent</strong>：法律、医疗、金融等有明确工具集和输出格式的领域</li>

    </ul>


    <h3>集成到 Hermes 的潜在路径</h3>


    <ol>

    <li><strong>MCP Server 化</strong>：将 GoalAct 的查询/编程/写作技能封装为 MCP Tools，Hermes 通过 MCP 协议调用</li>

    <li><strong>Prompt 层借鉴</strong>：将 GoalAct 的全局规划 Prompt 和技能路由逻辑融入 Hermes 的 agent 配置</li>

    <li><strong>法律领域扩展</strong>：GoalAct 的法律工具集（LegalDoc、CourtInfo、CompanyInfo 等）可作为垂直领域 MCP Server 参考</li>

    </ol>


    <h3>局限性</h3>


    <ul>

    <li><strong>领域耦合</strong>：当前实现深度绑定中国法律数据库，通用化需要重构 api.py 和 schema</li>

    <li><strong>单 Agent 架构</strong>：没有多 Agent 协作，复杂任务完全依赖单实例的 10 步循环</li>

    <li><strong>硬编码技能</strong>：新增技能需要修改 act.py 的路由逻辑和 prompt.py 的模板</li>

    <li><strong>中文特化</strong>：问题改写、法条检索等模块对中文法律文本有强依赖</li>

    </ul>


    <h2>七、总结</h2>


    <p>GoalAct 的核心价值在于证明了<strong>「全局规划 + 分层执行」</strong>这一设计范式在复杂 Agent 任务中的有效性。它不是通过更复杂的架构取胜，而是通过更合理的任务分解和更灵活的执行策略，在已有 LLM 能力基础上榨取更多性能。</p>


    <p>对于构建垂直领域 Agent 的开发者来说，GoalAct 提供了一个极具参考价值的实现模板：如何用不到 5,000 行代码，在特定领域实现 SOTA 性能。</p>


    <blockquote>

    <p><strong>论文</strong>: <a href="https://arxiv.org/abs/2504.16563">arXiv:2504.16563</a><br>

    <strong>代码</strong>: <a href="https://github.com/cjj826/GoalAct">github.com/cjj826/GoalAct</a><br>

    <strong>作者</strong>: Junjie Chen, Haitao Li, Jingli Yang, Yiqun Liu, Qingyao Ai (清华大学)<br>

    <strong>奖项</strong>: NCIIP 2025 Best Paper</p>

    </blockquote>

    '
- title: Memora：个性化 Agent 长期记忆基准评测深度解析
  date: April 28, 2026
  excerpt: 从记忆、推理到推荐 — 深度解析 Memora 基准测试如何评估个性化 Agent 的长期记忆能力，以及 FAMA 指标对过时记忆的惩罚机制。
  content: "<p><img src=\"/images/memora-agent/cover.png\" alt=\"Memora：个性化 Agent 长期记忆基准评测深度解析\" style=\"max-width:100%;border-radius:8px;margin:1rem 0;\"></p><br>\n<h2>背景：现有基准的局限</h2>\n<br>\n<p>个性化 Agent\
    \ 需要在<strong>数周至数月</strong>的长周期内与用户保持连续对话，并动态更新记忆。然而现有基准测试主要聚焦于<strong>事实检索</strong>——从历史对话中提取过去的事实。这种评估方式严重低估了 Agent 实际面临的核心挑战：</p>\n<br>\n<ul>\n<li><strong>记忆整合</strong>：新信息如何与旧知识融合？冲突时如何处理？</li>\n\
    <li><strong>遗忘机制</strong>：何时应该\"忘记\"过时的信息？</li>\n<li><strong>知识更新</strong>：用户偏好变化时，Agent 能否及时同步？</li>\n</ul>\n<br>\n<h2>Memora 基准测试</h2>\n<br>\n<h3>核心设计</h3>\n<br>\n<p>Memora 模拟了<strong>数周至数月</strong>的用户对话，评估三个核心记忆任务：</p>\n\
    <br>\n<table>\n<tr><th>任务</th><th>评估内容</th></tr>\n<tr><td><strong>Remembering</strong></td><td>Agent 能否准确记住跨会话的关键信息</td></tr>\n<tr><td><strong>Reasoning</strong></td><td>能否基于记忆进行正确推理和决策</td></tr>\n\
    <tr><td><strong>Recommending</strong></td><td>能否根据记忆推荐符合用户当前状态的内容</td></tr>\n</table>\n<br>\n<h3>数据构建流程</h3>\n<br>\n<pre><code class=\"language-\">\nSeed Data → Session Simulation → Conversation Generation\n\
    \    ↓              ↓                    ↓\n Personas     Multi-turn           Realistic\n (角色设定)    Sessions             Dialogues\n              (会话模拟)            (对话生成)\n</code></pre>\n<br>\n<h4>1.\
    \ Seed Data Design</h4>\n<p>定义多个<strong>角色 (Persona)</strong>，每个角色有：</p>\n<ul>\n<li>基本人口统计信息</li>\n<li>兴趣领域和偏好</li>\n<li>生活事件时间线</li>\n<li>关系网络</li>\n</ul>\n<br>\n<h4>2. Session Simulation</h4>\n<p>模拟多轮会话，包含：</p>\n\
    <ul>\n<li>日常对话（天气、新闻）</li>\n<li>信息咨询（餐厅、电影推荐）</li>\n<li>情感支持（工作压力、人际关系）</li>\n<li>知识讨论（技术话题、兴趣爱好）</li>\n</ul>\n<br>\n<h4>3. Conversation Generation</h4>\n<p>使用 LLM 生成符合角色设定的真实对话，并通过：</p>\n<ul>\n<li><strong>Automated\
    \ Grounding Checks</strong>：验证生成内容与 seed data 的一致性</li>\n<li><strong>Human Evaluation</strong>：人工质量审核</li>\n</ul>\n<br>\n<h2>FAMA：遗忘感知记忆准确度</h2>\n<br>\n<p>这是本文最重要的创新。现有的记忆评估指标（如准确率）存在一个根本缺陷：<strong>它奖励\
    \ Agent 使用任何记忆，即使该记忆已经被更新或失效。</strong></p>\n<br>\n<p><strong>Example</strong>：</p>\n<ul>\n<li>Session 1：用户说\"我最喜欢的颜色是蓝色\"</li>\n<li>Session 5：用户说\"我现在更喜欢绿色了\"</li>\n<li>Session 10：Agent 基于\"蓝色\"回答 →\
    \ 传统指标认为正确，FAMA 认为错误</li>\n</ul>\n<br>\n<p>FAMA 公式：</p>\n<br>\n<pre><code class=\"language-\">\nFAMA = Accuracy × (1 - Obsolescence_Penalty)\n\n其中 Obsolescence_Penalty 取决于：\n- 记忆被更新的时间（距今多久）\n- 更新后的新信息与原记忆的冲突程度\n\
    - 记忆被引用的上下文是否仍然适用\n</code></pre>\n<br>\n<h2>实验结果</h2>\n<br>\n<h3>评测设置</h3>\n<br>\n<p>评测了 <strong>4 个 LLM</strong> 和 <strong>6 个 Memory Agent</strong>：</p>\n<ul>\n<li>LLM：GPT-4、Claude、Llama 等</li>\n\
    <li>Memory Agent：RAG 系统、对话摘要工具、记忆增强框架等</li>\n</ul>\n<br>\n<h3>关键发现</h3>\n<br>\n<table>\n<tr><th>问题</th><th>比例</th><th>说明</th></tr>\n<tr><td>复用无效记忆</td><td>高频</td><td>Agent 倾向于使用最早的记忆，即使已有更新</td></tr>\n\
    <tr><td>记忆冲突处理失败</td><td>显著</td><td>无法正确整合矛盾的新旧信息</td></tr>\n<tr><td>记忆增强框架帮助有限</td><td>边际</td><td>现有 Memory Agent 改进效果不显著</td></tr>\n</table>\n<br>\n<h3>典型失败案例</h3>\n<br>\n<blockquote>\n<p><strong>Case\
    \ 1: Preference Drift</strong></p>\n<p>用户 3 个月前表示喜欢动作片 → 2 个月前改为喜欢喜剧 → 现在问\"推荐一部电影\"</p>\n<p>Agent 推荐动作片 → FAMA 惩罚：使用了 3 个月前的过时偏好</p>\n</blockquote>\n<br>\n<blockquote>\n<p><strong>Case 2: Fact Update</strong></p>\n\
    <p>用户曾说在 Google 工作 → 1 个月前换到 Meta → 现在问\"你在哪里工作\"</p>\n<p>Agent 回答 Google → FAMA 判定：错误（使用了过期信息）</p>\n</blockquote>\n<br>\n<h2>误差分析</h2>\n<br>\n<h3>主要原因</h3>\n<ol>\n<li><strong>位置偏差</strong>：LLM 倾向于过度权重最近和最早的信息（primacy/recency\
    \ effect）</li>\n<li><strong>确认偏差</strong>：Agent 更频繁地使用首次建立的信息，即使后来被更新</li>\n<li><strong>推理链路断裂</strong>：无法追踪记忆的时间线和因果关系</li>\n<li><strong>更新信号弱</strong>：新信息未给 Agent 足够强的\"遗忘\"信号</li>\n</ol>\n<br>\n\
    <h3>Memory Agent 的不足</h3>\n<p>即使引入了专门的记忆增强框架，Agent 仍然：</p>\n<ul>\n<li>无法自动识别哪些记忆已经\"过期\"</li>\n<li>缺乏显式的记忆版本控制机制</li>\n<li>对话摘要策略过于简单，无法捕捉细粒度的偏好变化</li>\n</ul>\n<br>\n<h2>对 Agent 设计的启示</h2>\n<br>\n<h3>1.\
    \ 记忆时间戳是基础</h3>\n<p>所有记忆必须带有时间戳和有效期标记，支持 TTL 过期机制。</p>\n<br>\n<h3>2. 冲突检测与解决</h3>\n<p>当新信息与旧记忆冲突时，需要：</p>\n<ul>\n<li>显式标记冲突</li>\n<li>优先使用最近的、经过确认的信息</li>\n<li>保留更新历史用于可解释性</li>\n</ul>\n<br>\n<h3>3.\
    \ 遗忘机制的主动触发</h3>\n<p>不能被动地\"不使用\"过时记忆，而要主动删除或归档：</p>\n<ul>\n<li>基于时间的自动过期</li>\n<li>基于重要性的分级存储</li>\n<li>基于冲突的强制更新</li>\n</ul>\n<br>\n<h3>4. 可配置的 FAMA 类评分</h3>\n<p>在 Agent 评估中引入时间敏感的记忆准确度指标，而不是简单的结果正确率。</p>\n\
    <br>\n<h2>结论</h2>\n<br>\n<p>Memora 基准测试揭示了一个关键问题：<strong>当前个性化 Agent 的记忆能力远未成熟</strong>。现有的 Memory Agent 方案在 FAMA 指标下表现平平，而 LLM 本身对过时记忆的处理也存在系统性偏差。</p>\n<br>\n<p>这篇论文的重要贡献在于：</p>\n<ol>\n<li>提出了更贴近实际的长期记忆评估范式</li>\n\
    <li>设计了 FAMA 指标，惩罚对过时记忆的依赖</li>\n<li>通过大规模实验暴露了当前系统的真实短板</li>\n</ol>\n<br>\n<p>对于构建生产级个性化 Agent 的团队，Memora 提供了：</p>\n<ul>\n<li>一个可靠的评估框架</li>\n<li>一个可量化的改进目标</li>\n<li>一组典型的失败模式作为设计反例</li>\n</ul>\n\
    <br>\n<hr>\n<br>\n<h2>参考资料</h2>\n<ul>\n<li>论文：<a href=\"https://arxiv.org/abs/2604.20006v1\">From Recall to Forgetting: Benchmarking Long-Term Memory for Personalized Agents</a></li>\n<li>作者：Md Nayem\
    \ Uddin, Kumar Shubham, Eduardo Blanco, Chitta Baral, Gengyu Wang</li>\n<li>发布日期：2026-04-21</li>\n</ul>\n<br>\n<hr>\n<br>\n<p><em>分析时间：2026-04-28</em></p>\n"
- title: Harness Engineering：AI 编码智能体的置信度工程实践
  date: April 28, 2026
  slug: harness-engineering-ai
  excerpt: Martin Fowler 最新文章深度解读。Birgitta Böckeler 提出「Harness Engineering」框架：如何通过前馈控制（Guidance Profile）与反馈控制（Confidence Gates）构建可靠的 AI 编码工作流。
  content: "<header>\n                \n                <div class=\"meta\">\n                    <span class=\"date\">April 28, 2026</span>\n                </div>\n            </header>\n            <div\
    \ class=\"content\"><p><em>作者：Birgitta Böckeler，Thoughtworks 杰出工程师，AI 辅助交付专家（20+ 年开发经验）。原文发表于 2026 年 4 月 2 日，Martin Fowler 网站。</em></p>\n\n<h2>一、背景：为什么需要 Harness Engineering？</h2>\n\n<p>AI 编码智能体（coding\
    \ agent）带来了一个根本性信任问题：LLM 是<strong>非确定性的</strong>，它不理解你的代码上下文，它以 token 的方式思考。作为软件工程师，我们天然对 AI 生成的代码存在信任屏障。</p>\n\n<p>Birgitta Böckeler 在本文中提出了一个心智模型，核心公式：</p>\n\n<blockquote>\n<p><strong>Agent = Model\
    \ + Harness</strong></p>\n</blockquote>\n\n<p>Harness（中文可译为「挽具」或「控制系统」）指的是智能体中<strong>除了模型本身之外的一切</strong>——系统提示词、代码检索机制、编排系统，以及用户为自己用例构建的外部 harness。</p>\n\n<p><img src=\"../images/harness-engineering/harness-bounded-contexts.png\"\
    \ alt=\"不同上下文中 Harness 的含义\" loading=\"lazy\" style=\"max-width:100%;border-radius:8px;margin:2em 0;\" /></p>\n<p style=\"color:var(--color-text-muted);font-size:0.9rem;text-align:center;margin-top:-1em;\"\
    >图 1：术语「Harness」在不同上下文中的含义各不相同</p>\n\n<h2>二、核心框架：前馈 + 反馈 = 自我纠正</h2>\n\n<p>Harness 的设计围绕两个核心机制：</p>\n\n<h3>Guide（前馈控制）</h3>\n\n<p><strong>在智能体行动之前</strong>进行引导，提前预判并预防不良行为。前馈控制提高智能体<strong>第一次就做对</strong>的概率。</p>\n\
    \n<h3>Sensor（反馈控制）</h3>\n\n<p><strong>在智能体行动之后</strong>观察结果，帮助其自我纠正。高效的 sensor 会输出专门为 LLM 优化过的信号——例如自定义 linter 消息包含自我纠正指令，这是一种<strong>正向的 prompt injection</strong>。</p>\n\n<blockquote>\n<p>只有反馈没有前馈\
    \ → 智能体会不断重复相同错误<br/>\n只有前馈没有反馈 → 智能体会制定规则但从不知道这些规则是否有效</p>\n</blockquote>\n\n<p><img src=\"../images/harness-engineering/harness-overview.png\" alt=\"Harness 工程总览\" loading=\"lazy\" style=\"max-width:100%;border-radius:8px;margin:2em\
    \ 0;\" /></p>\n<p style=\"color:var(--color-text-muted);font-size:0.9rem;text-align:center;margin-top:-1em;\">图 2：Harness 工程总览——前馈（Guide）、反馈（Sensor）与 Steering Loop</p>\n\n<h2>三、计算的 vs 推断的：两种执行类型</h2>\n\
    \n<p>Guide 和 Sensor 各有两种执行类型：</p>\n\n<table>\n<tr><th>类型</th><th>特性</th><th>示例</th></tr>\n<tr><td><strong>Computational（计算的）</strong></td><td>确定性，CPU 执行，毫秒级，结果可靠</td><td>测试、linter、类型检查、结构分析</td></tr>\n\
    <tr><td><strong>Inferential（推断的）</strong></td><td>语义分析，GPU/NPU 执行，较慢且非确定性</td><td>AI 代码评审、「LLM as judge」</td></tr>\n</table>\n\n<p>计算型 Sensor 足够便宜，可以在每次变更时运行。推断型 Sensor 虽然更贵且非确定性，但在使用足够强的模型时，可以显著提高信任度。</p>\n\
    \n<h2>四、时序策略：保持质量左移</h2>\n\n<p>持续集成的团队面临的挑战是如何根据成本、速度和关键性，将测试、检查和人工审查分布到开发时间线上。当目标是<strong>持续交付</strong>时，每一个提交状态最好都是可部署的——你希望检查尽可能左移，发现问题越早，修复成本越低。</p>\n\n<p><img src=\"../images/harness-engineering/harness-change-lifecycle-examples.png\"\
    \ alt=\"变更生命周期中的前馈与反馈\" loading=\"lazy\" style=\"max-width:100%;border-radius:8px;margin:2em 0;\" /></p>\n<p style=\"color:var(--color-text-muted);font-size:0.9rem;text-align:center;margin-top:-1em;\"\
    >图 3：变更生命周期中的前馈与反馈分布</p>\n\n<h3>持续漂移与健康 Sensor</h3>\n\n<p>除了变更生命周期，还需要持续运行的 Sensor 来监控累积性漂移：</p>\n\n<ul>\n<li>死代码检测</li>\n<li>测试覆盖质量分析</li>\n<li>依赖漏洞扫描</li>\n<li>运行时反馈：监控 SLO 降级并提出改进建议</li>\n</ul>\n\
    \n<p><img src=\"../images/harness-engineering/harness-continuous-feedback-examples.png\" alt=\"持续反馈传感器示例\" loading=\"lazy\" style=\"max-width:100%;border-radius:8px;margin:2em 0;\" /></p>\n<p style=\"\
    color:var(--color-text-muted);font-size:0.9rem;text-align:center;margin-top:-1em;\">图 4：持续反馈传感器示例</p>\n\n<h2>五、Harness 的三种类型</h2>\n\n<p><img src=\"../images/harness-engineering/harness-types.png\" alt=\"\
    Harness 类型\" loading=\"lazy\" style=\"max-width:100%;border-radius:8px;margin:2em 0;\" /></p>\n<p style=\"color:var(--color-text-muted);font-size:0.9rem;text-align:center;margin-top:-1em;\">图 5：Harness\
    \ 的三种类型</p>\n\n<h3>1. Maintainability Harness（可维护性 Harness）</h3>\n\n<p>这是目前<strong>最容易构建</strong>的 harness 类型，因为有大量现成的工具可用。</p>\n\n<p>Birgitta 将常见编码智能体失败模式映射到了不同 Sensor 上：</p>\n\n<ul>\n<li><strong>计算型\
    \ Sensor 可靠捕获</strong>：重复代码、循环复杂度、缺失测试覆盖、架构漂移、风格违规</li>\n<li><strong>LLM 可部分解决</strong>（但成本高、非确定性）：语义重复代码、冗余测试、暴力修复、过度工程</li>\n<li><strong>两者都难以可靠捕获</strong>：问题误诊、过度工程、不必要的功能、对指令的误解——这些需要在人工监督下解决</li>\n\
    </ul>\n\n<h3>2. Architecture Fitness Harness（架构 Fitness Harness）</h3>\n\n<p>定义和检查应用架构特性的 Guide 和 Sensor，本质上是 <strong>Fitness Functions</strong>：</p>\n\n<ul>\n<li>前馈：Skills 传递性能需求 → 性能测试反馈性能改善或退化</li>\n\
    <li>前馈：描述可观测性编码规范（日志标准）→ 调试时要求智能体反思日志质量</li>\n</ul>\n\n<h3>3. Behaviour Harness（行为 Harness）</h3>\n\n<p>这是最难的部分——如何引导和感知应用的功能行为是否符合预期？</p>\n\n<blockquote>\n<p>当前大多数高自主性编码智能体的做法：前馈用功能规格说明，反馈靠 AI 生成的测试套件是否通过。这种方法对\
    \ AI 生成测试的信任还不够。</p>\n</blockquote>\n\n<p>Thoughtworks 一些同事在特定领域使用 <strong>approved fixtures</strong> 模式取得了不错效果，但适用范围有限。</p>\n\n<h2>六、Steering Loop：人在循环中的角色</h2>\n\n<p>人类在 harness 系统中的角色是<strong>持续迭代和改进\
    \ harness</strong>——每当某个问题多次出现，就改进前馈或反馈控制，使其在未来减少发生概率甚至完全预防。</p>\n\n<p>Steering loop 中也可以用 AI 来改进 harness：</p>\n\n<ul>\n<li>智能体可以帮助编写结构性测试</li>\n<li>从观察到的模式生成规则草案</li>\n<li>搭建自定义 linter 的脚手架</li>\n\
    <li>从代码库考古中创建操作指南</li>\n</ul>\n\n<h2>七、Ashby 定律与 Harness 模板</h2>\n\n<p><img src=\"../images/harness-engineering/harness-templates.png\" alt=\"Harness 模板\" loading=\"lazy\" style=\"max-width:100%;border-radius:8px;margin:2em\
    \ 0;\" /></p>\n<p style=\"color:var(--color-text-muted);font-size:0.9rem;text-align:center;margin-top:-1em;\">图 6：企业常见的 80% 服务拓扑 → 未来的 Harness 模板</p>\n\n<p><strong>Ashby 必要多样性定律</strong>：调节器的多样性必须至少与被调节系统一样多。LLM\
    \ 可以产生几乎任何东西，但承诺一个拓扑会收窄这个空间，使全面的 harness 更容易实现。</p>\n\n<p>企业级团队通常有覆盖 80% 需求的服务拓扑（API 业务服务、事件处理服务、数据仪表盘）。这些拓扑未来可能演化为 <strong>Harness 模板</strong>——一组捆绑的 Guide 和 Sensor，将编码智能体约束到特定拓扑的结构、规范和技术栈上。</p>\n\n\
    <h2>八、核心洞察与实践建议</h2>\n\n<blockquote>\n<p><strong>「好的 harness 的目标不一定是完全消除人类输入，而是将人类输入引导到最需要人类判断的地方。」</strong></p>\n</blockquote>\n\n<p>人类开发者带来的隐性 harness：吸收了规范和良好实践、感受到复杂性的认知痛苦、知道自己的名字会出现在提交记录上、理解团队正在努力实现什么。</p>\n\
    \n<p>编码智能体没有这些：没有社会责任感、没有对 300 行函数的厌恶感、没有「我们这里不这样做」的直觉、没有组织记忆。</p>\n\n<h2>九、行业案例</h2>\n\n<ul>\n<li><strong>OpenAI 团队</strong>：用自定义 linter 和结构性测试强制执行分层架构，定期「垃圾回收」扫描漂移并让智能体建议修复</li>\n<li><strong>Stripe</strong>：pre-push\
    \ hooks 基于启发式运行相关 linter，「shift feedback left」是关键策略，blueprints 将反馈传感器集成到智能体工作流中</li>\n<li><strong>Mutation testing 和结构性测试</strong>：之前未被充分利用，现在正在复兴的计算型反馈传感器</li>\n</ul>\n\n<h2>十、开放问题</h2>\n\n<ul>\n<li>如何保持\
    \ harness 的内聚性，避免 Guide 和 Sensor 相互矛盾？</li>\n<li>当指令和反馈信号指向不同方向时，智能体能做出合理的权衡吗？</li>\n<li>如果 Sensor 从不触发，这是高质量的信号还是检测机制不足？</li>\n<li>我们需要一个类似于代码覆盖率的方法来评估 harness 的覆盖率和质量</li>\n<li>构建这个外部 harness 正在成为一项<strong>持续的工程实践</strong>，而非一次性配置</li>\n\
    </ul>\n\n<h2>附录：论文信息</h2>\n\n<table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>标题</td><td>Harness engineering for coding agent users</td></tr>\n<tr><td>作者</td><td>Birgitta Böckeler</td></tr>\n<tr><td>机构</td><td>Thoughtworks</td></tr>\n\
    <tr><td>发表</td><td>Martin Fowler Articles，2026-04-02</td></tr>\n<tr><td>标签</td><td>generative AI</td></tr>\n</table>\n\n<h2>一点思考</h2>\n\n<p>这篇文章最有价值的地方在于它将工程思维（测试、linter、Fitness Functions）与 AI 时代的新问题（非确定性、自我纠正）做了一个系统性整合。</p>\n\
    \n<p>「Agent = Model + Harness」这个公式简洁但深刻：模型的能力有上限，但 harness 的工程改进空间几乎是无限的。随着更多团队积累经验，harness engineering 很可能成为软件工程的一个正式子领域。</p>\n</div>"
- title: Neural Garbage Collection 论文解读：让 LLM 学会遗忘
  date: April 28, 2026
  slug: neural-garbage-collection-llm
  excerpt: 深入解读斯坦福大学 NGC 论文。通过强化学习让语言模型边推理边管理自己的 KV Cache，在 2-5× 压缩比下保持 SOTA 推理性能。
  content: "<p><img src=\"/images/neural-garbage-collection-llm/cover.png\" alt=\"Neural Garbage Collection 论文解读：让 LLM 学会遗忘\" style=\"max-width:100%;border-radius:8px;margin:1rem 0;\"></p><header>\n   \
    \             \n                <div class=\"meta\">\n                    <span class=\"date\">April 28, 2026</span>\n                </div>\n            </header>\n            <div class=\"content\"\
    ><p>今天来聊一篇来自斯坦福大学的最新工作 —— <strong>Neural Garbage Collection (NGC)</strong>，一个让语言模型<strong>边推理边学习遗忘</strong>的框架。核心思想极其简洁：如果模型能学会推理，为什么不能学会管理自己的记忆？</p>\n\n<h2>一、问题：CoT 推理的内存瓶颈</h2>\n\n<p>Chain-of-Thought\
    \ (CoT) 推理极大提升了 LLM 的能力，但也带来了一个严重的副作用 —— <strong>KV Cache 爆炸</strong>。推理过程中每一步生成的 token 都会累积到 KV Cache 中，长推理链意味着巨大的内存占用。</p>\n\n<p>现有解决方案的问题：</p>\n<ul>\n<li><strong>SnapKV</strong>：基于注意力权重启发式保留重要 token</li>\n\
    <li><strong>KeyDiff</strong>：基于 key 的多样性评分</li>\n<li><strong>KNorm</strong>：基于 key 范数统计量</li>\n<li><strong>StreamingLLM</strong>：滑动窗口 + attention sinks</li>\n</ul>\n\n<p>这些方法的共同缺陷：都是<strong>人工设计的启发式规则</strong>，不是从任务目标中学到的。它们不知道哪些信息对最终答案真正重要。</p>\n\
    \n<h2>二、核心洞察：效率是可学习的能力</h2>\n\n<p>NGC 的核心主张 —— <strong>效率应该像推理一样被端到端学习</strong>。</p>\n\n<blockquote>\n<p>\"If a model can learn to reason, why can't it learn to forget?\"</p>\n</blockquote>\n\n<p>关键思路：将\
    \ KV Cache 的驱逐决策视为<strong>离散动作</strong>，与 token 生成一样从模型中采样，然后用<strong>同一个强化学习信号</strong>联合优化。</p>\n\n<p>这个闭环非常优雅：</p>\n<ol>\n<li>模型驱逐什么 → 决定它记住什么</li>\n<li>它记住什么 → 塑造它的推理</li>\n<li>推理的正确性 → 决定奖励信号</li>\n\
    <li>奖励信号 → 反向优化驱逐策略和推理策略</li>\n</ol>\n\n<h2>三、NGC 方法详解</h2>\n\n<h3>3.1 增长-驱逐循环 (Grow-Then-Evict)</h3>\n\n<p>NGC 采用周期性的驱逐策略：</p>\n<ul>\n<li>每生成 <strong>δ</strong> 个 token，触发一次驱逐轮次</li>\n<li>模型对所有当前 KV\
    \ Cache 条目打分</li>\n<li>保留 <strong>(1−ε)</strong> 比例的条目，永久删除其余</li>\n<li>驱逐在每一层独立进行</li>\n</ul>\n\n<p>数学上，峰值 Cache 大小收敛到一个<strong>稳态值</strong>：</p>\n\n<p><code>C* = L · (δ / ε)</code></p>\n\n<p>这个值与推理总长度<strong>无关</strong>\
    \ —— 无论模型思考多久，Cache 大小始终有界。</p>\n\n<h3>3.2 用注意力机制打分（零额外参数）</h3>\n\n<p>NGC 的一个精妙设计：<strong>不引入任何新参数</strong>，直接复用 Transformer 自身的注意力机制来评估 KV 条目的重要性。</p>\n\n<p>具体做法：</p>\n<ol>\n<li>取最近 <strong>w=5</strong>\
    \ 个 query</li>\n<li>计算它们对所有 prefix key 的 softmax 注意力分数</li>\n<li>跨 heads 和 queries 平均 → 每个 token 的重要性分数 ψ_t</li>\n</ol>\n\n<p>为了降低信用分配难度并配合硬件友好的内存访问模式，key 被分组为大小 <strong>b=32</strong> 的连续块，块级分数是块内有效\
    \ key 分数的平均值。</p>\n\n<h3>3.3 Gumbel-Top-k 随机采样</h3>\n\n<p>驱逐不是确定性的 top-k，而是<strong>随机动作</strong> —— 这是为了支持无偏的策略梯度估计。</p>\n\n<ul>\n<li>对块分数加入 i.i.d. Gumbel 噪声</li>\n<li>保留噪声后分数最高的 K 个块</li>\n<li>选中子集的\
    \ log-probability 有闭式解，可用前缀和技巧高效计算</li>\n</ul>\n\n<h3>3.4 联合优化：一个奖励信号，两个梯度</h3>\n\n<p>NGC 使用 <strong>Dr. GRPO</strong>（Group Relative Policy Optimization）进行训练，核心创新是将 token 生成和驱逐决策统一到一个优化目标下：</p>\n\n\
    <p><code>L = L_token + L_mem</code></p>\n\n<ul>\n<li><strong>L_token</strong>：标准 RLVR 的 token 级策略梯度</li>\n<li><strong>L_mem</strong>：驱逐决策的策略梯度（每层独立求和）</li>\n</ul>\n\n<p><strong>关键：两者使用同一个 advantage\
    \ Â_i</strong> —— 即最终任务正确性相对于组内平均的偏差。这意味着驱逐决策直接从任务成败中学习，而不是依赖任何代理目标。</p>\n\n<p>由于驱逐分数来自模型自身的 Q 和 K，L_mem 的梯度会流入几乎所有模型权重 —— 模型学会的不只是\"何时驱逐\"，还包括如何生成更容易区分重要性的 Q/K 表示。</p>\n\n<h3>3.5 Replay Attention Masks</h3>\n\
    \n<p>标准 RLVR 假设所有先前 token 都可见。NGC 打破了这个假设：被驱逐的 key 不再可见。为了正确计算 log-probability，NGC 使用 <strong>Replay Attention Masks</strong> 精确复现驱逐决策导致的每层可见性模式。</p>\n\n<h2>四、实验结果</h2>\n\n<h3>4.1 Countdown 任务</h3>\n\
    \n<table>\n<tr><th>方法</th><th>pass@1 准确率</th><th>峰值 Cache 压缩比</th></tr>\n<tr><td>StreamingLLM</td><td>0.2%</td><td>—</td></tr>\n<tr><td>KNorm</td><td>0.1%</td><td>—</td></tr>\n<tr><td>KeyDiff</td><td>21.2%</td><td>—</td></tr>\n\
    <tr><td>SnapKV</td><td>7.8%</td><td>—</td></tr>\n<tr><td><strong>NGC (ours)</strong></td><td><strong>49.6%</strong></td><td><strong>2.4×</strong></td></tr>\n</table>\n\n<p>NGC 在 <strong>2.4× Cache 压缩</strong>\
    \ 下，准确率是次优基线（KeyDiff）的 <strong>2.3 倍</strong>。</p>\n\n<h3>4.2 AIME 2025（数学竞赛）</h3>\n\n<table>\n<tr><th>方法</th><th>pass@32 准确率</th><th>峰值 Cache 压缩比</th></tr>\n<tr><td>StreamingLLM</td><td>0.0%</td><td>—</td></tr>\n\
    <tr><td>KNorm</td><td>0.0%</td><td>—</td></tr>\n<tr><td>KeyDiff</td><td>7.1%</td><td>—</td></tr>\n<tr><td>SnapKV</td><td>10.7%</td><td>—</td></tr>\n<tr><td><strong>NGC (ours)</strong></td><td><strong>21.4%</strong></td><td><strong>4.6×</strong></td></tr>\n\
    </table>\n\n<p>在 <strong>4.6× 压缩</strong> 的极端条件下，NGC 仍然达到 21.4% 的 pass@32，是 SnapKV 的 <strong>2 倍</strong>。</p>\n\n<h3>4.3 AMC + AIME 综合表现</h3>\n\n<p>NGC 在 <strong>2–3× 峰值 KV Cache 压缩</strong> 下，保持了强劲的推理性能，全面超越所有启发式驱逐基线。</p>\n\
    \n<h3>4.4 关键发现</h3>\n\n<ul>\n<li><strong>无监督微调、无代理目标、无预热阶段</strong> —— 纯 outcome-based reward 驱动</li>\n<li>模型学会了<strong>主动遗忘</strong>：驱逐决策不是随机的，而是与推理内容高度相关</li>\n<li>驱逐策略在不同层之间<strong>差异化</strong>：不同层学会保留不同类型的信息</li>\n\
    </ul>\n\n<h2>五、为什么这个方法很重要？</h2>\n\n<h3>范式转变：从系统优化到能力学习</h3>\n\n<p>传统上，KV Cache 管理是系统工程师的工作 —— 设计启发式、调阈值、做工程优化。NGC 把它变成了<strong>模型的内在能力</strong>。</p>\n\n<p>这与 DeepSeek-R1 的 RLVR 范式一脉相承：</p>\n<ul>\n<li>R1\
    \ 证明了推理能力可以通过纯 RL 从可验证奖励中学到</li>\n<li>NGC 证明了<strong>效率也可以</strong> —— 同一个框架，同一个信号，同时优化能力和资源</li>\n</ul>\n\n<h3>对本地部署的启示</h3>\n\n<p>对于本地模型用户（LMStudio/Ollama），NGC 的意义：</p>\n<ul>\n<li><strong>更长的 CoT\
    \ 推理</strong>：同样的 GPU 内存可以支持更长的思考链</li>\n<li><strong>更大的上下文窗口</strong>：2-5× 的 Cache 压缩意味着等效上下文扩展</li>\n<li><strong>无需硬件升级</strong>：通过训练而非工程优化获得效率提升</li>\n</ul>\n\n<h3>局限与未来方向</h3>\n\n<ul>\n<li>当前仅在特定推理任务（Countdown、数学竞赛）上验证，通用任务效果待验证</li>\n\
    <li>训练需要可验证奖励（RLVR），不适合开放式生成任务</li>\n<li>驱逐决策增加了推理时的计算开销（虽然内存大幅减少）</li>\n<li>代码尚未开源（截至 2026-04-28）</li>\n</ul>\n\n<h2>六、总结</h2>\n\n<p>Neural Garbage Collection 是一篇概念上极其优雅的论文。它没有提出新的架构，也没有设计复杂的系统 ——\
    \ 它只是问了一个简单的问题：</p>\n\n<blockquote>\n<p>如果模型能学会推理，为什么不能学会遗忘？</p>\n</blockquote>\n\n<p>然后它证明了答案是：<strong>当然可以</strong>。而且遗忘和推理可以一起学，用同一个奖励信号，在同一个优化框架里。</p>\n\n<p>NGC 代表了一种更广泛的范式：<strong>将效率视为可学习的能力，而非工程约束</strong>。在这个范式下，模型不只是变得更聪明，还变得更\"\
    自知\" —— 知道什么值得记住，什么可以放手。</p>\n\n<blockquote>\n<p><strong>论文</strong>: <a href=\"https://arxiv.org/abs/2604.18002v1\">arXiv:2604.18002v1</a><br>\n<strong>作者</strong>: Michael Y. Li, Jubayer Ibn Hamid,\
    \ Emily B. Fox, Noah D. Goodman (斯坦福大学)<br>\n<strong>关键词</strong>: KV Cache Eviction, Reinforcement Learning, Chain-of-Thought, Efficiency</p>\n</blockquote>\n</div>"
- title: GBrain MCP 集成技术日志
  date: April 26, 2026
  excerpt: 详细记录 GBrain (PostgreSQL + pgvector 知识大脑) 通过 MCP 协议集成到 Hermes Agent 的完整过程。覆盖 ARM64 适配、中文搜索支持、进程管理等核心挑战与解决方案。
  content: "<p><img src=\"/images/gbrain-mcp/cover.png\" alt=\"GBrain MCP 集成技术日志\" style=\"max-width:100%;border-radius:8px;margin:1rem 0;\"></p><br>\n<h2>目录</h2>\n<br>\n<p>1. <a href=\"#1-项目背景与目标\">项目背景与目标</a></p>\n\
    <p>2. <a href=\"#2-环境准备\">环境准备</a></p>\n<p>3. <a href=\"#3-phase-1-底层验证\">Phase 1: 底层验证</a></p>\n<p>4. <a href=\"#4-phase-2-mcp-集成\">Phase 2: MCP 集成</a></p>\n<p>5. <a href=\"#5-phase-3-优化与持久化\">Phase\
    \ 3: 优化与持久化</a></p>\n<p>6. <a href=\"#6-核心问题与解决方案\">核心问题与解决方案</a></p>\n<p>7. <a href=\"#7-最终工作流程\">最终工作流程</a></p>\n<p>8. <a href=\"#8-文件修改清单\">文件修改清单</a></p>\n<p>9. <a href=\"#9-附录-常用命令速查\">附录: 常用命令速查</a></p>\n\
    <br>\n<hr>\n<br>\n<h2>1. 项目背景与目标</h2>\n<br>\n<h3>1.1 什么是 GBrain</h3>\n<br>\n<p>GBrain 是 Garry Tan 开发的开源个人知识大脑，基于 PostgreSQL + pgvector 构建，提供：</p>\n<br>\n<p>- <strong>知识图谱</strong>: 页面之间的自动链接提取</p>\n\
    <p>- <strong>向量搜索</strong>: 语义相似度检索</p>\n<p>- <strong>全文搜索</strong>: PostgreSQL FTS (Full-Text Search)</p>\n<p>- <strong>混合搜索</strong>: RRF (Reciprocal Rank Fusion) 融合关键词 + 向量结果</p>\n<p>- <strong>MCP\
    \ 协议</strong>: 通过 Model Context Protocol 与 AI Agent 集成</p>\n<br>\n<h3>1.2 集成目标</h3>\n<br>\n<p>将 GBrain 通过 MCP 协议集成到 Hermes Agent 中，使 Hermes 能够：</p>\n<br>\n<p>1. 持久化存储对话中的重要信息到知识图谱</p>\n<p>2. 通过语义搜索检索历史知识</p>\n\
    <p>3. 自动提取实体关系构建知识网络</p>\n<br>\n<h3>1.3 平台挑战</h3>\n<br>\n<table>\n<tr><th>挑战</th><th>说明</th></tr>\n<tr><td>Bun WASM 限制</td><td>`bun build` 的二进制在 ARM64 上无法运行 WASM，必须用 `bun src/cli.ts`</td></tr>\n<tr><td>中文支持</td><td>PostgreSQL\
    \ `english` 分词器不支持中文</td></tr>\n<tr><td>网络代理</td><td>通过 mihomo (127.0.0.1:7890) 访问外部 API</td></tr>\n</table>\n<br>\n<hr>\n<br>\n<h2>2. 环境准备</h2>\n<br>\n<h3>2.1 已安装依赖</h3>\n<br>\n<pre><code class=\"\
    language-bash\">\n# 系统级\n- Debian trixie (aarch64)\n- Ollama 0.6.6 (本地 LLM 推理)\n- Tailscale 1.96.4 (异地组网)\n- mihomo (HTTP 代理 127.0.0.1:7890)\n\n# 应用级\n- Bun (JavaScript 运行时)\n- Node.js / npm\n- Python\
    \ 3 + Hermes Agent v0.11.0\n</code></pre>\n<br>\n<h3>2.2 GBrain 安装</h3>\n<br>\n<pre><code class=\"language-bash\">\n# 克隆仓库\ngit clone https://github.com/garrytan/gbrain.git ~/gbrain\ncd ~/gbrain\n\n\
    # 安装依赖\nbun install\n\n# 验证安装\nbun src/cli.ts --help\n</code></pre>\n<br>\n<h3>2.3 嵌入模型配置</h3>\n<br>\n<p>由于无法使用 OpenAI 官方 API，改用 <strong>BitFun 提供的 Qwen3-Embedding-0.6B</strong>：</p>\n<br>\n<table>\n\
    <tr><th>参数</th><th>值</th></tr>\n<tr><td>维度</td><td>1024</td></tr>\n<tr><td>API 端点</td><td>`https://api.openbitfun.com/v1`</td></tr>\n<tr><td>费用</td><td>免费</td></tr>\n</table>\n<br>\n<hr>\n<br>\n<h2>3.\
    \ Phase 1: 底层验证</h2>\n<br>\n<h3>3.1 目标</h3>\n<br>\n<p>验证 GBrain 核心功能在 ARM64 + 自定义嵌入模型下正常工作。</p>\n<br>\n<h3>3.2 修改嵌入层</h3>\n<br>\n<p><strong>文件</strong>: <code>src/core/embedding.ts</code></p>\n<br>\n\
    <p>原始代码硬编码了 OpenAI 的 <code>text-embedding-3-large</code> (3072 维)，需要修改为支持环境变量配置：</p>\n<br>\n<pre><code class=\"language-typescript\">\n// 修改前: 硬编码 OpenAI 配置\nconst DEFAULT_MODEL = 'text-embedding-3-large';\n\
    const DEFAULT_DIMS = 3072;\n\n// 修改后: 支持环境变量\nconst DEFAULT_MODEL = process.env.GBRAIN_EMBED_MODEL || 'text-embedding-3-large';\nconst DEFAULT_DIMS = parseInt(process.env.GBRAIN_EMBED_DIMENSIONS ||\
    \ '3072', 10);\nconst DEFAULT_BASE_URL = process.env.GBRAIN_EMBED_BASE_URL;\nconst DEFAULT_API_KEY = process.env.GBRAIN_EMBED_API_KEY;\n</code></pre>\n<br>\n<h3>3.3 修改 Schema 维度</h3>\n<br>\n<p><strong>文件</strong>:\
    \ <code>src/core/pglite-schema.ts</code></p>\n<br>\n<pre><code class=\"language-typescript\">\n// 修改前\nembedding vector(3072),\nmodel TEXT NOT NULL DEFAULT 'text-embedding-3-large',\n\n// 修改后\nembedding\
    \ vector(1024),\nmodel TEXT NOT NULL DEFAULT 'Qwen/Qwen3-Embedding-0.6B',\n</code></pre>\n<br>\n<h3>3.4 初始化数据库</h3>\n<br>\n<pre><code class=\"language-bash\">\nexport GBRAIN_EMBED_MODEL=\"Qwen/Qwen3-Embedding-0.6B\"\
    \nexport GBRAIN_EMBED_DIMENSIONS=\"1024\"\nexport GBRAIN_EMBED_BASE_URL=\"https://api.openbitfun.com/v1\"\nexport GBRAIN_EMBED_API_KEY=\"sk-xxx\"\n\ncd ~/gbrain\nbun src/cli.ts init\n</code></pre>\n\
    <br>\n<p><strong>输出</strong>:</p>\n<pre><code class=\"language-\">\nBrain ready at /home/harryfan/.gbrain/brain.pglite\n0 pages. Engine: PGLite (local Postgres).\n</code></pre>\n<br>\n<h3>3.5 验证核心功能</h3>\n\
    <br>\n<pre><code class=\"language-bash\">\n# 添加测试页面\necho \"# GBrain 树莓派测试\n\n这是一个测试页面。\" | bun src/cli.ts put raspberry-pi-test\n\n# 查看统计\nbun src/cli.ts stats\n# Pages: 1, Chunks: 1, Embedded: 1\n\
    \n# 搜索测试\nbun src/cli.ts search \"测试\"\n# [0.3040] raspberry-pi-test -- # GBrain 树莓派测试\n</code></pre>\n<br>\n<h3>3.6 Phase 1 结论</h3>\n<br>\n<p>✅ GBrain 在 ARM64 + Qwen Embedding 下工作正常</p>\n<br>\n<hr>\n\
    <br>\n<h2>4. Phase 2: MCP 集成</h2>\n<br>\n<h3>4.1 目标</h3>\n<br>\n<p>将 GBrain 作为 MCP Server 接入 Hermes Agent。</p>\n<br>\n<h3>4.2 MCP 协议简介</h3>\n<br>\n<p>Model Context Protocol (MCP) 是 Anthropic 提出的标准协议，允许\
    \ AI Agent 通过 stdio 或 SSE 与外部工具通信：</p>\n<br>\n<pre><code class=\"language-\">\n┌─────────────┐     stdio      ┌─────────────────┐\n│ Hermes Agent │ ◄────────────► │ GBrain MCP Server│\n│  (Client) \
    \  │   JSON-RPC     │   (stdio mode)   │\n└─────────────┘                └─────────────────┘\n</code></pre>\n<br>\n<h3>4.3 创建 MCP 启动脚本</h3>\n<br>\n<p><strong>文件</strong>: <code>~/gbrain/start-mcp.sh</code></p>\n\
    <br>\n<pre><code class=\"language-bash\">\n#!/bin/bash\nexport PATH=\"$HOME/.bun/bin:$PATH\"\nexport GBRAIN_EMBED_MODEL=\"Qwen/Qwen3-Embedding-0.6B\"\nexport GBRAIN_EMBED_DIMENSIONS=\"1024\"\nexport\
    \ GBRAIN_EMBED_BASE_URL=\"https://api.openbitfun.com/v1\"\nexport GBRAIN_EMBED_API_KEY=\"sk-xxx\"\n\n# 清理可能残留的进程\npkill -9 -f \"bun src/cli.ts serve\" 2>/dev/null\nsleep 1\n\ncd \"$HOME/gbrain\"\nexec\
    \ bun src/cli.ts serve --stdio 2>/dev/null\n</code></pre>\n<br>\n<p>> <strong>关键</strong>: <code>exec</code> 确保子进程替换 shell 进程，<code>2>/dev/null</code> 防止日志干扰 MCP 协议解析。</p>\n<br>\n<h3>4.4 配置 Hermes MCP</h3>\n\
    <br>\n<p><strong>文件</strong>: <code>~/.hermes/config.yaml</code></p>\n<br>\n<pre><code class=\"language-yaml\">\nmcp:\n  gbrain:\n    command: /home/harryfan/gbrain/start-mcp.sh\n    timeout: 180\n\
    \    connect_timeout: 120\n</code></pre>\n<br>\n<p>> <strong>注意</strong>: <code>connect_timeout</code> 必须设长（120s），因为 PGLite 首次初始化需要 ~30 秒。</p>\n<br>\n<h3>4.5 发现 MCP 工具</h3>\n<br>\n<pre><code class=\"\
    language-python\">\n# 在 Hermes 中调用\nfrom hermes_agent.tools.mcp_tool import discover_mcp_tools\n\ntools = await discover_mcp_tools()\nprint(f\"发现 {len(tools)} 个工具\")\n</code></pre>\n<br>\n<p><strong>输出</strong>:</p>\n\
    <pre><code class=\"language-\">\n发现 45 个 GBrain 工具\n连接耗时: 0.8s\n</code></pre>\n<br>\n<p>工具列表包括：</p>\n<p>- <code>get_stats</code> - 获取数据库统计</p>\n<p>- <code>list_pages</code> - 列出所有页面</p>\n<p>- <code>get_page</code>\
    \ - 获取单个页面</p>\n<p>- <code>put_page</code> - 创建/更新页面</p>\n<p>- <code>query</code> - 混合搜索</p>\n<p>- <code>search_keyword</code> - 关键词搜索</p>\n<p>- <code>search_vector</code> - 向量搜索</p>\n<p>- ... (共 45\
    \ 个)</p>\n<br>\n<h3>4.6 验证工具调用</h3>\n<br>\n<pre><code class=\"language-python\">\n# 测试 get_stats\nresult = await handle_function_call(\"get_stats\", {})\n# {\"pages\": 6, \"chunks\": 6, \"embedded\"\
    : 2, \"links\": 1, \"tags\": 9}\n\n# 测试 put_page\nresult = await handle_function_call(\"put_page\", {\n    \"slug\": \"hermes-mcp-integration\",\n    \"content\": \"# Hermes Agent MCP Integration\\\
    n\\nIntegration verified...\"\n})\n# {\"slug\": \"hermes-mcp-integration\", \"status\": \"created_or_updated\"}\n\n# 测试 query\nresult = await handle_function_call(\"query\", {\n    \"query\": \"MCP\
    \ integration\"\n})\n# 返回搜索结果列表\n</code></pre>\n<br>\n<h3>4.7 关键问题: 进程残留</h3>\n<br>\n<p><strong>现象</strong>: 每次 MCP 调用后，<code>bun src/cli.ts serve</code> 进程未自动关闭，导致后续调用卡死。</p>\n<br>\n<p><strong>原因</strong>:\
    \ Hermes 的 <code>_run_on_mcp_loop</code> 没有正确管理子进程生命周期。</p>\n<br>\n<p><strong>临时解决方案</strong>:</p>\n<pre><code class=\"language-bash\">\n# 每次调用前清理残留进程\npkill -9 -f \"bun src/cli.ts serve\"\n</code></pre>\n\
    <br>\n<p><strong>长期方案</strong>: Phase 3a 创建管理脚本。</p>\n<br>\n<h3>4.8 Phase 2 结论</h3>\n<br>\n<p>✅ MCP 集成成功，45 个工具可用</p>\n<p>⚠️ 进程残留问题待优化（Phase 3 解决）</p>\n<br>\n<hr>\n<br>\n<h2>5. Phase 3: 优化与持久化</h2>\n\
    <br>\n<h3>5.1 3a: 进程管理脚本</h3>\n<br>\n<p><strong>问题</strong>: MCP 调用后 GBrain 进程残留</p>\n<br>\n<p><strong>解决方案</strong>: 创建管理脚本</p>\n<br>\n<p><strong>文件</strong>: <code>~/gbrain/gbrain-manager.sh</code></p>\n\
    <br>\n<pre><code class=\"language-bash\">\n#!/bin/bash\nGBRAIN_DIR=\"$HOME/gbrain\"\nPIDFILE=\"/tmp/gbrain-mcp.pid\"\nexport PATH=\"$HOME/.bun/bin:$PATH\"\nexport GBRAIN_EMBED_MODEL=\"Qwen/Qwen3-Embedding-0.6B\"\
    \nexport GBRAIN_EMBED_DIMENSIONS=\"1024\"\nexport GBRAIN_EMBED_BASE_URL=\"https://api.openbitfun.com/v1\"\nexport GBRAIN_EMBED_API_KEY=\"sk-xxx\"\n\ncase \"$1\" in\n    start)\n        pkill -f \"bun\
    \ src/cli.ts serve\" 2>/dev/null\n        sleep 1\n        cd \"$GBRAIN_DIR\"\n        bun src/cli.ts serve --stdio > /dev/null 2>&1 &\n        echo $! > \"$PIDFILE\"\n        echo \"Started (PID: $(cat\
    \ $PIDFILE))\"\n        sleep 2\n        ;;\n    stop)\n        [ -f \"$PIDFILE\" ] && kill -9 $(cat \"$PIDFILE\") 2>/dev/null\n        rm -f \"$PIDFILE\"\n        pkill -9 -f \"bun src/cli.ts serve\"\
    \ 2>/dev/null\n        echo \"Stopped\"\n        ;;\n    status)\n        if [ -f \"$PIDFILE\" ] && kill -0 $(cat \"$PIDFILE\") 2>/dev/null; then\n            echo \"Running (PID: $(cat $PIDFILE))\"\
    \n        else\n            echo \"Not running\"\n        fi\n        ;;\n    *) echo \"Usage: $0 {start|stop|status}\" ;;\nesac\n</code></pre>\n<br>\n<p><strong>使用</strong>:</p>\n<pre><code class=\"\
    language-bash\">\n~/gbrain/gbrain-manager.sh start   # 启动\n~/gbrain/gbrain-manager.sh stop    # 停止\n~/gbrain/gbrain-manager.sh status  # 查看状态\n</code></pre>\n<br>\n<h3>5.2 3b: 持久化环境变量</h3>\n<br>\n<p><strong>文件</strong>:\
    \ <code>~/.profile</code></p>\n<br>\n<pre><code class=\"language-bash\">\n# ── GBrain 环境变量 ─────────────────────────────────────────────\nexport GBRAIN_EMBED_MODEL=\"Qwen/Qwen3-Embedding-0.6B\"\nexport\
    \ GBRAIN_EMBED_DIMENSIONS=\"1024\"\nexport GBRAIN_EMBED_BASE_URL=\"https://api.openbitfun.com/v1\"\nexport GBRAIN_EMBED_API_KEY=\"sk-xxx\"\nexport PATH=\"$HOME/.bun/bin:$PATH\"\n# ────────────────────────────────────────────────────────────────\n\
    </code></pre>\n<br>\n<p><strong>文件</strong>: <code>~/.gbrain/env.sh</code> (供脚本 source 使用)</p>\n<br>\n<pre><code class=\"language-bash\">\nexport GBRAIN_EMBED_MODEL=\"Qwen/Qwen3-Embedding-0.6B\"\nexport\
    \ GBRAIN_EMBED_DIMENSIONS=\"1024\"\nexport GBRAIN_EMBED_BASE_URL=\"https://api.openbitfun.com/v1\"\nexport GBRAIN_EMBED_API_KEY=\"sk-xxx\"\nexport PATH=\"$HOME/.bun/bin:$PATH\"\n</code></pre>\n<br>\n\
    <h3>5.3 3c: 中文搜索支持</h3>\n<br>\n<p><strong>问题</strong>: PostgreSQL <code>english</code> 分词器不支持中文</p>\n<br>\n<p><strong>分析</strong>:</p>\n<pre><code class=\"language-sql\">\n-- english 分词器行为\nSELECT to_tsvector('english',\
    \ '中文知识图谱测试');\n-- 结果: '' (空，所有中文被过滤)\n\n-- simple 分词器行为\nSELECT to_tsvector('simple', '中文知识图谱测试');\n-- 结果: ''中文知识图谱测试':1' (整句作为一个词)\n</code></pre>\n<br>\n<p><strong>核心问题</strong>: <code>simple</code>\
    \ 分词器对中文按整句分词，导致子串搜索失败：</p>\n<pre><code class=\"language-sql\">\nSELECT to_tsvector('simple', '中文知识图谱测试') \n       @@ plainto_tsquery('simple', '知识');\n-- 结果: false (\"知识\" 不等于 \"中文知识图谱测试\")\n</code></pre>\n\
    <br>\n<p><strong>解决方案</strong>: 双重策略</p>\n<br>\n<p>1. <strong>全局替换</strong> <code>english</code> → <code>simple</code>（支持中英文混合）</p>\n<p>2. <strong>CJK Fallback</strong>: 当 tsvector 无结果时，自动使用 <code>ILIKE</code>\
    \ 匹配</p>\n<br>\n<p><strong>修改 1</strong>: <code>src/core/pglite-schema.ts</code></p>\n<br>\n<pre><code class=\"language-sql\">\n-- 修改前\nsetweight(to_tsvector('english', coalesce(NEW.title, '')), 'A')\n\
    \n-- 修改后\nsetweight(to_tsvector('simple', coalesce(NEW.title, '')), 'A')\n</code></pre>\n<br>\n<p><strong>修改 2</strong>: <code>src/core/pglite-engine.ts</code></p>\n<br>\n<pre><code class=\"language-typescript\"\
    >\n// 修改搜索 SQL\nts_rank(cc.search_vector, websearch_to_tsquery('simple', $1))\n\n// 添加 CJK Fallback\nif (rows.length === 0 && /[\\u4e00-\\u9fff\\u3040-\\u309f\\u30a0-\\u30ff\\uac00-\\ud7af]/.test(query))\
    \ {\n  // 使用 ILIKE 进行子串匹配\n  const likePattern = `%${query}%`;\n  // ... ILIKE 查询\n}\n</code></pre>\n<br>\n<p><strong>效果</strong>:</p>\n<p>- 英文查询: <code>websearch_to_tsquery('simple', query)</code>\
    \ → 精确匹配</p>\n<p>- 中文查询: tsvector 失败 → 自动 fallback 到 <code>ILIKE '%关键词%'</code></p>\n<br>\n<h3>5.4 3d: 宽松 Dedup 阈值</h3>\n<br>\n<p><strong>问题</strong>: 小数据集下搜索结果容易被过滤为空</p>\n<br>\n<p><strong>分析</strong>:\
    \ GBrain 的 4 层去重管道过于严格：</p>\n<br>\n<table>\n<tr><th>层级</th><th>原始值</th><th>修改后</th><th>说明</th></tr>\n<tr><td>类型多样性比例</td><td>0.6</td><td>0.8</td><td>同类型页面占比上限</td></tr>\n<tr><td>每页最大块数</td><td>2</td><td>3</td><td>每页保留的\
    \ chunk 数</td></tr>\n</table>\n<br>\n<p><strong>文件</strong>: <code>src/core/search/dedup.ts</code></p>\n<br>\n<pre><code class=\"language-typescript\">\n// 修改前\nconst COSINE_DEDUP_THRESHOLD = 0.85;\n\
    const MAX_TYPE_RATIO = 0.6;\nconst MAX_PER_PAGE = 2;\n\n// 修改后\nconst COSINE_DEDUP_THRESHOLD = 0.92;\nconst MAX_TYPE_RATIO = 0.8;\nconst MAX_PER_PAGE = 3;\n</code></pre>\n<br>\n<h3>5.5 3e: 验证与备份</h3>\n\
    <br>\n<p><strong>测试验证</strong>:</p>\n<br>\n<pre><code class=\"language-bash\">\n# 中文搜索\n$ bun src/cli.ts search \"知识\"\n[0.5000] chinese-knowledge -- # 中文知识图谱测试\n\n# 英文搜索\n$ bun src/cli.ts search \"\
    Graph\"\n[0.3040] english-knowledge -- # English Knowledge Graph Test\n\n# 混合搜索\n$ bun src/cli.ts search \"test\"\n[0.3040] english-knowledge -- # English Knowledge Graph Test\n</code></pre>\n<br>\n\
    <p><strong>备份</strong>:</p>\n<pre><code class=\"language-bash\">\n~/.gbrain-backup-phase3-20260426-163533/\n├── pglite-schema.ts      # FTS simple 分词器\n├── pglite-engine.ts      # simple 搜索 + CJK fallback\n\
    ├── dedup.ts              # 宽松阈值\n├── start-mcp.sh          # MCP 启动脚本\n├── gbrain-manager.sh     # 进程管理脚本\n├── config.yaml           # Hermes MCP 配置\n└── MODIFICATIONS.md      # 修改摘要\n</code></pre>\n\
    <br>\n<hr>\n<br>\n<h2>6. 核心问题与解决方案</h2>\n<br>\n<h3>6.1 问题汇总表</h3>\n<br>\n<table>\n<tr><th>#</th><th>问题</th><th>原因</th><th>解决方案</th></tr>\n<tr><td>2</td><td>嵌入模型不兼容</td><td>硬编码 OpenAI 3072 维</td><td>修改\
