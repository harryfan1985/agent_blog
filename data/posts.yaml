- title: Create My Widget：Android Generative UI 的技术革命
  date: May 28, 2026
  excerpt: Google 在 The Android Show 2026 上发布的 Create My Widget，将 Vibe Coding 嵌入 Android 17 操作系统层。深度解析其技术架构：RemoteCompose 声明式 UI 引擎、Function Registry 数据源注册机制、On-Device AI Pipeline。这是 Generative UI 进入消费级
    OS 的标志性事件。
  content: "<h2>从 Prompt 到 Widget：Android 桌面的 Generative UI 革命</h2>\n\n<p>2026 年 5 月 12 日，在 Google I/O 的前一周，The Android Show 上发布了一个看似小巧却意义深远的功能：<strong>Create My Widget</strong>。表面上，它只是让用户用自然语言生成桌面小组件；实际上，它标志着\
    \ Generative UI 正式进入消费级操作系统——这是从\"对话式 AI\"到\"界面式 AI\"的一次范式跃迁。</p>\n\n<h2>一、什么是 Create My Widget</h2>\n\n<p>简单说：打开 Android 17 手机上的 Gemini Intelligence，说一句 \"Create My Widget\"，然后用自然语言描述你想要的小组件——Gemini\
    \ 现场生成一个完整的、可缩放拖拽的桌面 Widget。</p>\n\n<p>几个真实例子：</p>\n\n<ul>\n  <li><strong>\"推荐三份高蛋白备餐食谱，每周刷新\"</strong> → 一个包含三栏食谱卡片、每周自动更新的动态仪表盘</li>\n  <li><strong>\"我只关心风速和降雨，其他天气不要\"</strong> → 一个只显示风速和降雨量的极简天气\
    \ Widget</li>\n  <li><strong>\"显示今天的日历 + 天气\"</strong> → 一个日历与天气合并的混合仪表盘</li>\n</ul>\n\n<p>这不仅仅是\"用 AI 填模板\"。<strong>Widget 的布局、数据源、刷新逻辑全由 Gemini 根据你的描述即时生成</strong>——没有预设模板，没有固定选项。</p>\n\n<h2>二、技术架构：RemoteCompose\
    \ 引擎</h2>\n\n<p>Create My Widget 的背后是四层技术栈协同工作：</p>\n\n<pre><code>用户自然语言\n     ↓\nGemini Intelligence     ← 意图理解 + 布局生成\n     ↓\nRemoteCompose          ← 声明式 UI 渲染引擎\n     ↓\nJetpack Glance        \
    \  ← Widget 框架（API 层）\n     ↓\nMaterial 3 Expressive   ← 视觉风格\n     ↓\nAndroid Home Screen     ← 最终呈现</code></pre>\n\n<h3>2.1 RemoteCompose：Google 的新 UI 原语</h3>\n\n<p>Google 开发者博客明确写道：<strong>\"RemoteCompose\
    \ is the engine behind Create My Widget.\"</strong></p>\n\n<p>RemoteCompose 是 Google 在 Android 16 中引入的声明式 UI 渲染引擎。它支持 <strong>运行时动态生成 Compose 布局</strong>——这与传统的编译期 Compose 有本质区别。传统 Widget 的布局在开发时写死；RemoteCompose\
    \ 允许 Gemini 根据用户意图实时构造 UI 树。</p>\n\n<p>关键设计决策：</p>\n<ul>\n  <li><strong>去耦合</strong>：布局描述和渲染引擎分离。Gemini 输出布局描述 → RemoteCompose 将其转化为原生 Compose 渲染树</li>\n  <li><strong>渐变降级</strong>：Android 16+ 获得完整的\
    \ RemoteCompose 高级 UI；旧版设备通过 Jetpack Glance 获得优雅降级的传统 Widget 渲染</li>\n  <li><strong>与 Glance 互操作</strong>：开发者用 Glance 构建的 Widget 自动获得 RemoteCompose 的能力——无需改写</li>\n</ul>\n\n<p><strong>工作链路：</strong></p>\n\
    <pre><code>Gemini Nano 输出 Widget Spec JSON\n   {\n     \"layout\": \"grid_2col\",\n     \"children\": [\n       {\"type\": \"weather_card\", \"metric\": \"wind_speed\"},\n       {\"type\": \"weather_card\"\
    , \"metric\": \"rain\"}\n     ],\n     \"style\": \"material_3_minimal\"\n   }\n        ↓\nRemoteCompose 解析 JSON\n        ↓\n动态构造 Compose 渲染树 (Row → Card → Text/Icon...)\n        ↓\nAndroid 桌面渲染 Widget</code></pre>\n\
    \n<p><strong>与 Jetpack Compose 的对比：</strong></p>\n\n<table>\n  <tr><th>维度</th><th>Jetpack Compose</th><th>RemoteCompose</th></tr>\n  <tr><td>布局定义时机</td><td>编译期（开发者写 Kotlin）</td><td>运行时（从 JSON 描述动态构造）</td></tr>\n\
    \  <tr><td>使用场景</td><td>开发者构建 App UI</td><td>系统/AI 生成动态 UI</td></tr>\n  <tr><td>Widget 兼容</td><td>通过 Glance 桥接</td><td>原生支持 + Glance 自动升级</td></tr>\n  <tr><td>旧版设备</td><td>最低 API 21</td><td>Android\
    \ 16+ 完整能力，旧版通过 Glance 降级</td></tr>\n</table>\n\n<p><strong>本质</strong>：RemoteCompose = <strong>UI 描述语言（JSON Schema）→ 原生 Compose 渲染树的翻译层</strong>。它不需要 AI，是确定性代码。Gemini 负责产 JSON，RemoteCompose 负责把它变成像素——分工清晰。</p>\n\
    \n<h3>2.2 Function Registry：让 Widget 接入数据</h3>\n\n<p>随 Create My Widget 一同发布的还有 <strong>Function Registry</strong>——一个系统级的函数注册机制，允许 Widget 接入动态数据源：</p>\n\n<ul>\n  <li><strong>系统函数</strong>：Gmail、Calendar、天气、新闻等\
    \ Google 服务已预注册</li>\n  <li><strong>第三方注册</strong>：Spotify 可以注册 \"正在播放\" 函数 → 用户说 \"显示我的播放列表\" → Gemini 生成含 Spotify 数据的 Widget</li>\n  <li><strong>Web 数据</strong>：Gemini 可以自主搜索并接入公开 Web API</li>\n</ul>\n\
    \n<p>这意味着 Widget 不是静态的——它们是 <strong>live data dashboard</strong>，自动刷新、响应数据变化。</p>\n\n<p><strong>工作流程（以 \"显示风速和降雨\" 为例）：</strong></p>\n<pre><code>用户说: \"显示风速和降雨\"\n         ↓\nGemini Nano 提取实体: wind_speed,\
    \ rain\n         ↓\nFunction Registry 查表:\n  \"wind_speed\" → WeatherAPI.getWindSpeed()\n  \"rain\"       → WeatherAPI.getPrecipitation()\n         ↓\n调用函数获取实时数据 → 填充到 Widget</code></pre>\n\n<p><strong>三层注册模式：</strong></p>\n\
    <ul>\n  <li><strong>系统预注册</strong>：Gmail 未读邮件数、Calendar 今日事件、天气 API、新闻头条——Google 服务自带</li>\n  <li><strong>第三方注册</strong>：Spotify 注册 \"正在播放\" → 用户说 \"显示我的播放列表\" → Widget 含 Spotify 数据。应用只需在 Android Manifest\
    \ 或 AICore API 中声明函数签名（名称 + 描述 + 返回 JSON Schema）</li>\n  <li><strong>Web 数据</strong>：用户说 \"显示 BTC 实时价格\" → Gemini 网搜 CoinGecko API → 注册临时函数</li>\n</ul>\n\n<p><strong>与 AICore 的边界</strong>：Function Registry\
    \ 是独立的 Android Framework API，不属于 AICore。AICore 只管 Gemini Nano 推理（text → function call JSON），Function Registry 负责接收函数名 → 路由到数据提供方。两者是链式调用，不是包含关系。</p>\n\n<p><strong>对开发者的意义</strong>：Google 正在构建一个新生态入口——不再是\
    \ App Store 分发应用，而是 Function Registry 分发 <strong>能力</strong>。应用不需要开发 Widget UI（Gemini 生成），只需要提供独特数据源。谁有稀缺数据函数，谁就获得零代码的 Widget 分发渠道。</p>\n\n<h3>2.3 On-Device AI Pipeline</h3>\n\n<p>BuildMVPFast 的技术分析中明确使用了\
    \ <strong>\"on-device AI pipeline\"</strong> 来描述 Create My Widget 的后端。结合 Android 已有的公开架构，可以拼出以下技术链路：</p>\n\n<ul>\n  <li><strong>Gemini Nano</strong> 运行在 Android 的 <strong>AICore</strong> 系统服务中（Android\
    \ 14+ 已支持），2-8B 参数 INT4 量化，利用 Pixel TPU / Snapdragon Hexagon NPU / MediaTek APU 进行硬件加速</li>\n  <li>首批支持设备：<strong>Pixel 10 和 Galaxy S26</strong>（BuildMVPFast 原文确认）</li>\n  <li>Gemini Nano 的任务是 <strong>Text\
    \ → Structured Widget Spec JSON</strong>——一次性推理，输出一个约几百 token 的结构化 Widget 描述，而非生成代码</li>\n  <li><strong>RemoteCompose</strong> 是确定性渲染引擎——接收 Widget Spec JSON，映射为 Compose 布局树。不需要 AI，纯粹是传统编程</li>\n  <li><strong>Function\
    \ Registry</strong> 是预注册的函数查找表——Gemini Nano 不需要理解 API，只需从 prompt 提取实体名（如 \"风速\"→\"wind_speed\"）然后在 Registry 中查表</li>\n</ul>\n\n<p><strong>架构本质</strong>：这是 constrained generation + deterministic executor\
    \ 模式。Gemini Nano 被约束生成一个精确 Schema 的 JSON → 确定性代码消费 JSON 执行操作。LLM 不需要理解 Compose 布局系统，只需将意图编码为结构化中间表示。</p>\n\n<p><strong>关于云端回落</strong>：公开材料没有明确说 \"100% 端侧\"。合理推测简单请求（\"显示风速和降雨\"）全部走端侧；复杂请求（跨多个数据源的复合仪表盘）可能触发云回落，用云端\
    \ Gemini 3.5 Flash 处理更复杂的 Widget Spec。Android AICore 的分级路由架构本身就支持这种模式。</p>\n\n<p><strong>关于延迟</strong>：端侧推理 + 确定性渲染理论上应该很快，但 Google 没有公布具体的端到端延迟数字。公开材料中的表述是预期/设计目标，非实测数据。</p>\n\n<h2>三、Vibe Coding 的操作系统化</h2>\n\
    \n<p>2025 年 10 月，Google 在 AI Studio 中推出了 Vibe Coding（用自然语言描述需求 → AI 生成 Web App）。Create My Widget 是 <strong>Vibe Coding 首次被嵌入操作系统 UI 层</strong>。</p>\n\n<p>两者架构对比：</p>\n\n<table>\n  <tr><th>维度</th><th>AI\
    \ Studio Vibe Coding</th><th>Create My Widget</th></tr>\n  <tr><td>目标产物</td><td>完整 Web App</td><td>桌面 Widget</td></tr>\n  <tr><td>AI 引擎</td><td>云端 Gemini 2.5 Pro / 3.5 Flash</td><td>设备端 Gemini Nano\
    \ v3</td></tr>\n  <tr><td>UI 渲染</td><td>Web（HTML/CSS/JS）</td><td>RemoteCompose（原生）</td></tr>\n  <tr><td>部署方式</td><td>一键 Cloud Run</td><td>即时桌面呈现</td></tr>\n  <tr><td>用户门槛</td><td>开发者</td><td>任何 Android\
    \ 用户</td></tr>\n  <tr><td>数据源</td><td>自定义 API</td><td>Function Registry</td></tr>\n</table>\n\n<p>这种从 \"AI 帮你写代码\" 到 \"AI 帮你生成界面\" 的演变，标志着 <strong>Generative UI 从开发者工具走向消费级产品</strong>。用户不再需要知道 Widget\
    \ 是怎么构建的——就像普通用户不需要知道 app 是怎么编译的。</p>\n\n<h2>四、全景架构图：Google AI Studio 技术栈</h2>\n\n<p>Create My Widget 并非孤立功能——它是 Google I/O 2026 后整个 AI Studio + Gemini API + Android 17 三层技术栈的终端触点。下图展示了从 AI Studio Web\
    \ 端到 Android 设备端的完整架构：</p>\n\n<img src=\"/images/create-my-widget/architecture.png\" alt=\"Google AI Studio Architecture 2026\" style=\"width:100%; max-width:1400px; border-radius:8px; border:1px solid\
    \ #1e293b;\">\n\n<p><em>架构图关键层解析：</em></p>\n<ul>\n  <li><strong>AI Studio (Web)</strong>：Build Tab（prompt → app）+ App Editor + Canvas + Managed Agents UI。面向开发者和非开发者的 AI-first 应用工坊</li>\n  <li><strong>Gemini\
    \ API / Model Layer</strong>：Gemini 3.5 Flash（agentic 旗舰）、2.5 Pro（AI Studio 重构基底）、3 Pro/Deep Think/3.1 Flash-Lite + Veo 3.1/Imagen 4。通过 Interactions API 统一暴露</li>\n  <li><strong>Agent Execution Layer</strong>：Antigravity\
    \ Harness（生命周期+编排+观测）+ 隔离 Linux Sandbox（code_execution、google_search、url_context）。Gemini 3.5 Flash 与 harness 协同优化</li>\n  <li><strong>Deployment & Enterprise</strong>：Cloud Run 一键部署、Firebase 后端、Gemini\
    \ Enterprise Agent Platform（CodeMender + Content Detection API）</li>\n  <li><strong>Android 17 On-Device</strong>：Gemini Intelligence → AICore（Gemini Nano + LoRA + 安全模块）→ RemoteCompose（声明式 UI 引擎）→ Create\
    \ My Widget + Function Registry → Android Apps（Gmail、Calendar、Recorder、Gboard 等）</li>\n</ul>\n\n<h2>五、Android 17：AI-First 操作系统的初现</h2>\n\n<p>Create My Widget 不是孤立的功能——它是 Android 17 的 \"Gemini Intelligence\"\
    \ 系统级 AI 层的第一个面向用户的可视化触点。这个 AI 层还包括：</p>\n\n<ul>\n  <li><strong>Gemini 驱动的通知智能排序</strong>：系统自动识别重要通知并前置</li>\n  <li><strong>上下文感知的快捷操作</strong>：根据时间/地点/使用模式建议操作</li>\n  <li><strong>AI 辅助的系统设置导航</strong>：自然语言搜索设置项</li>\n\
    \  <li><strong>跨设备连续体验</strong>：与 Googlebook 的 Magic Pointer 联动</li>\n</ul>\n\n<p>Google 在 I/O 2026 上反复强调一个关键词：<strong>\"from prompts to action\"</strong>。Create My Widget 是这个理念的完美示范——用户不是向 AI 提问并得到回答，而是\
    \ <strong>描述意图，AI 生成可用的界面和功能</strong>。</p>\n\n<h2>六、对开发者生态的冲击与机会</h2>\n\n<h3>6.1 预制 Widget 的终结？</h3>\n\n<p>传统 Widget 市场（天气时钟、日历、待办列表等单一功能组件）面临直接替代风险。当每个用户都能用一句话生成专属 Widget，为什么还要下载一个只能显示 80% 想要内容的第三方\
    \ Widget？</p>\n\n<p><strong>受影响最大的工具</strong>：KWGT、Zooper Widget、UCCW 等自定义 Widget 工具。它们卖的就是 \"高度可定制\"——现在 Gemini 直接把可定制度拉满了。</p>\n\n<h3>6.2 Function Registry：新生态入口</h3>\n\n<p>对应用开发者来说，真正的机会在 <strong>Function\
    \ Registry</strong>。逻辑很简单：</p>\n\n<ul>\n  <li>Widget 的 UI 由 Gemini 生成 → 不再需要 UI 设计师</li>\n  <li>Widget 的价值取决于数据源 → 谁有独特数据，谁就是赢家</li>\n  <li>注册函数到 Function Registry → 零代码分发 Widget</li>\n</ul>\n\n<p><strong>例</strong>：Todoist\
    \ 注册 \"今日待办\" 函数 → 用户说 \"显示我今天最重要的 3 个任务\" → Gemini 生成含 Todoist 数据的 Widget。Todoist 不需要开发任何 Widget UI。</p>\n\n<h3>6.3 Glance + RemoteCompose = 一次开发，自动升级</h3>\n\n<p>Google 的策略很聪明：</p>\n<ul>\n  <li>现有\
    \ Widget 用 Jetpack Glance 构建 → 自动获得 RemoteCompose 的 Premium UI 能力（Android 16+）</li>\n  <li>不需要重写代码——渐进式升级</li>\n  <li>旧版设备自动降级到传统渲染</li>\n</ul>\n\n<p>这确保了 Create My Widget 不是一夜之间的 \"breaking change\"\
    ，而是平滑的生态演进。</p>\n\n<h2>七、与 iOS 的差距分析</h2>\n\n<table>\n  <tr><th>维度</th><th>Android 17</th><th>iOS 19 (预计)</th></tr>\n  <tr><td>Widget 创建方式</td><td>自然语言即时生成</td><td>开发者预制模板</td></tr>\n  <tr><td>个性化能力</td><td>用户描述\
    \ → 随心定制</td><td>预设选项中选择</td></tr>\n  <tr><td>数据源</td><td>Function Registry 开放注册</td><td>仅 App 提供固定数据</td></tr>\n  <tr><td>AI 集成</td><td>系统级 Gemini Intelligence</td><td>Siri + App Intents（碎片化）</td></tr>\n\
    \  <tr><td>UI 引擎</td><td>RemoteCompose</td><td>WidgetKit + SwiftUI</td></tr>\n  <tr><td>开发者迁移</td><td>Glance → RemoteCompose 自动升级</td><td>WidgetKit 固定 API</td></tr>\n</table>\n\n<p><strong>iOS 的困境</strong>：Apple\
    \ 的 AI 战略仍然围绕 Siri——一个对话式助手。而 Android 17 展示的是 <strong>AI 作为操作系统基础设施</strong> 的范式：AI 不只是一个你可以聊天的 app，它是界面生成引擎、数据编排器、上下文感知层。</p>\n\n<p>这不是 \"Siri vs Gemini\" 的竞争——这是 <strong>\"AI 是一个 app\" vs \"AI 是操作系统\"\
    </strong> 的范式差异。</p>\n\n<h2>八、更大的图景：Generative UI 的三步走</h2>\n\n<p>Create My Widget 只是第一步。如果拉远镜头看：</p>\n\n<ol>\n  <li><strong>Widget（2026）</strong>：自然语言生成桌面小组件 → 已实现</li>\n  <li><strong>App（2027 推测）</strong>：\"\
    给我做一个番茄钟\" → Gemini 生成完整 APK？Google Flow 和 Project Genie 已经在指向这个方向</li>\n  <li><strong>OS UI（2028+ 推测）</strong>：整个系统的交互界面都可能是动态生成的——通知面板、设置界面、快捷方式——全都根据用户上下文即时构造</li>\n</ol>\n\n<p>当 UI 本身变成 <strong>运行时生成的\
    \ artifact</strong> 而不是编译期确定的资源，整个应用开发的范式将被颠覆。</p>\n\n<h2>九、总结</h2>\n\n<p>Create My Widget 的真正意义不在于 \"Widget 生成器\"。它是：</p>\n\n<ul>\n  <li><strong>技术里程碑</strong>：RemoteCompose + Function Registry + On-Device\
    \ AI 的三层基础设施首次在消费级产品中亮相</li>\n  <li><strong>范式跃迁</strong>：从 \"用户选择 Widget\" 到 \"AI 理解意图并生成 Widget\"，这是 UI 开发的中心从开发者转移到用户的转折点</li>\n  <li><strong>平台策略</strong>：Google 通过 Function Registry 构建了一个新的开发者生态入口——不是\
    \ API marketplace，而是能力注册市场</li>\n  <li><strong>竞争信号</strong>：Android 17 展示了 AI 作为操作系统基础设施的愿景，与 iOS 的 AI 作为助手 app 形成鲜明路线差异</li>\n</ul>\n\n<p>如果说 2025 年是 \"LLM 竞赛\" 的一年，2026 年正在成为 <strong>\"Generative\
    \ UI 元年\"</strong>。而 Google 用 Create My Widget 抢下了第一枚棋子。</p>\n\n<hr>\n\n<p><em>发布日期：2026 年 5 月 28 日</em></p>\n\n<p><em>技术声明</em>：本文技术架构分析基于 The Android Show 公开演讲、BuildMVPFast 技术分析、Google 开发者文档及 Android\
    \ AICore 公开架构。部分细节（如云回落策略、端侧模型参数）为基于公开信息的合理推断。早期版本中关于 Tensor G6 芯片型号和亚秒级延迟的具体断言已在本次更新中修正。</p>\n\n<p><em>参考来源：The Android Show (2026-05-12)、Google I/O 2026 Developer Highlights、Android 17 Gemini Intelligence\
    \ 文档、TechCrunch 报道、BuildMVPFast 技术分析</em></p>\n"
- title: OpenAI Codex 团队：从 Chat 到 Agent 的产品哲学
  slug: openai-codex-team
  date: May 26, 2026
  excerpt: 深度解析 OpenAI Codex 团队的核心成员背景、技术选型和工作方式。从 Thibault Sottiaux 到 Michael Bolin，了解这个打造 AI 编码代理的精英团队。
  content: "<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>OpenAI Codex 团队核心成员解析\
    \ | Agent Blog</title>\n    <meta name=\"description\" content=\"深度解析 OpenAI Codex 团队的核心成员背景、技术选型和工作方式。从 Thibault Sottiaux 到 Michael Bolin，了解这个打造 AI 编码代理的精英团队。\">\n    <meta name=\"author\" content=\"\
    Harry Fan\">\n    <meta property=\"og:title\" content=\"OpenAI Codex 团队核心成员解析\">\n    <meta property=\"og:description\" content=\"深度解析 OpenAI Codex 团队的核心成员背景、技术选型和工作方式。\">\n    <meta property=\"og:type\"\
    \ content=\"article\">\n    <meta property=\"article:published_time\" content=\"May 20, 2026\">\n    <link rel=\"stylesheet\" href=\"../styles.css\">\n    <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\"\
    >\n    <link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n    <link href=\"https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap\" rel=\"stylesheet\"\
    >\n</head>\n<body>\n    <nav class=\"navbar\">\n        <div class=\"container\">\n            <a href=\"../index.html\" class=\"logo\">Agent Blog</a>\n            <ul class=\"nav-links\">\n       \
    \         <li><a href=\"../index.html\">首页</a></li>\n                <li><a href=\"../about.html\">关于</a></li>\n                <li><a href=\"../projects.html\">项目</a></li>\n            </ul>\n    \
    \    </div>\n    </nav>\n\n    <main class=\"container blog-post\">\n        <article>\n            <header>\n                <h1>OpenAI Codex 团队核心成员解析</h1>\n                <div class=\"meta\">\n \
    \                   <span class=\"date\">May 20, 2026</span>\n                    <span class=\"read-time\">5 分钟阅读</span>\n                </div>\n            </header>\n            <div class=\"content\"\
    >\n\n<h2>目录</h2>\n\n<p>1. <a href=\"#1-核心领导层\">核心领导层</a></p>\n<p>2. <a href=\"#2-技术骨干\">技术骨干</a></p>\n<p>3. <a href=\"#3-团队工作方式\">团队工作方式</a></p>\n<p>4. <a href=\"#4-技术选型\">技术选型</a></p>\n<p>5. <a href=\"\
    #5-参考资源\">参考资源</a></p>\n\n<hr>\n\n<h2 id=\"1-核心领导层\">1. 核心领导层</h2>\n\n<h3>Thibault \"Tibo\" Sottiaux — Head of Codex</h3>\n\n<p>Tibo 是 Codex 的工程负责人，直接向 OpenAI 高层汇报。他的背景非常有趣：</p>\n\n<p>- <strong>前 Google\
    \ 软件工程师</strong>，在 Google 期间积累了大规模系统开发经验</p>\n<p>- <strong>应用研究背景</strong>：专注于决策系统、预测建模和数据库系统</p>\n<p>- 在 OpenAI 的职级是 <strong>Member of Technical Staff</strong></p>\n\n<p>Tibo 在多个公开场合分享了 Codex 的愿景，包括\
    \ OpenAI Forum 和 Software Engineering Daily 播客。他强调 Codex 的目标不仅是代码生成，而是<strong>\"agentic SDLC\"</strong>（代理驱动的软件开发生命周期）。</p>\n\n<blockquote>\n<p>\"Greg 和 Sam 有强烈的信念：'最终，我们应该有一个自主软件工程师与我们一起工作'……时机就是现在。\"\
    </p>\n<p>—— Thibault Sottiaux</p>\n</blockquote>\n\n<h3>Greg Brockman — OpenAI Co-founder</h3>\n\n<p>Greg Brockman 是推动 Codex 成为 OpenAI 战略重点的关键人物：</p>\n\n<p>- 2024 年底，他将 <strong>aSWE (Autonomous Software\
    \ Engineer)</strong> 定为 2025 年的 top-line goal</p>\n<p>- 与 Sam Altman 共同推动了 Codex 从实验项目到核心产品的转变</p>\n<p>- 在 Apple Podcasts 的访谈中与 Tibo 一起讨论 Codex 的演进</p>\n\n<h3>Sam Altman — OpenAI CEO</h3>\n\n<p>Sam\
    \ Altman 对 Codex 的评价非常直接：</p>\n\n<blockquote>\n<p>\"Codex 是我们最受喜爱的内部产品。\"</p>\n</blockquote>\n\n<p>这一评价反映了 Codex 在 OpenAI 内部的使用深度——不仅是面向外部的产品，也是 OpenAI 工程师日常工作的核心工具。</p>\n\n<hr>\n\n<h2 id=\"2-技术骨干\"\
    >2. 技术骨干</h2>\n\n<h3>Michael Bolin — Tech Lead（开源仓库）</h3>\n\n<p>Michael Bolin 负责 Codex 开源仓库的技术方向：</p>\n\n<p>- <strong>前 Meta Distinguished Engineer (E9)</strong>：Meta 的最高工程职级之一</p>\n<p>- 曾在 <strong>Google\
    \ 和 Meta</strong> 工作，积累了丰富的 Big Tech 工程经验</p>\n<p>- 主导了 Codex CLI 的架构设计，包括 agent loop 的 state machine 实现</p>\n<p>- 发表了技术博客 <a href=\"https://openai.com/index/unrolling-the-codex-agent-loop/\">\"Unrolling\
    \ the Codex Agent Loop\"</a></p>\n\n<p>Michael 在访谈中提到，他在 OpenAI 学到的关键经验是：<strong>\"技术上正确是不够的\"</strong>——必须考虑用户体验和实际影响。</p>\n\n<h3>Gabriel Peal — Engineering Lead（IDE Extension & Desktop App）</h3>\n\
    \n<p>Gabriel 负责 Codex 的 IDE 扩展和桌面应用：</p>\n\n<p>- <strong>前 Airbnb</strong>：React Native 迁移决策的核心人物，主导了 Airbnb 从 React Native 回归原生开发的工程</p>\n<p>- <strong>前 Google</strong>：Android GSE (Google Software\
    \ Engineer)</p>\n<p>- <strong>前 Watershed、Tonal</strong>：气候科技和健身科技领域的工程经验</p>\n<p>- <strong>Lo 维护者</strong>：一个开源动画库</p>\n\n<p>Gabriel 几乎是独立构建了 VS Code 扩展，并奠定了桌面应用的基础。他的多领域经验（移动端、桌面端、云）让 Codex 的多平台策略更加扎实。</p>\n\
    \n<h3>Fouad Matin — Safety & Security Lead</h3>\n\n<p>Fouad 负责 Codex 的安全和沙箱机制：</p>\n\n<p>- <strong>前 Indent 联合创始人/CEO</strong>（2018-2024）：云访问管理领域的网络安全创业公司</p>\n<p>- <strong>前 Segment 工程师</strong>（2016-2017）：数据基础设施</p>\n\
    <p>- <strong>VotePlz 联合创始人</strong>：帮助数百万人投票的公益项目</p>\n<p>- 在 OpenAI 专注于<strong>代码执行代理的安全和沙箱技术</strong></p>\n\n<p>Fouad 的背景在 Codex 团队中至关重要——Codex 的核心差异化之一就是<strong>默认安全沙箱</strong>，这让非技术用户也能安全使用。</p>\n\
    \n<hr>\n\n<h2 id=\"3-团队工作方式\">3. 团队工作方式</h2>\n\n<h3>Agent-First 开发</h3>\n\n<p>Codex 团队是<strong>自己产品的重度用户</strong>：</p>\n\n<p>- 典型工程师同时运行 <strong>4-8 个并行 agent</strong></p>\n<p>- 工程师的角色从\"写代码\"转变为<strong>\"\
    agent 管理者\"</strong></p>\n<p>- 每天到达工位时，多个 agent 已经在处理：代码审查、功能实现、安全审计、代码库理解、计划总结、bug 修复等</p>\n\n<h3>自举开发（Self-Hosted）</h3>\n\n<p>Codex 团队实现了真正的<strong>自举</strong>：</p>\n\n<p>- <strong>>90% 的 Codex 代码由\
    \ Codex 自己生成</strong></p>\n<p>- 这与 Anthropic 的 Claude Code 团队报告的数据一致</p>\n<p>- GPT-5.3-Codex 是第一个<strong>帮助创造自己</strong>的模型</p>\n\n<h3>发布频率</h3>\n\n<p>- <strong>内部发布</strong>：每天 3-4 次</p>\n<p>- <strong>外部发布</strong>：每几天一次（通过\
    \ Homebrew、npm）</p>\n<p>- 截至 2026 年 4 月，Codex CLI 已有 <strong>709 个 release</strong></p>\n\n<h3>技能系统（Skills）</h3>\n\n<p>团队内部有 <strong>100+ 个 skill</strong>，持续在内部共享：</p>\n\n<table>\n<tr><th>Skill</th><th>功能</th></tr>\n\
    <tr><td>Security best-practices</td><td>检查代码是否符合安全规范，生成补丁</td></tr>\n<tr><td>\"Yeet\"</td><td>从计划自动生成 PR 标题/描述，一键创建 draft PR</td></tr>\n<tr><td>Datadog integration</td><td>连接 Datadog，审查告警/问题，尝试生成修复</td></tr>\n\
    </table>\n\n<h3>分层代码审查</h3>\n\n<p>- <strong>AI 审查</strong>： bespoke 模型自动运行，约 90% 的 AI 评论指出有效问题</p>\n<p>- <strong>非关键代码</strong>：AI 审查后即可合并，无需人工</p>\n<p>- <strong>核心代码</strong>（agent、开源部分）：强制人工审查</p>\n\
    \n<hr>\n\n<h2 id=\"4-技术选型\">4. 技术选型</h2>\n\n<h3>为什么用 Rust？</h3>\n\n<p>团队曾对比 TypeScript、Go 和 Rust，最终选择 Rust：</p>\n\n<p>- <strong>性能</strong>：大规模场景下每毫秒都重要</p>\n<p>- <strong>正确性</strong>：强类型和内存管理</p>\n\
    <p>- <strong>工程文化</strong>：Rust 设定了高门槛</p>\n<p>- <strong>依赖少</strong>：避免 npm 依赖链的脆弱性</p>\n<p>- <strong>长期愿景</strong>：agent 需要在嵌入式系统、数据中心、笔记本上运行</p>\n\n<p>团队甚至雇佣了 <strong>Ratatui</strong>（Rust TUI 库）的维护者全职加入。</p>\n\
    \n<h3>Agent Loop 架构</h3>\n\n<p>核心是一个 state machine：</p>\n\n<p>1. <strong>Prompt assembly</strong>：用户输入 + 系统指令 + 工具列表 + 文件 + 环境</p>\n<p>2. <strong>Inference</strong>：token 发送到模型，流式返回推理步骤、工具调用或响应</p>\n\
    <p>3. <strong>Response</strong>：流式输出到终端；如果是工具调用，执行（读文件、运行 bash、写代码）</p>\n<p>4. <strong>Tool response</strong>（可选）：失败时错误返回模型诊断/重试</p>\n<p>5. <strong>Assistant message</strong>：最终消息给用户，循环重启</p>\n\n<h3>Compaction\
    \ 机制</h3>\n\n<p>当对话超过 token 阈值时，特殊的 Responses API endpoint 生成紧凑表示，避免二次推理成本。</p>\n\n<h3>安全沙箱</h3>\n\n<p>- 默认在沙箱中运行（限制网络/文件系统）</p>\n<p>- 用户可以禁用，但默认安全</p>\n<p>- 这是 Codex 区别于其他终端 agent 的关键设计</p>\n\n<hr>\n\
    \n<h2 id=\"5-参考资源\">5. 参考资源</h2>\n\n<p>- <a href=\"https://newsletter.pragmaticengineer.com/p/how-codex-is-built\">How Codex is Built - Pragmatic Engineer</a>（Gergely Orosz, 2026年2月）</p>\n<p>- <a href=\"\
    https://github.com/openai/codex\">OpenAI Codex GitHub</a></p>\n<p>- <a href=\"https://openai.com/index/unrolling-the-codex-agent-loop/\">Unrolling the Codex Agent Loop - Michael Bolin</a></p>\n<p>-\
    \ <a href=\"https://www.reddit.com/r/ChatGPT/comments/1ko3tp1/ama_with_openai_codex_team\">AMA with OpenAI Codex team - Reddit</a></p>\n<p>- <a href=\"https://softwareengineeringdaily.com/2026/01/29/openai-and-codex-with-thibault-sottiaux-and-ed-bayes\"\
    >OpenAI and Codex - Software Engineering Daily</a></p>\n\n            </div>\n        </article>\n    </main>\n\n    <footer class=\"container\">\n        <p>© 2026 Harry Fan. Built with curiosity and\
    \ AI assistance.</p>\n    </footer>\n\n    <script>\n        // Navigation scroll behavior\n        let lastScroll = 0;\n        const navbar = document.querySelector('.navbar');\n\n        window.addEventListener('scroll',\
    \ () => {\n            const currentScroll = window.pageYOffset;\n\n            if (currentScroll <= 0) {\n                navbar.classList.remove('scroll-up');\n                return;\n          \
    \  }\n\n            if (currentScroll > lastScroll && !navbar.classList.contains('scroll-down')) {\n                navbar.classList.remove('scroll-up');\n                navbar.classList.add('scroll-down');\n\
    \            } else if (currentScroll < lastScroll && navbar.classList.contains('scroll-down')) {\n                navbar.classList.remove('scroll-down');\n                navbar.classList.add('scroll-up');\n\
    \            }\n            lastScroll = currentScroll;\n        });\n    </script>\n</body>\n</html>\n"
