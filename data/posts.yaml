- title: Diversity Collapse in Multi-Agent LLM Systems 深度解读：群体智能为何走向创意枯竭
  date: April 28, 2026
  excerpt: 多智能体系统被寄予厚望能拓宽创意探索空间，但这项 ACL 2026 Findings 研究揭示了一个反直觉的现象：智能体间的交互反而会加速多样性崩溃。三个层级（模型、认知、系统）全面崩塌的根因是什么？
  content: '<p>多智能体系统（Multi-Agent Systems, MAS）被广泛视为解锁更强创意能力的钥匙——多个 Agent 互相讨论、碰撞观点，理论上应该产生比单一
    Agent 更丰富的创意输出。但来自多所高校的研究者（Chen Nuo, Tong Yicheng, Yang Yuzhe 等，ACL 2026 Findings）在最新论文中揭示了一个令人不安的现象：<strong>智能体间的交互反而会加速多样性崩溃</strong>，而且问题出在交互结构本身，而非模型能力不足。</p>


    <h2>一、核心发现：三个层级的多样性崩塌</h2>


    <p>研究者从底向上逐层分析，识别出三条崩塌链路：</p>


    <h3>1. 模型层级：计算效率悖论</h3>


    <p>更强大、更高对齐程度的模型（如 GPT-4、Claude 级别），在<strong>每个样本质量</strong>上显著超越小模型，但在<strong>边际多样性</strong>上反而更差。这就是「计算效率悖论」：强模型推理质量高，但输出倾向于收敛到相似的正确答案，反而减少了创意空间。</p>


    <p>本质原因：对齐训练（RLHF/PPO）让模型更倾向于生成「人类偏好答案」，而高人类偏好 = 高收敛性 = 低多样性。</p>


    <h3>2. 认知层级：权威压制语义多样性</h3>


    <p>研究比较了「权威主导组」（authority-dominated）与「新人主导组」（junior-dominated）的创意输出差异。结果：</p>


    <blockquote><strong>权威主导组语义多样性显著低于新人主导组。</strong></blockquote>


    <p>当团队中存在「权威 Agent」（通常由更强的模型扮演），其他 Agent 会倾向于<strong>服从而非反驳</strong>，即使被明确指示要发散思维。这种认知层面的从众效应与人类社会心理学中的「权威效应」高度吻合。</p>


    <h3>3. 系统层级：规模效应递减 + 通信拓扑加速收敛</h3>


    <p>增加智能体数量带来的边际收益快速递减。更关键的是，<strong>密集的通信拓扑</strong>（如全连接网络）反而比稀疏拓扑更容易导致「过早收敛」——智能体们在还没有充分探索解空间时就达成了一致。</p>


    <h2>二、核心概念：结构耦合（Structural Coupling）</h2>


    <p>研究者将上述现象统一命名为「<strong>结构耦合</strong>」：智能体在交互过程中，交互结构本身（谁与谁通信、频率如何）会无意中收缩每个智能体的探索空间，触发多样性崩溃。</p>


    <p>关键洞察：<strong>崩溃的根因是交互结构，而非模型本身的不够强</strong>。即使换成更强的模型，如果通信拓扑和认知权威结构不变，崩溃依然会发生。</p>


    <h2>三、实验设计：三层级的系统化测试</h2>


    <p>研究在三个层级上分别设计了对照实验：</p>


    <ul>

    <li><strong>模型层级</strong>：对比 GPT-4o、Claude-3.5、Gemma-2B 等不同规模/对齐程度的模型在相同创意任务（SC-ECO
    基准）上的输出多样性指标（语义覆盖率、独特 n-gram 比例等）</li>

    <li><strong>认知层级</strong>：设计不同权威分布的 Agent 团队（2 权威+6 新人 vs 8 新人），控制创意任务类型，测量输出语义空间覆盖度</li>

    <li><strong>系统层级</strong>：变化 Agent 数量（2/4/6/8）和通信拓扑（星型、环形、全连接、稀疏随机），测量收敛速度和最终解空间覆盖率</li>

    </ul>


    <h2>四、核心结论与设计启示</h2>


    <blockquote>

    <p><strong>「在设计用于创意任务的多智能体系统时，保持智能体的独立性与分歧能力，比优化单个智能体的能力更重要。」</strong></p>

    </blockquote>


    <p>论文给出的关键设计建议：</p>


    <ol>

    <li><strong>减少权威梯度</strong>：避免指定某个 Agent 为「主导」，或刻意压制其声音权重</li>

    <li><strong>采用稀疏通信拓扑</strong>：不是每个 Agent 都和其他所有 Agent 通信，减少群体极化风险</li>

    <li><strong>控制群体规模</strong>：超过某个阈值后增加 Agent 反而降低多样性（diminishing returns + 过早收敛）</li>

    <li><strong>注入随机性</strong>：定期引入「外来观点」打破已有共识，防止思维固化</li>

    </ol>


    <h2>五、论文信息与代码</h2>


    <table>

    <tr><th>项目</th><th>内容</th></tr>

    <tr><td>标题</td><td>Diversity Collapse in Multi-Agent LLM Systems: Structural Coupling
    and Collective Failure in Open-Ended Idea Generation</td></tr>

    <tr><td>作者</td><td>Chen Nuo, Tong Yicheng, Yang Yuzhe, He Yufei, Zhang Xueyi,
    Zou Qingyun, Wang Qian, He Bingsheng</td></tr>

    <tr><td>机构</td><td>多所高校联合（arXiv: Xtra-Computing 实验室）</td></tr>

    <tr><td>发表</td><td>ACL 2026 Findings</td></tr>

    <tr><td>日期</td><td>2026-04-20</td></tr>

    <tr><td>arXiv</td><td><a href="https://arxiv.org/abs/2604.18005">2604.18005</a></td></tr>

    <tr><td>代码</td><td><a href="https://github.com/Xtra-Computing/MAS_Diversity">github.com/Xtra-Computing/MAS_Diversity</a></td></tr>

    </table>


    <h2>六、一点思考</h2>


    <p>这篇论文最发人深省的地方在于它揭示了一个本质张力：<strong>我们设计多智能体系统的初衷是利用「群体智慧」，但「交互」本身会引入结构性偏见</strong>，这种偏见与人类社会中的从众效应如出一辙。</p>


    <p>对于实际应用，这意味着：如果你真的需要一个「创意发散」的系统，可能反而需要<strong>减少</strong> Agent 之间的直接交互频率，或者在交互之外给每个
    Agent 足够的独立思考空间。盲目增加 Agent 数量和连接密度，并不会自动带来更好的创意结果。</p>

    <p>今天来聊一篇来自斯坦福大学的最新工作 —— <strong>Neural Garbage Collection (NGC)</strong>，一个让语言模型<strong>边推理边学习遗忘</strong>的框架。核心思想极其简洁：如果模型能学会推理，为什么不能学会管理自己的记忆？</p>


    <h2>一、问题：CoT 推理的内存瓶颈</h2>


    <p>Chain-of-Thought (CoT) 推理极大提升了 LLM 的能力，但也带来了一个严重的副作用 —— <strong>KV Cache 爆炸</strong>。推理过程中每一步生成的
    token 都会累积到 KV Cache 中，长推理链意味着巨大的内存占用。</p>


    <p>现有解决方案的问题：</p>

    <ul>

    <li><strong>SnapKV</strong>：基于注意力权重启发式保留重要 token</li>

    <li><strong>KeyDiff</strong>：基于 key 的多样性评分</li>

    <li><strong>KNorm</strong>：基于 key 范数统计量</li>

    <li><strong>StreamingLLM</strong>：滑动窗口 + attention sinks</li>

    </ul>


    <p>这些方法的共同缺陷：都是<strong>人工设计的启发式规则</strong>，不是从任务目标中学到的。它们不知道哪些信息对最终答案真正重要。</p>


    <h2>二、核心洞察：效率是可学习的能力</h2>


    <p>NGC 的核心主张 —— <strong>效率应该像推理一样被端到端学习</strong>。</p>


    <blockquote>

    <p>"If a model can learn to reason, why can''t it learn to forget?"</p>

    </blockquote>


    <p>关键思路：将 KV Cache 的驱逐决策视为<strong>离散动作</strong>，与 token 生成一样从模型中采样，然后用<strong>同一个强化学习信号</strong>联合优化。</p>


    <p>这个闭环非常优雅：</p>

    <ol>

    <li>模型驱逐什么 → 决定它记住什么</li>

    <li>它记住什么 → 塑造它的推理</li>

    <li>推理的正确性 → 决定奖励信号</li>

    <li>奖励信号 → 反向优化驱逐策略和推理策略</li>

    </ol>


    <h2>三、NGC 方法详解</h2>


    <h3>3.1 增长-驱逐循环 (Grow-Then-Evict)</h3>


    <p>NGC 采用周期性的驱逐策略：</p>

    <ul>

    <li>每生成 <strong>δ</strong> 个 token，触发一次驱逐轮次</li>

    <li>模型对所有当前 KV Cache 条目打分</li>

    <li>保留 <strong>(1−ε)</strong> 比例的条目，永久删除其余</li>

    <li>驱逐在每一层独立进行</li>

    </ul>


    <p>数学上，峰值 Cache 大小收敛到一个<strong>稳态值</strong>：</p>


    <p><code>C* = L · (δ / ε)</code></p>


    <p>这个值与推理总长度<strong>无关</strong> —— 无论模型思考多久，Cache 大小始终有界。</p>


    <h3>3.2 用注意力机制打分（零额外参数）</h3>


    <p>NGC 的一个精妙设计：<strong>不引入任何新参数</strong>，直接复用 Transformer 自身的注意力机制来评估 KV 条目的重要性。</p>


    <p>具体做法：</p>

    <ol>

    <li>取最近 <strong>w=5</strong> 个 query</li>

    <li>计算它们对所有 prefix key 的 softmax 注意力分数</li>

    <li>跨 heads 和 queries 平均 → 每个 token 的重要性分数 ψ_t</li>

    </ol>


    <p>为了降低信用分配难度并配合硬件友好的内存访问模式，key 被分组为大小 <strong>b=32</strong> 的连续块，块级分数是块内有效 key
    分数的平均值。</p>


    <h3>3.3 Gumbel-Top-k 随机采样</h3>


    <p>驱逐不是确定性的 top-k，而是<strong>随机动作</strong> —— 这是为了支持无偏的策略梯度估计。</p>


    <ul>

    <li>对块分数加入 i.i.d. Gumbel 噪声</li>

    <li>保留噪声后分数最高的 K 个块</li>

    <li>选中子集的 log-probability 有闭式解，可用前缀和技巧高效计算</li>

    </ul>


    <h3>3.4 联合优化：一个奖励信号，两个梯度</h3>


    <p>NGC 使用 <strong>Dr. GRPO</strong>（Group Relative Policy Optimization）进行训练，核心创新是将
    token 生成和驱逐决策统一到一个优化目标下：</p>


    <p><code>L = L_token + L_mem</code></p>


    <ul>

    <li><strong>L_token</strong>：标准 RLVR 的 token 级策略梯度</li>

    <li><strong>L_mem</strong>：驱逐决策的策略梯度（每层独立求和）</li>

    </ul>


    <p><strong>关键：两者使用同一个 advantage Â_i</strong> —— 即最终任务正确性相对于组内平均的偏差。这意味着驱逐决策直接从任务成败中学习，而不是依赖任何代理目标。</p>


    <p>由于驱逐分数来自模型自身的 Q 和 K，L_mem 的梯度会流入几乎所有模型权重 —— 模型学会的不只是"何时驱逐"，还包括如何生成更容易区分重要性的
    Q/K 表示。</p>


    <h3>3.5 Replay Attention Masks</h3>


    <p>标准 RLVR 假设所有先前 token 都可见。NGC 打破了这个假设：被驱逐的 key 不再可见。为了正确计算 log-probability，NGC
    使用 <strong>Replay Attention Masks</strong> 精确复现驱逐决策导致的每层可见性模式。</p>


    <h2>四、实验结果</h2>


    <h3>4.1 Countdown 任务</h3>


    <table>

    <tr><th>方法</th><th>pass@1 准确率</th><th>峰值 Cache 压缩比</th></tr>

    <tr><td>StreamingLLM</td><td>0.2%</td><td>—</td></tr>

    <tr><td>KNorm</td><td>0.1%</td><td>—</td></tr>

    <tr><td>KeyDiff</td><td>21.2%</td><td>—</td></tr>

    <tr><td>SnapKV</td><td>7.8%</td><td>—</td></tr>

    <tr><td><strong>NGC (ours)</strong></td><td><strong>49.6%</strong></td><td><strong>2.4×</strong></td></tr>

    </table>


    <p>NGC 在 <strong>2.4× Cache 压缩</strong> 下，准确率是次优基线（KeyDiff）的 <strong>2.3 倍</strong>。</p>


    <h3>4.2 AIME 2025（数学竞赛）</h3>


    <table>

    <tr><th>方法</th><th>pass@32 准确率</th><th>峰值 Cache 压缩比</th></tr>

    <tr><td>StreamingLLM</td><td>0.0%</td><td>—</td></tr>

    <tr><td>KNorm</td><td>0.0%</td><td>—</td></tr>

    <tr><td>KeyDiff</td><td>7.1%</td><td>—</td></tr>

    <tr><td>SnapKV</td><td>10.7%</td><td>—</td></tr>

    <tr><td><strong>NGC (ours)</strong></td><td><strong>21.4%</strong></td><td><strong>4.6×</strong></td></tr>

    </table>


    <p>在 <strong>4.6× 压缩</strong> 的极端条件下，NGC 仍然达到 21.4% 的 pass@32，是 SnapKV 的 <strong>2
    倍</strong>。</p>


    <h3>4.3 AMC + AIME 综合表现</h3>


    <p>NGC 在 <strong>2–3× 峰值 KV Cache 压缩</strong> 下，保持了强劲的推理性能，全面超越所有启发式驱逐基线。</p>


    <h3>4.4 关键发现</h3>


    <ul>

    <li><strong>无监督微调、无代理目标、无预热阶段</strong> —— 纯 outcome-based reward 驱动</li>

    <li>模型学会了<strong>主动遗忘</strong>：驱逐决策不是随机的，而是与推理内容高度相关</li>

    <li>驱逐策略在不同层之间<strong>差异化</strong>：不同层学会保留不同类型的信息</li>

    </ul>


    <h2>五、为什么这个方法很重要？</h2>


    <h3>范式转变：从系统优化到能力学习</h3>


    <p>传统上，KV Cache 管理是系统工程师的工作 —— 设计启发式、调阈值、做工程优化。NGC 把它变成了<strong>模型的内在能力</strong>。</p>


    <p>这与 DeepSeek-R1 的 RLVR 范式一脉相承：</p>

    <ul>

    <li>R1 证明了推理能力可以通过纯 RL 从可验证奖励中学到</li>

    <li>NGC 证明了<strong>效率也可以</strong> —— 同一个框架，同一个信号，同时优化能力和资源</li>

    </ul>


    <h3>对本地部署的启示</h3>


    <p>对于本地模型用户（LMStudio/Ollama），NGC 的意义：</p>

    <ul>

    <li><strong>更长的 CoT 推理</strong>：同样的 GPU 内存可以支持更长的思考链</li>

    <li><strong>更大的上下文窗口</strong>：2-5× 的 Cache 压缩意味着等效上下文扩展</li>

    <li><strong>无需硬件升级</strong>：通过训练而非工程优化获得效率提升</li>

    </ul>


    <h3>局限与未来方向</h3>


    <ul>

    <li>当前仅在特定推理任务（Countdown、数学竞赛）上验证，通用任务效果待验证</li>

    <li>训练需要可验证奖励（RLVR），不适合开放式生成任务</li>

    <li>驱逐决策增加了推理时的计算开销（虽然内存大幅减少）</li>

    <li>代码尚未开源（截至 2026-04-28）</li>

    </ul>


    <h2>六、总结</h2>


    <p>Neural Garbage Collection 是一篇概念上极其优雅的论文。它没有提出新的架构，也没有设计复杂的系统 —— 它只是问了一个简单的问题：</p>


    <blockquote>

    <p>如果模型能学会推理，为什么不能学会遗忘？</p>

    </blockquote>


    <p>然后它证明了答案是：<strong>当然可以</strong>。而且遗忘和推理可以一起学，用同一个奖励信号，在同一个优化框架里。</p>


    <p>NGC 代表了一种更广泛的范式：<strong>将效率视为可学习的能力，而非工程约束</strong>。在这个范式下，模型不只是变得更聪明，还变得更"自知"
    —— 知道什么值得记住，什么可以放手。</p>


    <blockquote>

    <p><strong>论文</strong>: <a href="https://arxiv.org/abs/2604.18002v1">arXiv:2604.18002v1</a><br>

    <strong>作者</strong>: Michael Y. Li, Jubayer Ibn Hamid, Emily B. Fox, Noah D. Goodman
    (斯坦福大学)<br>

    <strong>关键词</strong>: KV Cache Eviction, Reinforcement Learning, Chain-of-Thought,
    Efficiency</p>

    </blockquote>

    '
- title: GoalAct 论文解读：全局规划 + 分层执行，LLM Agent 的 SOTA 框架
  date: April 28, 2026
  excerpt: 深入解读清华大学 GoalAct 论文（NCIIP 2025 Best Paper）。通过持续更新的全局规划和查询/编程/写作三层执行策略，在
    LegalAgentBench 上实现 12.22% 平均成功率提升。包含完整代码架构分析。
  content: '<p>今天来聊一篇来自清华大学的最新工作 —— <strong>GoalAct</strong>，一个通过<strong>全局规划</strong>和<strong>分层执行</strong>来增强
    LLM Agent 的框架。论文在 LegalAgentBench 上取得了 SOTA，平均成功率提升 <strong>12.22%</strong>，并获得了
    NCIIP 2025 Best Paper。</p>


    <h2>一、现有 Agent 框架的两大痛点</h2>


    <p>当前 LLM-based Agent 在规划和执行层面都存在明显短板：</p>


    <h3>1. 规划层面：缺乏全局视野</h3>


    <ul>

    <li><strong>ReAct</strong> 采用增量式推理（Thought → Action → Observation），没有全局目标指引，容易在多分支任务中陷入局部死胡同</li>

    <li><strong>Plan-and-Execute</strong> 虽然生成全局计划，但计划往往不可执行（超出 Agent 的动作空间）</li>

    </ul>


    <h3>2. 执行层面：复杂度与稳定性难以平衡</h3>


    <ul>

    <li><strong>纯文本/JSON 执行</strong>（如 ReAct）：简单稳定，但表达能力有限，无法处理循环、分支等复杂逻辑</li>

    <li><strong>代码执行</strong>（如 CodeAct）：动作空间大，能处理复杂逻辑，但在不可预测环境中更容易出错，且不适用于法律写作等生成任务</li>

    </ul>


    <h2>二、GoalAct 的核心设计</h2>


    <p>GoalAct 引入了两个关键创新：</p>


    <h3>创新 1：持续更新的全局规划</h3>


    <p>GoalAct 维护一个动态演化的全局计划 G_t = (P₁A₁, P₂A₂, ..., PₙAₙ)，其中 Pᵢ 是计划步骤，Aᵢ 是对应的高层级技能（而非底层细节）。最终步骤永远是
    <strong>Finish</strong>。</p>


    <p>关键特性：</p>

    <ul>

    <li>计划基于实时执行反馈动态调整</li>

    <li>同时保证战略连贯性和可执行性</li>

    <li>避免静态计划的僵化和 ReAct 的局部最优</li>

    </ul>


    <h3>创新 2：分层执行策略</h3>


    <p>GoalAct 将任务执行分解为<strong>高层级技能</strong>，模拟人类工作方式：先识别技能类型，再选择工具，最后配置参数。</p>


    <table>

    <tr><th>技能</th><th>执行格式</th><th>优势</th><th>局限</th></tr>

    <tr><td><strong>查询 (Searching)</strong></td><td>Text/JSON 工具调用</td><td>简单稳定，适合不可预测环境，便于错误分析</td><td>表达能力有限，无法处理循环/分支</td></tr>

    <tr><td><strong>编程 (Coding)</strong></td><td>Python 代码</td><td>支持复杂逻辑（分支、循环、排序、聚合），大幅扩展动作空间</td><td>复杂度高，在不可预测环境中更易出错</td></tr>

    <tr><td><strong>写作 (Writing)</strong></td><td>领域专用推理 + 内容生成</td><td>解决法律文档起草等代码/查询无法完成的任务</td><td>需要领域知识，多阶段处理（信息收集→起草→润色）</td></tr>

    </table>


    <p>技能集是<strong>可扩展的</strong>（如推理、创意、研究等技能），可根据任务动态选择。</p>


    <h2>三、实验验证：LegalAgentBench</h2>


    <h3>基准测试</h3>


    <ul>

    <li><strong>LegalAgentBench</strong>：300 个任务，无法律数据泄露风险</li>

    <li>6 种任务类型：1-hop 到 5-hop 逻辑推理（解决方案路径长度递增）+ <strong>写作</strong>（答辩书生成）</li>

    <li>任务需要法律知识和外部工具调用</li>

    </ul>


    <h3>实验设置</h3>


    <ul>

    <li>测试模型：GPT-4o-mini、Qwen-max、GLM-4-Plus（temperature=0）</li>

    <li>基线方法：Plan-and-Solve、Plan-and-Execute、ReAct、CodeAct</li>

    <li>评估指标：Success Rate（关键词匹配率）</li>

    </ul>


    <h3>核心结果</h3>


    <table>

    <tr><th>模型</th><th>GoalAct</th><th>最佳基线</th><th>提升幅度</th></tr>

    <tr><td>GPT-4o-mini</td><td>0.7720</td><td>0.6275 (CodeAct)</td><td><strong>+14.45%</strong></td></tr>

    <tr><td>Qwen-max</td><td>0.8603</td><td>0.7594 (CodeAct)</td><td><strong>+10.09%</strong></td></tr>

    <tr><td>GLM-4-Plus</td><td>0.8710</td><td>0.7499 (ReAct)</td><td><strong>+12.11%</strong></td></tr>

    </table>


    <p><strong>平均提升：12.22%</strong></p>


    <h3>关键发现</h3>


    <ul>

    <li>任务难度越高，GoalAct 优势越明显：1-hop 提升 3.26%，3-hop 提升 20%，5-hop 提升 15.5%</li>

    <li>写作任务相对提升 <strong>12.74%</strong>，证明分层执行对生成任务同样有效</li>

    <li>CodeAct 在写作任务上表现极差（无法生成法律文档），而 GoalAct 通过专用 Writing 技能完美解决</li>

    </ul>


    <h2>四、代码实现解析</h2>


    <p>GoalAct 的代码实现非常简洁（约 4,500 行 Python），核心架构清晰：</p>


    <h3>文件结构</h3>


    <table>

    <tr><th>文件</th><th>职责</th><th>行数</th></tr>

    <tr><td><code>GoalAct.py</code></td><td>项目入口，问题预处理 + 并行执行</td><td>~230</td></tr>

    <tr><td><code>act.py</code></td><td>核心执行循环：全局规划 + 行动路由</td><td>~153</td></tr>

    <tr><td><code>action.py</code></td><td>三大技能实现：查询 / 编程 / 写作</td><td>~108</td></tr>

    <tr><td><code>prompt.py</code></td><td>所有 Prompt 模板（全局规划、技能分类、示例）</td><td>~528</td></tr>

    <tr><td><code>LLM.py</code></td><td>LLM 接口封装</td><td>~50</td></tr>

    <tr><td><code>memory.py</code></td><td>记忆管理（few-shot 示例检索）</td><td>~80</td></tr>

    <tr><td><code>api.py</code></td><td>工具集定义（法律数据库 API）</td><td>~200</td></tr>

    <tr><td><code>eval.py</code></td><td>评估脚本（关键词匹配）</td><td>~93</td></tr>

    </table>


    <h3>核心执行流程（act.py）</h3>


    <p>执行循环采用经典的 ReAct 结构，但增加了<strong>全局规划层</strong>和<strong>技能路由层</strong>：</p>


    <ol>

    <li><strong>全局规划生成</strong>：每步通过 LLM 生成「思考 + 行动」，行动必须是四种类型之一（查询/编程/写作/结束）</li>

    <li><strong>行动去重</strong>：维护 action_list 避免重复执行相同行动，若重复则通过 LLM 重新规划</li>

    <li><strong>技能路由</strong>：根据行动类型路由到对应执行器

    <ul>

    <li>「查询」→ <code>Retrive()</code>：Text/JSON 工具调用</li>

    <li>「编程」→ <code>Code()</code>：Python 代码生成 + 子进程执行</li>

    <li>「写作」→ <code>Write()</code>：检索法条/类案/知识后生成文档</li>

    </ul></li>

    <li><strong>观察反馈</strong>：执行结果写入 scratchpad，作为下一步规划的历史上下文</li>

    </ol>


    <h3>编程技能的巧妙设计</h3>


    <p>Code 技能不是简单的代码生成，而是包含完整的<strong>错误恢复机制</strong>：</p>


    <ul>

    <li>代码通过 <code>subprocess.run</code> 在独立进程中执行，避免污染主进程</li>

    <li>执行失败时自动捕获 stderr，将错误信息反馈给 LLM 要求重新编程（最多 5 次重试）</li>

    <li>临时文件使用秒级时间戳 + 随机数命名，避免冲突</li>

    </ul>


    <h3>Prompt 工程亮点</h3>


    <ul>

    <li><strong>问题改写</strong>：预处理阶段对查询进行去噪、标准化（如案号格式统一、公司名称补全省份）</li>

    <li><strong>表格筛选</strong>：通过 LLM 判断问题涉及哪些数据表，减少上下文噪音</li>

    <li><strong>Few-shot 记忆</strong>：从 memory.json 中检索相似问题的解决方案作为示例，提升规划质量</li>

    <li><strong>编程示例</strong>：Prompt 中包含 3 个详细的 Python 代码示例，覆盖筛选、排序、统计等常见操作</li>

    </ul>


    <h2>五、论文 vs 代码：一致性评估</h2>


    <table>

    <tr><th>论文声明</th><th>代码验证</th><th>状态</th></tr>

    <tr><td>全局规划机制</td><td><code>act.py</code> 每步调用 LLM 生成规划，scratchpad 维护历史</td><td>✅
    已实现</td></tr>

    <tr><td>分层执行（查询/编程/写作）</td><td><code>action.py</code> 中三个独立函数实现</td><td>✅ 已实现</td></tr>

    <tr><td>LegalAgentBench 评估</td><td><code>eval.py</code> 关键词匹配 + BERTScore 双指标</td><td>✅
    已实现</td></tr>

    <tr><td>12.22% 平均提升</td><td>可复现（代码完整，数据集需申请）</td><td>✅ 可验证</td></tr>

    <tr><td>技能可扩展</td><td>Prompt 中硬编码 3 种技能，扩展需修改 <code>act.py</code> 路由逻辑</td><td>⚠️
    需手动扩展</td></tr>

    </table>


    <h2>六、实用洞察与集成建议</h2>


    <h3>GoalAct 适合什么场景？</h3>


    <ul>

    <li><strong>多步推理任务</strong>：需要跨多个数据源查询、筛选、聚合的复杂工作流</li>

    <li><strong>混合任务类型</strong>：同时包含信息检索、数据处理和内容生成的场景</li>

    <li><strong>领域专用 Agent</strong>：法律、医疗、金融等有明确工具集和输出格式的领域</li>

    </ul>


    <h3>集成到 Hermes 的潜在路径</h3>


    <ol>

    <li><strong>MCP Server 化</strong>：将 GoalAct 的查询/编程/写作技能封装为 MCP Tools，Hermes 通过
    MCP 协议调用</li>

    <li><strong>Prompt 层借鉴</strong>：将 GoalAct 的全局规划 Prompt 和技能路由逻辑融入 Hermes 的 agent
    配置</li>

    <li><strong>法律领域扩展</strong>：GoalAct 的法律工具集（LegalDoc、CourtInfo、CompanyInfo 等）可作为垂直领域
    MCP Server 参考</li>

    </ol>


    <h3>局限性</h3>


    <ul>

    <li><strong>领域耦合</strong>：当前实现深度绑定中国法律数据库，通用化需要重构 api.py 和 schema</li>

    <li><strong>单 Agent 架构</strong>：没有多 Agent 协作，复杂任务完全依赖单实例的 10 步循环</li>

    <li><strong>硬编码技能</strong>：新增技能需要修改 act.py 的路由逻辑和 prompt.py 的模板</li>

    <li><strong>中文特化</strong>：问题改写、法条检索等模块对中文法律文本有强依赖</li>

    </ul>


    <h2>七、总结</h2>


    <p>GoalAct 的核心价值在于证明了<strong>「全局规划 + 分层执行」</strong>这一设计范式在复杂 Agent 任务中的有效性。它不是通过更复杂的架构取胜，而是通过更合理的任务分解和更灵活的执行策略，在已有
    LLM 能力基础上榨取更多性能。</p>


    <p>对于构建垂直领域 Agent 的开发者来说，GoalAct 提供了一个极具参考价值的实现模板：如何用不到 5,000 行代码，在特定领域实现 SOTA
    性能。</p>


    <blockquote>

    <p><strong>论文</strong>: <a href="https://arxiv.org/abs/2504.16563">arXiv:2504.16563</a><br>

    <strong>代码</strong>: <a href="https://github.com/cjj826/GoalAct">github.com/cjj826/GoalAct</a><br>

    <strong>作者</strong>: Junjie Chen, Haitao Li, Jingli Yang, Yiqun Liu, Qingyao Ai
    (清华大学)<br>

    <strong>奖项</strong>: NCIIP 2025 Best Paper</p>

    </blockquote>

    '
- title: Memora：个性化 Agent 长期记忆基准评测深度解析
  date: April 28, 2026
  excerpt: 从记忆、推理到推荐 — 深度解析 Memora 基准测试如何评估个性化 Agent 的长期记忆能力，以及 FAMA 指标对过时记忆的惩罚机制。
  content: "<br>\n<h2>背景：现有基准的局限</h2>\n<br>\n<p>个性化 Agent 需要在<strong>数周至数月</strong>的长周期内与用户保持连续对话，并动态更新记忆。然而现有基准测试主要聚焦于<strong>事实检索</strong>——从历史对话中提取过去的事实。这种评估方式严重低估了\
    \ Agent 实际面临的核心挑战：</p>\n<br>\n<ul>\n<li><strong>记忆整合</strong>：新信息如何与旧知识融合？冲突时如何处理？</li>\n\
    <li><strong>遗忘机制</strong>：何时应该\"忘记\"过时的信息？</li>\n<li><strong>知识更新</strong>：用户偏好变化时，Agent\
    \ 能否及时同步？</li>\n</ul>\n<br>\n<h2>Memora 基准测试</h2>\n<br>\n<h3>核心设计</h3>\n<br>\n\
    <p>Memora 模拟了<strong>数周至数月</strong>的用户对话，评估三个核心记忆任务：</p>\n<br>\n<table>\n<tr><th>任务</th><th>评估内容</th></tr>\n\
    <tr><td><strong>Remembering</strong></td><td>Agent 能否准确记住跨会话的关键信息</td></tr>\n\
    <tr><td><strong>Reasoning</strong></td><td>能否基于记忆进行正确推理和决策</td></tr>\n<tr><td><strong>Recommending</strong></td><td>能否根据记忆推荐符合用户当前状态的内容</td></tr>\n\
    </table>\n<br>\n<h3>数据构建流程</h3>\n<br>\n<pre><code class=\"language-\">\nSeed Data\
    \ → Session Simulation → Conversation Generation\n    ↓              ↓       \
    \             ↓\n Personas     Multi-turn           Realistic\n (角色设定)    Sessions\
    \             Dialogues\n              (会话模拟)            (对话生成)\n</code></pre>\n\
    <br>\n<h4>1. Seed Data Design</h4>\n<p>定义多个<strong>角色 (Persona)</strong>，每个角色有：</p>\n\
    <ul>\n<li>基本人口统计信息</li>\n<li>兴趣领域和偏好</li>\n<li>生活事件时间线</li>\n<li>关系网络</li>\n</ul>\n\
    <br>\n<h4>2. Session Simulation</h4>\n<p>模拟多轮会话，包含：</p>\n<ul>\n<li>日常对话（天气、新闻）</li>\n\
    <li>信息咨询（餐厅、电影推荐）</li>\n<li>情感支持（工作压力、人际关系）</li>\n<li>知识讨论（技术话题、兴趣爱好）</li>\n</ul>\n\
    <br>\n<h4>3. Conversation Generation</h4>\n<p>使用 LLM 生成符合角色设定的真实对话，并通过：</p>\n\
    <ul>\n<li><strong>Automated Grounding Checks</strong>：验证生成内容与 seed data 的一致性</li>\n\
    <li><strong>Human Evaluation</strong>：人工质量审核</li>\n</ul>\n<br>\n<h2>FAMA：遗忘感知记忆准确度</h2>\n\
    <br>\n<p>这是本文最重要的创新。现有的记忆评估指标（如准确率）存在一个根本缺陷：<strong>它奖励 Agent 使用任何记忆，即使该记忆已经被更新或失效。</strong></p>\n\
    <br>\n<p><strong>Example</strong>：</p>\n<ul>\n<li>Session 1：用户说\"我最喜欢的颜色是蓝色\"\
    </li>\n<li>Session 5：用户说\"我现在更喜欢绿色了\"</li>\n<li>Session 10：Agent 基于\"蓝色\"回答 →\
    \ 传统指标认为正确，FAMA 认为错误</li>\n</ul>\n<br>\n<p>FAMA 公式：</p>\n<br>\n<pre><code class=\"\
    language-\">\nFAMA = Accuracy × (1 - Obsolescence_Penalty)\n\n其中 Obsolescence_Penalty\
    \ 取决于：\n- 记忆被更新的时间（距今多久）\n- 更新后的新信息与原记忆的冲突程度\n- 记忆被引用的上下文是否仍然适用\n</code></pre>\n\
    <br>\n<h2>实验结果</h2>\n<br>\n<h3>评测设置</h3>\n<br>\n<p>评测了 <strong>4 个 LLM</strong>\
    \ 和 <strong>6 个 Memory Agent</strong>：</p>\n<ul>\n<li>LLM：GPT-4、Claude、Llama 等</li>\n\
    <li>Memory Agent：RAG 系统、对话摘要工具、记忆增强框架等</li>\n</ul>\n<br>\n<h3>关键发现</h3>\n<br>\n\
    <table>\n<tr><th>问题</th><th>比例</th><th>说明</th></tr>\n<tr><td>复用无效记忆</td><td>高频</td><td>Agent\
    \ 倾向于使用最早的记忆，即使已有更新</td></tr>\n<tr><td>记忆冲突处理失败</td><td>显著</td><td>无法正确整合矛盾的新旧信息</td></tr>\n\
    <tr><td>记忆增强框架帮助有限</td><td>边际</td><td>现有 Memory Agent 改进效果不显著</td></tr>\n</table>\n\
    <br>\n<h3>典型失败案例</h3>\n<br>\n<blockquote>\n<p><strong>Case 1: Preference Drift</strong></p>\n\
    <p>用户 3 个月前表示喜欢动作片 → 2 个月前改为喜欢喜剧 → 现在问\"推荐一部电影\"</p>\n<p>Agent 推荐动作片 → FAMA 惩罚：使用了\
    \ 3 个月前的过时偏好</p>\n</blockquote>\n<br>\n<blockquote>\n<p><strong>Case 2: Fact Update</strong></p>\n\
    <p>用户曾说在 Google 工作 → 1 个月前换到 Meta → 现在问\"你在哪里工作\"</p>\n<p>Agent 回答 Google → FAMA\
    \ 判定：错误（使用了过期信息）</p>\n</blockquote>\n<br>\n<h2>误差分析</h2>\n<br>\n<h3>主要原因</h3>\n\
    <ol>\n<li><strong>位置偏差</strong>：LLM 倾向于过度权重最近和最早的信息（primacy/recency effect）</li>\n\
    <li><strong>确认偏差</strong>：Agent 更频繁地使用首次建立的信息，即使后来被更新</li>\n<li><strong>推理链路断裂</strong>：无法追踪记忆的时间线和因果关系</li>\n\
    <li><strong>更新信号弱</strong>：新信息未给 Agent 足够强的\"遗忘\"信号</li>\n</ol>\n<br>\n<h3>Memory\
    \ Agent 的不足</h3>\n<p>即使引入了专门的记忆增强框架，Agent 仍然：</p>\n<ul>\n<li>无法自动识别哪些记忆已经\"过期\"\
    </li>\n<li>缺乏显式的记忆版本控制机制</li>\n<li>对话摘要策略过于简单，无法捕捉细粒度的偏好变化</li>\n</ul>\n<br>\n\
    <h2>对 Agent 设计的启示</h2>\n<br>\n<h3>1. 记忆时间戳是基础</h3>\n<p>所有记忆必须带有时间戳和有效期标记，支持 TTL\
    \ 过期机制。</p>\n<br>\n<h3>2. 冲突检测与解决</h3>\n<p>当新信息与旧记忆冲突时，需要：</p>\n<ul>\n<li>显式标记冲突</li>\n\
    <li>优先使用最近的、经过确认的信息</li>\n<li>保留更新历史用于可解释性</li>\n</ul>\n<br>\n<h3>3. 遗忘机制的主动触发</h3>\n\
    <p>不能被动地\"不使用\"过时记忆，而要主动删除或归档：</p>\n<ul>\n<li>基于时间的自动过期</li>\n<li>基于重要性的分级存储</li>\n\
    <li>基于冲突的强制更新</li>\n</ul>\n<br>\n<h3>4. 可配置的 FAMA 类评分</h3>\n<p>在 Agent 评估中引入时间敏感的记忆准确度指标，而不是简单的结果正确率。</p>\n\
    <br>\n<h2>结论</h2>\n<br>\n<p>Memora 基准测试揭示了一个关键问题：<strong>当前个性化 Agent 的记忆能力远未成熟</strong>。现有的\
    \ Memory Agent 方案在 FAMA 指标下表现平平，而 LLM 本身对过时记忆的处理也存在系统性偏差。</p>\n<br>\n<p>这篇论文的重要贡献在于：</p>\n\
    <ol>\n<li>提出了更贴近实际的长期记忆评估范式</li>\n<li>设计了 FAMA 指标，惩罚对过时记忆的依赖</li>\n<li>通过大规模实验暴露了当前系统的真实短板</li>\n\
    </ol>\n<br>\n<p>对于构建生产级个性化 Agent 的团队，Memora 提供了：</p>\n<ul>\n<li>一个可靠的评估框架</li>\n\
    <li>一个可量化的改进目标</li>\n<li>一组典型的失败模式作为设计反例</li>\n</ul>\n<br>\n<hr>\n<br>\n<h2>参考资料</h2>\n\
    <ul>\n<li>论文：<a href=\"https://arxiv.org/abs/2604.20006v1\">From Recall to Forgetting:\
    \ Benchmarking Long-Term Memory for Personalized Agents</a></li>\n<li>作者：Md Nayem\
    \ Uddin, Kumar Shubham, Eduardo Blanco, Chitta Baral, Gengyu Wang</li>\n<li>发布日期：2026-04-21</li>\n\
    </ul>\n<br>\n<hr>\n<br>\n<p><em>分析时间：2026-04-28</em></p>\n"
- title: GBrain MCP 集成技术日志
  date: April 26, 2026
  excerpt: 详细记录 GBrain (PostgreSQL + pgvector 知识大脑) 通过 MCP 协议集成到 Hermes Agent 的完整过程。覆盖
    ARM64 适配、中文搜索支持、进程管理等核心挑战与解决方案。
  content: "<br>\n<h2>目录</h2>\n<br>\n<p>1. <a href=\"#1-项目背景与目标\">项目背景与目标</a></p>\n\
    <p>2. <a href=\"#2-环境准备\">环境准备</a></p>\n<p>3. <a href=\"#3-phase-1-底层验证\">Phase\
    \ 1: 底层验证</a></p>\n<p>4. <a href=\"#4-phase-2-mcp-集成\">Phase 2: MCP 集成</a></p>\n\
    <p>5. <a href=\"#5-phase-3-优化与持久化\">Phase 3: 优化与持久化</a></p>\n<p>6. <a href=\"\
    #6-核心问题与解决方案\">核心问题与解决方案</a></p>\n<p>7. <a href=\"#7-最终工作流程\">最终工作流程</a></p>\n\
    <p>8. <a href=\"#8-文件修改清单\">文件修改清单</a></p>\n<p>9. <a href=\"#9-附录-常用命令速查\">附录:\
    \ 常用命令速查</a></p>\n<br>\n<hr>\n<br>\n<h2>1. 项目背景与目标</h2>\n<br>\n<h3>1.1 什么是 GBrain</h3>\n\
    <br>\n<p>GBrain 是 Garry Tan 开发的开源个人知识大脑，基于 PostgreSQL + pgvector 构建，提供：</p>\n\
    <br>\n<p>- <strong>知识图谱</strong>: 页面之间的自动链接提取</p>\n<p>- <strong>向量搜索</strong>:\
    \ 语义相似度检索</p>\n<p>- <strong>全文搜索</strong>: PostgreSQL FTS (Full-Text Search)</p>\n\
    <p>- <strong>混合搜索</strong>: RRF (Reciprocal Rank Fusion) 融合关键词 + 向量结果</p>\n<p>-\
    \ <strong>MCP 协议</strong>: 通过 Model Context Protocol 与 AI Agent 集成</p>\n<br>\n\
    <h3>1.2 集成目标</h3>\n<br>\n<p>将 GBrain 通过 MCP 协议集成到 Hermes Agent 中，使 Hermes 能够：</p>\n\
    <br>\n<p>1. 持久化存储对话中的重要信息到知识图谱</p>\n<p>2. 通过语义搜索检索历史知识</p>\n<p>3. 自动提取实体关系构建知识网络</p>\n\
    <br>\n<h3>1.3 平台挑战</h3>\n<br>\n<table>\n<tr><th>挑战</th><th>说明</th></tr>\n<tr><td>Bun\
    \ WASM 限制</td><td>`bun build` 的二进制在 ARM64 上无法运行 WASM，必须用 `bun src/cli.ts`</td></tr>\n\
    <tr><td>中文支持</td><td>PostgreSQL `english` 分词器不支持中文</td></tr>\n<tr><td>网络代理</td><td>通过\
    \ mihomo (127.0.0.1:7890) 访问外部 API</td></tr>\n</table>\n<br>\n<hr>\n<br>\n<h2>2.\
    \ 环境准备</h2>\n<br>\n<h3>2.1 已安装依赖</h3>\n<br>\n<pre><code class=\"language-bash\"\
    >\n# 系统级\n- Debian trixie (aarch64)\n- Ollama 0.6.6 (本地 LLM 推理)\n- Tailscale 1.96.4\
    \ (异地组网)\n- mihomo (HTTP 代理 127.0.0.1:7890)\n\n# 应用级\n- Bun (JavaScript 运行时)\n\
    - Node.js / npm\n- Python 3 + Hermes Agent v0.11.0\n</code></pre>\n<br>\n<h3>2.2\
    \ GBrain 安装</h3>\n<br>\n<pre><code class=\"language-bash\">\n# 克隆仓库\ngit clone\
    \ https://github.com/garrytan/gbrain.git ~/gbrain\ncd ~/gbrain\n\n# 安装依赖\nbun\
    \ install\n\n# 验证安装\nbun src/cli.ts --help\n</code></pre>\n<br>\n<h3>2.3 嵌入模型配置</h3>\n\
    <br>\n<p>由于无法使用 OpenAI 官方 API，改用 <strong>BitFun 提供的 Qwen3-Embedding-0.6B</strong>：</p>\n\
    <br>\n<table>\n<tr><th>参数</th><th>值</th></tr>\n<tr><td>维度</td><td>1024</td></tr>\n\
    <tr><td>API 端点</td><td>`https://api.openbitfun.com/v1`</td></tr>\n<tr><td>费用</td><td>免费</td></tr>\n\
    </table>\n<br>\n<hr>\n<br>\n<h2>3. Phase 1: 底层验证</h2>\n<br>\n<h3>3.1 目标</h3>\n\
    <br>\n<p>验证 GBrain 核心功能在 ARM64 + 自定义嵌入模型下正常工作。</p>\n<br>\n<h3>3.2 修改嵌入层</h3>\n\
    <br>\n<p><strong>文件</strong>: <code>src/core/embedding.ts</code></p>\n<br>\n<p>原始代码硬编码了\
    \ OpenAI 的 <code>text-embedding-3-large</code> (3072 维)，需要修改为支持环境变量配置：</p>\n<br>\n\
    <pre><code class=\"language-typescript\">\n// 修改前: 硬编码 OpenAI 配置\nconst DEFAULT_MODEL\
    \ = 'text-embedding-3-large';\nconst DEFAULT_DIMS = 3072;\n\n// 修改后: 支持环境变量\n\
    const DEFAULT_MODEL = process.env.GBRAIN_EMBED_MODEL || 'text-embedding-3-large';\n\
    const DEFAULT_DIMS = parseInt(process.env.GBRAIN_EMBED_DIMENSIONS || '3072', 10);\n\
    const DEFAULT_BASE_URL = process.env.GBRAIN_EMBED_BASE_URL;\nconst DEFAULT_API_KEY\
    \ = process.env.GBRAIN_EMBED_API_KEY;\n</code></pre>\n<br>\n<h3>3.3 修改 Schema\
    \ 维度</h3>\n<br>\n<p><strong>文件</strong>: <code>src/core/pglite-schema.ts</code></p>\n\
    <br>\n<pre><code class=\"language-typescript\">\n// 修改前\nembedding vector(3072),\n\
    model TEXT NOT NULL DEFAULT 'text-embedding-3-large',\n\n// 修改后\nembedding vector(1024),\n\
    model TEXT NOT NULL DEFAULT 'Qwen/Qwen3-Embedding-0.6B',\n</code></pre>\n<br>\n\
    <h3>3.4 初始化数据库</h3>\n<br>\n<pre><code class=\"language-bash\">\nexport GBRAIN_EMBED_MODEL=\"\
    Qwen/Qwen3-Embedding-0.6B\"\nexport GBRAIN_EMBED_DIMENSIONS=\"1024\"\nexport GBRAIN_EMBED_BASE_URL=\"\
    https://api.openbitfun.com/v1\"\nexport GBRAIN_EMBED_API_KEY=\"sk-xxx\"\n\ncd\
    \ ~/gbrain\nbun src/cli.ts init\n</code></pre>\n<br>\n<p><strong>输出</strong>:</p>\n\
    <pre><code class=\"language-\">\nBrain ready at /home/harryfan/.gbrain/brain.pglite\n\
    0 pages. Engine: PGLite (local Postgres).\n</code></pre>\n<br>\n<h3>3.5 验证核心功能</h3>\n\
    <br>\n<pre><code class=\"language-bash\">\n# 添加测试页面\necho \"# GBrain 树莓派测试\n\n\
    这是一个测试页面。\" | bun src/cli.ts put raspberry-pi-test\n\n# 查看统计\nbun src/cli.ts stats\n\
    # Pages: 1, Chunks: 1, Embedded: 1\n\n# 搜索测试\nbun src/cli.ts search \"测试\"\n#\
    \ [0.3040] raspberry-pi-test -- # GBrain 树莓派测试\n</code></pre>\n<br>\n<h3>3.6 Phase\
    \ 1 结论</h3>\n<br>\n<p>✅ GBrain 在 ARM64 + Qwen Embedding 下工作正常</p>\n<br>\n<hr>\n\
    <br>\n<h2>4. Phase 2: MCP 集成</h2>\n<br>\n<h3>4.1 目标</h3>\n<br>\n<p>将 GBrain 作为\
    \ MCP Server 接入 Hermes Agent。</p>\n<br>\n<h3>4.2 MCP 协议简介</h3>\n<br>\n<p>Model\
    \ Context Protocol (MCP) 是 Anthropic 提出的标准协议，允许 AI Agent 通过 stdio 或 SSE 与外部工具通信：</p>\n\
    <br>\n<pre><code class=\"language-\">\n┌─────────────┐     stdio      ┌─────────────────┐\n\
    │ Hermes Agent │ ◄────────────► │ GBrain MCP Server│\n│  (Client)   │   JSON-RPC\
    \     │   (stdio mode)   │\n└─────────────┘                └─────────────────┘\n\
    </code></pre>\n<br>\n<h3>4.3 创建 MCP 启动脚本</h3>\n<br>\n<p><strong>文件</strong>: <code>~/gbrain/start-mcp.sh</code></p>\n\
    <br>\n<pre><code class=\"language-bash\">\n#!/bin/bash\nexport PATH=\"$HOME/.bun/bin:$PATH\"\
    \nexport GBRAIN_EMBED_MODEL=\"Qwen/Qwen3-Embedding-0.6B\"\nexport GBRAIN_EMBED_DIMENSIONS=\"\
    1024\"\nexport GBRAIN_EMBED_BASE_URL=\"https://api.openbitfun.com/v1\"\nexport\
    \ GBRAIN_EMBED_API_KEY=\"sk-xxx\"\n\n# 清理可能残留的进程\npkill -9 -f \"bun src/cli.ts\
    \ serve\" 2>/dev/null\nsleep 1\n\ncd \"$HOME/gbrain\"\nexec bun src/cli.ts serve\
    \ --stdio 2>/dev/null\n</code></pre>\n<br>\n<p>> <strong>关键</strong>: <code>exec</code>\
    \ 确保子进程替换 shell 进程，<code>2>/dev/null</code> 防止日志干扰 MCP 协议解析。</p>\n<br>\n<h3>4.4\
    \ 配置 Hermes MCP</h3>\n<br>\n<p><strong>文件</strong>: <code>~/.hermes/config.yaml</code></p>\n\
    <br>\n<pre><code class=\"language-yaml\">\nmcp:\n  gbrain:\n    command: /home/harryfan/gbrain/start-mcp.sh\n\
    \    timeout: 180\n    connect_timeout: 120\n</code></pre>\n<br>\n<p>> <strong>注意</strong>:\
    \ <code>connect_timeout</code> 必须设长（120s），因为 PGLite 首次初始化需要 ~30 秒。</p>\n<br>\n\
    <h3>4.5 发现 MCP 工具</h3>\n<br>\n<pre><code class=\"language-python\">\n# 在 Hermes\
    \ 中调用\nfrom hermes_agent.tools.mcp_tool import discover_mcp_tools\n\ntools = await\
    \ discover_mcp_tools()\nprint(f\"发现 {len(tools)} 个工具\")\n</code></pre>\n<br>\n\
    <p><strong>输出</strong>:</p>\n<pre><code class=\"language-\">\n发现 45 个 GBrain 工具\n\
    连接耗时: 0.8s\n</code></pre>\n<br>\n<p>工具列表包括：</p>\n<p>- <code>get_stats</code> -\
    \ 获取数据库统计</p>\n<p>- <code>list_pages</code> - 列出所有页面</p>\n<p>- <code>get_page</code>\
    \ - 获取单个页面</p>\n<p>- <code>put_page</code> - 创建/更新页面</p>\n<p>- <code>query</code>\
    \ - 混合搜索</p>\n<p>- <code>search_keyword</code> - 关键词搜索</p>\n<p>- <code>search_vector</code>\
    \ - 向量搜索</p>\n<p>- ... (共 45 个)</p>\n<br>\n<h3>4.6 验证工具调用</h3>\n<br>\n<pre><code\
    \ class=\"language-python\">\n# 测试 get_stats\nresult = await handle_function_call(\"\
    get_stats\", {})\n# {\"pages\": 6, \"chunks\": 6, \"embedded\": 2, \"links\":\
    \ 1, \"tags\": 9}\n\n# 测试 put_page\nresult = await handle_function_call(\"put_page\"\
    , {\n    \"slug\": \"hermes-mcp-integration\",\n    \"content\": \"# Hermes Agent\
    \ MCP Integration\\n\\nIntegration verified...\"\n})\n# {\"slug\": \"hermes-mcp-integration\"\
    , \"status\": \"created_or_updated\"}\n\n# 测试 query\nresult = await handle_function_call(\"\
    query\", {\n    \"query\": \"MCP integration\"\n})\n# 返回搜索结果列表\n</code></pre>\n\
    <br>\n<h3>4.7 关键问题: 进程残留</h3>\n<br>\n<p><strong>现象</strong>: 每次 MCP 调用后，<code>bun\
    \ src/cli.ts serve</code> 进程未自动关闭，导致后续调用卡死。</p>\n<br>\n<p><strong>原因</strong>:\
    \ Hermes 的 <code>_run_on_mcp_loop</code> 没有正确管理子进程生命周期。</p>\n<br>\n<p><strong>临时解决方案</strong>:</p>\n\
    <pre><code class=\"language-bash\">\n# 每次调用前清理残留进程\npkill -9 -f \"bun src/cli.ts\
    \ serve\"\n</code></pre>\n<br>\n<p><strong>长期方案</strong>: Phase 3a 创建管理脚本。</p>\n\
    <br>\n<h3>4.8 Phase 2 结论</h3>\n<br>\n<p>✅ MCP 集成成功，45 个工具可用</p>\n<p>⚠️ 进程残留问题待优化（Phase\
    \ 3 解决）</p>\n<br>\n<hr>\n<br>\n<h2>5. Phase 3: 优化与持久化</h2>\n<br>\n<h3>5.1 3a:\
    \ 进程管理脚本</h3>\n<br>\n<p><strong>问题</strong>: MCP 调用后 GBrain 进程残留</p>\n<br>\n<p><strong>解决方案</strong>:\
    \ 创建管理脚本</p>\n<br>\n<p><strong>文件</strong>: <code>~/gbrain/gbrain-manager.sh</code></p>\n\
    <br>\n<pre><code class=\"language-bash\">\n#!/bin/bash\nGBRAIN_DIR=\"$HOME/gbrain\"\
    \nPIDFILE=\"/tmp/gbrain-mcp.pid\"\nexport PATH=\"$HOME/.bun/bin:$PATH\"\nexport\
    \ GBRAIN_EMBED_MODEL=\"Qwen/Qwen3-Embedding-0.6B\"\nexport GBRAIN_EMBED_DIMENSIONS=\"\
    1024\"\nexport GBRAIN_EMBED_BASE_URL=\"https://api.openbitfun.com/v1\"\nexport\
    \ GBRAIN_EMBED_API_KEY=\"sk-xxx\"\n\ncase \"$1\" in\n    start)\n        pkill\
    \ -f \"bun src/cli.ts serve\" 2>/dev/null\n        sleep 1\n        cd \"$GBRAIN_DIR\"\
    \n        bun src/cli.ts serve --stdio > /dev/null 2>&1 &\n        echo $! > \"\
    $PIDFILE\"\n        echo \"Started (PID: $(cat $PIDFILE))\"\n        sleep 2\n\
    \        ;;\n    stop)\n        [ -f \"$PIDFILE\" ] && kill -9 $(cat \"$PIDFILE\"\
    ) 2>/dev/null\n        rm -f \"$PIDFILE\"\n        pkill -9 -f \"bun src/cli.ts\
    \ serve\" 2>/dev/null\n        echo \"Stopped\"\n        ;;\n    status)\n   \
    \     if [ -f \"$PIDFILE\" ] && kill -0 $(cat \"$PIDFILE\") 2>/dev/null; then\n\
    \            echo \"Running (PID: $(cat $PIDFILE))\"\n        else\n         \
    \   echo \"Not running\"\n        fi\n        ;;\n    *) echo \"Usage: $0 {start|stop|status}\"\
    \ ;;\nesac\n</code></pre>\n<br>\n<p><strong>使用</strong>:</p>\n<pre><code class=\"\
    language-bash\">\n~/gbrain/gbrain-manager.sh start   # 启动\n~/gbrain/gbrain-manager.sh\
    \ stop    # 停止\n~/gbrain/gbrain-manager.sh status  # 查看状态\n</code></pre>\n<br>\n\
    <h3>5.2 3b: 持久化环境变量</h3>\n<br>\n<p><strong>文件</strong>: <code>~/.profile</code></p>\n\
    <br>\n<pre><code class=\"language-bash\">\n# ── GBrain 环境变量 ─────────────────────────────────────────────\n\
    export GBRAIN_EMBED_MODEL=\"Qwen/Qwen3-Embedding-0.6B\"\nexport GBRAIN_EMBED_DIMENSIONS=\"\
    1024\"\nexport GBRAIN_EMBED_BASE_URL=\"https://api.openbitfun.com/v1\"\nexport\
    \ GBRAIN_EMBED_API_KEY=\"sk-xxx\"\nexport PATH=\"$HOME/.bun/bin:$PATH\"\n# ────────────────────────────────────────────────────────────────\n\
    </code></pre>\n<br>\n<p><strong>文件</strong>: <code>~/.gbrain/env.sh</code> (供脚本\
    \ source 使用)</p>\n<br>\n<pre><code class=\"language-bash\">\nexport GBRAIN_EMBED_MODEL=\"\
    Qwen/Qwen3-Embedding-0.6B\"\nexport GBRAIN_EMBED_DIMENSIONS=\"1024\"\nexport GBRAIN_EMBED_BASE_URL=\"\
    https://api.openbitfun.com/v1\"\nexport GBRAIN_EMBED_API_KEY=\"sk-xxx\"\nexport\
    \ PATH=\"$HOME/.bun/bin:$PATH\"\n</code></pre>\n<br>\n<h3>5.3 3c: 中文搜索支持</h3>\n\
    <br>\n<p><strong>问题</strong>: PostgreSQL <code>english</code> 分词器不支持中文</p>\n<br>\n\
    <p><strong>分析</strong>:</p>\n<pre><code class=\"language-sql\">\n-- english 分词器行为\n\
    SELECT to_tsvector('english', '中文知识图谱测试');\n-- 结果: '' (空，所有中文被过滤)\n\n-- simple\
    \ 分词器行为\nSELECT to_tsvector('simple', '中文知识图谱测试');\n-- 结果: ''中文知识图谱测试':1' (整句作为一个词)\n\
    </code></pre>\n<br>\n<p><strong>核心问题</strong>: <code>simple</code> 分词器对中文按整句分词，导致子串搜索失败：</p>\n\
    <pre><code class=\"language-sql\">\nSELECT to_tsvector('simple', '中文知识图谱测试') \n\
    \       @@ plainto_tsquery('simple', '知识');\n-- 结果: false (\"知识\" 不等于 \"中文知识图谱测试\"\
    )\n</code></pre>\n<br>\n<p><strong>解决方案</strong>: 双重策略</p>\n<br>\n<p>1. <strong>全局替换</strong>\
    \ <code>english</code> → <code>simple</code>（支持中英文混合）</p>\n<p>2. <strong>CJK Fallback</strong>:\
    \ 当 tsvector 无结果时，自动使用 <code>ILIKE</code> 匹配</p>\n<br>\n<p><strong>修改 1</strong>:\
    \ <code>src/core/pglite-schema.ts</code></p>\n<br>\n<pre><code class=\"language-sql\"\
    >\n-- 修改前\nsetweight(to_tsvector('english', coalesce(NEW.title, '')), 'A')\n\n\
    -- 修改后\nsetweight(to_tsvector('simple', coalesce(NEW.title, '')), 'A')\n</code></pre>\n\
    <br>\n<p><strong>修改 2</strong>: <code>src/core/pglite-engine.ts</code></p>\n<br>\n\
    <pre><code class=\"language-typescript\">\n// 修改搜索 SQL\nts_rank(cc.search_vector,\
    \ websearch_to_tsquery('simple', $1))\n\n// 添加 CJK Fallback\nif (rows.length ===\
    \ 0 && /[\\u4e00-\\u9fff\\u3040-\\u309f\\u30a0-\\u30ff\\uac00-\\ud7af]/.test(query))\
    \ {\n  // 使用 ILIKE 进行子串匹配\n  const likePattern = `%${query}%`;\n  // ... ILIKE\
    \ 查询\n}\n</code></pre>\n<br>\n<p><strong>效果</strong>:</p>\n<p>- 英文查询: <code>websearch_to_tsquery('simple',\
    \ query)</code> → 精确匹配</p>\n<p>- 中文查询: tsvector 失败 → 自动 fallback 到 <code>ILIKE\
    \ '%关键词%'</code></p>\n<br>\n<h3>5.4 3d: 宽松 Dedup 阈值</h3>\n<br>\n<p><strong>问题</strong>:\
    \ 小数据集下搜索结果容易被过滤为空</p>\n<br>\n<p><strong>分析</strong>: GBrain 的 4 层去重管道过于严格：</p>\n\
    <br>\n<table>\n<tr><th>层级</th><th>原始值</th><th>修改后</th><th>说明</th></tr>\n<tr><td>类型多样性比例</td><td>0.6</td><td>0.8</td><td>同类型页面占比上限</td></tr>\n\
    <tr><td>每页最大块数</td><td>2</td><td>3</td><td>每页保留的 chunk 数</td></tr>\n</table>\n\
    <br>\n<p><strong>文件</strong>: <code>src/core/search/dedup.ts</code></p>\n<br>\n\
    <pre><code class=\"language-typescript\">\n// 修改前\nconst COSINE_DEDUP_THRESHOLD\
    \ = 0.85;\nconst MAX_TYPE_RATIO = 0.6;\nconst MAX_PER_PAGE = 2;\n\n// 修改后\nconst\
    \ COSINE_DEDUP_THRESHOLD = 0.92;\nconst MAX_TYPE_RATIO = 0.8;\nconst MAX_PER_PAGE\
    \ = 3;\n</code></pre>\n<br>\n<h3>5.5 3e: 验证与备份</h3>\n<br>\n<p><strong>测试验证</strong>:</p>\n\
    <br>\n<pre><code class=\"language-bash\">\n# 中文搜索\n$ bun src/cli.ts search \"\
    知识\"\n[0.5000] chinese-knowledge -- # 中文知识图谱测试\n\n# 英文搜索\n$ bun src/cli.ts search\
    \ \"Graph\"\n[0.3040] english-knowledge -- # English Knowledge Graph Test\n\n\
    # 混合搜索\n$ bun src/cli.ts search \"test\"\n[0.3040] english-knowledge -- # English\
    \ Knowledge Graph Test\n</code></pre>\n<br>\n<p><strong>备份</strong>:</p>\n<pre><code\
    \ class=\"language-bash\">\n~/.gbrain-backup-phase3-20260426-163533/\n├── pglite-schema.ts\
    \      # FTS simple 分词器\n├── pglite-engine.ts      # simple 搜索 + CJK fallback\n\
    ├── dedup.ts              # 宽松阈值\n├── start-mcp.sh          # MCP 启动脚本\n├── gbrain-manager.sh\
    \     # 进程管理脚本\n├── config.yaml           # Hermes MCP 配置\n└── MODIFICATIONS.md\
    \      # 修改摘要\n</code></pre>\n<br>\n<hr>\n<br>\n<h2>6. 核心问题与解决方案</h2>\n<br>\n\
    <h3>6.1 问题汇总表</h3>\n<br>\n<table>\n<tr><th>#</th><th>问题</th><th>原因</th><th>解决方案</th></tr>\n\
    <tr><td>2</td><td>嵌入模型不兼容</td><td>硬编码 OpenAI 3072 维</td><td>修改 embedding.ts 支持环境变量</td></tr>\n\
    <tr><td>3</td><td>向量维度不匹配</td><td>Schema 硬编码 3072</td><td>修改 pglite-schema.ts\
    \ 为 1024</td></tr>\n<tr><td>4</td><td>首次启动超时</td><td>PGLite 初始化需 30s</td><td>connect_timeout\
    \ 设为 120s</td></tr>\n<tr><td>5</td><td>进程残留</td><td>MCP 客户端未正确关闭子进程</td><td>启动脚本添加\
    \ pkill 清理</td></tr>\n<tr><td>6</td><td>中文搜索无结果</td><td>english 分词器过滤中文</td><td>改为\
    \ simple + CJK ILIKE fallback</td></tr>\n<tr><td>7</td><td>小数据集搜索为空</td><td>dedup\
    \ 阈值过于严格</td><td>放宽阈值 (0.85→0.92, 2→3)</td></tr>\n<tr><td>8</td><td>MCP SDK 兼容性</td><td>mcp\
    \ 1.6.0 内部 API 变更</td><td>重装 mcp 包修复</td></tr>\n</table>\n<br>\n<h3>6.2 关键调试技巧</h3>\n\
    <br>\n<pre><code class=\"language-bash\">\n# 1. 检查 GBrain 进程\nps aux | grep \"\
    bun src/cli.ts\"\n\n# 2. 强制清理残留\npkill -9 -f \"bun src/cli.ts serve\"\n\n# 3.\
    \ 查看 PGLite 数据\nls -la ~/.gbrain/brain.pglite/\n\n# 4. 直接查询数据库\nbun -e \"\nimport\
    \ { PGlite } from '@electric-sql/pglite';\nconst db = await PGlite.create({ dataDir:\
    \ '/home/harryfan/.gbrain/brain.pglite' });\nconst result = await db.query('SELECT\
    \ slug, title FROM pages');\nconsole.log(result.rows);\n\"\n\n# 5. 检查 MCP 工具\n\
    python3 -c \"\nimport asyncio\nfrom hermes_agent.tools.mcp_tool import discover_mcp_tools\n\
    tools = asyncio.run(discover_mcp_tools())\nprint(f'{len(tools)} tools discovered')\n\
    \"\n</code></pre>\n<br>\n<hr>\n<br>\n<h2>7. 最终工作流程</h2>\n<br>\n<h3>7.1 日常使用流程</h3>\n\
    <br>\n<pre><code class=\"language-mermaid\">\ngraph TD\n    A[用户对话] --> B{需要存储知识?}\n\
    \    B -->|是| C[调用 put_page]\n    C --> D[GBrain 自动分块]\n    D --> E[生成向量嵌入]\n\
    \    E --> F[提取链接关系]\n    \n    B -->|否| G{需要检索知识?}\n    G -->|是| H[调用 query/search]\n\
    \    H --> I[混合搜索 RRF]\n    I --> J[返回相关页面]\n    \n    G -->|否| K[正常对话]\n</code></pre>\n\
    <br>\n<h3>7.2 Hermes 调用 GBrain 的两种方式</h3>\n<br>\n<p><strong>方式 1: handle_function_call\
    \ (推荐)</strong></p>\n<br>\n<pre><code class=\"language-python\">\nfrom hermes_agent.model_tools\
    \ import handle_function_call\n\n# 存储知识\nresult = await handle_function_call(\"\
    put_page\", {\n    \"slug\": \"project-idea-2026\",\n    \"content\": \"# 项目想法\\\
    n\\n这是一个新的项目构思...\"\n})\n\n# 检索知识\nresults = await handle_function_call(\"query\"\
    , {\n    \"query\": \"项目构思\",\n    \"limit\": 5\n})\n</code></pre>\n<br>\n<p><strong>方式\
    \ 2: GBrain CLI</strong></p>\n<br>\n<pre><code class=\"language-bash\">\n# 直接操作数据库\n\
    bun src/cli.ts put my-page --content \"# 标题\\n\\n内容\"\nbun src/cli.ts search \"\
    关键词\"\nbun src/cli.ts query \"问题描述\"\nbun src/cli.ts stats\n</code></pre>\n<br>\n\
    <h3>7.3 数据流</h3>\n<br>\n<pre><code class=\"language-\">\n用户输入\n    │\n    ▼\n\
    ┌─────────────┐\n│ Hermes Agent │\n│  (推理决策)  │\n└──────┬──────┘\n       │\n \
    \      ├────────────┬────────────┐\n       ▼            ▼            ▼\n   ┌───────┐\
    \   ┌────────┐   ┌─────────┐\n   │put_page│   │ query  │   │get_stats│\n   └───┬───┘\
    \   └───┬────┘   └────┬────┘\n       │           │              │\n       ▼  \
    \         ▼              ▼\n   ┌──────────────────────────────────┐\n   │    \
    \  GBrain MCP Server           │\n   │  ┌─────────┐    ┌─────────────┐  │\n  \
    \ │  │ PGLite  │◄──►│  pgvector   │  │\n   │  │ (本地)   │    │ (HNSW 索引) │  │\n\
    \   │  └────┬────┘    └─────────────┘  │\n   │       │                       \
    \    │\n   │       ▼                           │\n   │  ┌─────────────┐  ┌───────────┐\
    \  │\n   │  │ FTS (simple)│  │ 知识图谱   │  │\n   │  │ + ILIKE     │  │ (links) \
    \  │  │\n   │  └─────────────┘  └───────────┘  │\n   └──────────────────────────────────┘\n\
    \       │\n       ▼\n   返回结果给 Hermes\n</code></pre>\n<br>\n<h3>7.4 启动顺序</h3>\n\
    <br>\n<pre><code class=\"language-bash\">\n# 1. 确保环境变量已加载\nsource ~/.profile\n\
    \n# 2. 启动 GBrain MCP (如果需要独立运行)\n~/gbrain/gbrain-manager.sh start\n\n# 3. Hermes\
    \ 会自动通过 start-mcp.sh 启动 GBrain\n# 无需手动干预\n</code></pre>\n<br>\n<hr>\n<br>\n<h2>8.\
    \ 文件修改清单</h2>\n<br>\n<h3>8.1 GBrain 源码修改</h3>\n<br>\n<table>\n<tr><th>文件</th><th>修改类型</th><th>说明</th></tr>\n\
    <tr><td>`src/core/pglite-schema.ts`</td><td>修改</td><td>FTS `english` → `simple`,\
    \ 维度 3072 → 1024</td></tr>\n<tr><td>`src/core/pglite-engine.ts`</td><td>修改</td><td>搜索\
    \ `english` → `simple`, 添加 CJK fallback</td></tr>\n<tr><td>`src/core/search/dedup.ts`</td><td>修改</td><td>放宽去重阈值</td></tr>\n\
    </table>\n<br>\n<h3>8.2 新建文件</h3>\n<br>\n<table>\n<tr><th>文件</th><th>说明</th></tr>\n\
    <tr><td>`~/gbrain/gbrain-manager.sh`</td><td>进程管理脚本</td></tr>\n<tr><td>`~/.gbrain/env.sh`</td><td>环境变量加载脚本</td></tr>\n\
    <tr><td>`~/.gbrain-backup-phase3-*/`</td><td>配置备份目录</td></tr>\n</table>\n<br>\n\
    <h3>8.3 Hermes 配置</h3>\n<br>\n<table>\n<tr><th>文件</th><th>修改</th></tr>\n<tr><td>`~/.profile`</td><td>添加\
    \ GBrain 环境变量</td></tr>\n</table>\n<br>\n<hr>\n<br>\n<h2>9. 附录: 常用命令速查</h2>\n\
    <br>\n<h3>9.1 GBrain CLI</h3>\n<br>\n<pre><code class=\"language-bash\">\n# 数据库管理\n\
    bun src/cli.ts init                    # 初始化数据库\nbun src/cli.ts stats        \
    \           # 查看统计\nbun src/cli.ts doctor                  # 健康检查\n\n# 页面操作\n\
    bun src/cli.ts list                    # 列出页面\nbun src/cli.ts get <slug>     \
    \         # 获取页面\nbun src/cli.ts put <slug> --content \"...\"  # 创建/更新页面\nbun\
    \ src/cli.ts delete <slug>           # 删除页面\n\n# 搜索\nbun src/cli.ts search <keyword>\
    \        # 关键词搜索\nbun src/cli.ts query <question>        # 混合搜索 (RRF)\nbun src/cli.ts\
    \ ask <question>          # query 别名\n\n# 导入/导出\nbun src/cli.ts import <dir> \
    \           # 导入目录\nbun src/cli.ts export                  # 导出为 markdown\nbun\
    \ src/cli.ts sync                    # Git 同步\n\n# MCP\nbun src/cli.ts serve --stdio\
    \           # 启动 MCP server\n</code></pre>\n<br>\n<h3>9.2 进程管理</h3>\n<br>\n<pre><code\
    \ class=\"language-bash\">\n# GBrain 管理\n~/gbrain/gbrain-manager.sh start    \
    \   # 启动\n~/gbrain/gbrain-manager.sh stop        # 停止\n~/gbrain/gbrain-manager.sh\
    \ status      # 状态\n\n# 强制清理\npkill -9 -f \"bun src/cli.ts serve\"\n</code></pre>\n\
    <br>\n<h3>9.3 Hermes MCP 工具调用</h3>\n<br>\n<pre><code class=\"language-python\"\
    >\n# Python 异步调用\nfrom hermes_agent.model_tools import handle_function_call\n\n\
    # 获取统计\nstats = await handle_function_call(\"get_stats\", {})\n\n# 列出页面\npages\
    \ = await handle_function_call(\"list_pages\", {\"limit\": 10})\n\n# 获取页面\npage\
    \ = await handle_function_call(\"get_page\", {\"slug\": \"my-page\"})\n\n# 创建页面\n\
    result = await handle_function_call(\"put_page\", {\n    \"slug\": \"new-page\"\
    ,\n    \"content\": \"# Title\\n\\nContent here\"\n})\n\n# 混合搜索\nresults = await\
    \ handle_function_call(\"query\", {\n    \"query\": \"搜索内容\",\n    \"limit\":\
    \ 5\n})\n\n# 关键词搜索\nresults = await handle_function_call(\"search_keyword\", {\n\
    \    \"query\": \"关键词\",\n    \"limit\": 5\n})\n</code></pre>\n<br>\n<h3>9.4 环境变量</h3>\n\
    <br>\n<pre><code class=\"language-bash\">\n# 必须设置\nexport GBRAIN_EMBED_MODEL=\"\
    Qwen/Qwen3-Embedding-0.6B\"\nexport GBRAIN_EMBED_DIMENSIONS=\"1024\"\nexport GBRAIN_EMBED_BASE_URL=\"\
    https://api.openbitfun.com/v1\"\nexport GBRAIN_EMBED_API_KEY=\"sk-xxx\"\nexport\
    \ PATH=\"$HOME/.bun/bin:$PATH\"\n\n# 可选调试\nexport GBRAIN_SEARCH_DEBUG=\"1\"  \
    \       # 搜索调试日志\n</code></pre>\n<br>\n<hr>\n<br>\n<h2>总结</h2>\n<br>\n<p>本次集成成功将\
    \ GBrain 知识大脑通过 MCP 协议接入 Hermes Agent，主要成果：</p>\n<br>\n<p>1. <strong>完整的中文支持</strong>:\
    \ 通过 <code>simple</code> 分词器 + CJK ILIKE fallback 实现中英文混合搜索</p>\n<p>2. <strong>ARM64\
    \ 兼容</strong>: 解决 Bun WASM 限制，使用源码直接运行</p>\n<p>3. <strong>自定义嵌入模型</strong>: 集成\
    \ BitFun Qwen3-Embedding-0.6B (1024维)</p>\n<p>4. <strong>进程管理</strong>: 创建管理脚本解决进程残留问题</p>\n\
    <p>5. <strong>配置持久化</strong>: 环境变量写入 <code>~/.profile</code>，重启后自动生效</p>\n<br>\n\
    <p><strong>下一步建议</strong>:</p>\n<p>- 测试大规模数据下的性能表现</p>\n<p>- 配置自动同步机制（Git / 定时任务）</p>\n\
    <p>- 探索 GBrain 的知识图谱可视化功能</p>\n<br>\n<hr>\n<br>\n<p>*日志生成时间: 2026-04-26*</p>\n\
    <p>*GBrain 版本: v0.22.0*</p>\n<p>*Hermes 版本: v0.11.0*</p>\n<br>"
- title: Agent Buddy Bridge：将 M5StickC 物理按钮连接到 Hermes Agent 的完整方案
  date: April 26, 2026
  excerpt: 基于 Claude Desktop Buddy 开源项目架构，设计了一套将 M5StickC Plus BLE 外设连接到 Mac，再由 Mac
    Python 程序桥接到 Hermes Agent 的方案。采用双进程架构，实现物理按钮审批 Dangerous Command。
  content: "<br>\n<h2>目标</h2>\n<br>\n<p>实现用 M5StickC Plus 设备的物理按钮（A/B）对 Hermes Agent\
    \ 的 Dangerous Command 进行审批：</p>\n<br>\n<pre><code class=\"language-\">\nM5StickC\
    \ Plus (BLE Peripheral, Claude Desktop Buddy firmware)\n       ↕ BLE NUS\nBLECentral\
    \ (ble_central.py)\n       ↓ JSON over BLE\nHTTPServer (:8765) ← POST /buddy/state\
    \ + X-Session-Key\n       ↑ Hermes BuddyPlatformAdapter.send_exec_approval()\n\
    \       (via platform_class: \"agent_buddy_bridge.platform.BuddyPlatformAdapter\"\
    )\n       \nM5StickC 按钮 → BLE → BLECentral._handle_notification\n       ↓\nHTTPServer.handle_internal_approve()\
    \ → Hermes /internal/approve\n       ↓ (PR #11812 合并后) 或 Approval Relay (fallback)\n\
    resolve_gateway_approval(session_key, choice)\n</code></pre>\n<br>\n<h2>架构组件</h2>\n\
    <br>\n<h3>1. M5StickC Plus 设备端</h3>\n<br>\n<p><strong>状态</strong>：已有完整开源固件，直接复用。</p>\n\
    <br>\n<p>- 源码：<code>https://github.com/anthropics/claude-desktop-buddy</code></p>\n\
    <p>- BLE NUS Service UUID: <code>6e400001-b5a3-f393-e0a9-e50e24dcca9e</code></p>\n\
    <p>- RX Char (写): <code>6e400002-b5a3-f393-e0a9-e50e24dcca9e</code></p>\n<p>-\
    \ TX Char (通知): <code>6e400003-b5a3-f393-e0a9-e50e24dcca9e</code></p>\n<p>- 设备名称格式：<code>Claude-XXXX</code></p>\n\
    <br>\n<h3>2. BLE NUS JSON 协议</h3>\n<br>\n<p>Desktop → Device（心跳，每 10s）：</p>\n\
    <pre><code class=\"language-json\">\n{\n  \"total\": 3,\n  \"running\": 1,\n \
    \ \"waiting\": 1,\n  \"msg\": \"approve: Bash\",\n  \"entries\": [\"10:42 git\
    \ push\", \"10:41 yarn test\"],\n  \"tokens\": 184502,\n  \"tokens_today\": 31200,\n\
    \  \"prompt\": {\n    \"id\": \"req_abc123\",\n    \"tool\": \"Bash\",\n    \"\
    hint\": \"rm -rf /tmp/foo\"\n  }\n}\n</code></pre>\n<br>\n<p>Device → Desktop（按钮决策）：</p>\n\
    <pre><code class=\"language-json\">\n{\"cmd\": \"permission\", \"id\": \"req_abc123\"\
    , \"decision\": \"once\"}\n{\"cmd\": \"permission\", \"id\": \"req_abc123\", \"\
    decision\": \"deny\"}\n</code></pre>\n<br>\n<h3>3. Hermes BuddyPlatformAdapter（进程内）</h3>\n\
    <br>\n<p><strong>位置</strong>：<code>agent_buddy_bridge/platform.py</code></p>\n\
    <br>\n<p>- 通过 <code>platform_class</code> 配置注入 Hermes Gateway</p>\n<p>- 实现 <code>send_exec_approval()</code>\
    \ 推送状态到 BuddyBridge HTTP Server</p>\n<p>- 注册 <code>approval_callback</code> 给\
    \ AIAgent（PR #11812 特性）</p>\n<p>- 关键类：<code>BuddyPlatformAdapter</code>, <code>BuddyApprovalCallback</code></p>\n\
    <br>\n<pre><code class=\"language-python\">\n# ~/.hermes/config.yaml\nplatforms:\n\
    \  buddy:\n    enabled: true\n    platform_class: \"agent_buddy_bridge.platform.BuddyPlatformAdapter\"\
    \n    bridge_url: \"http://localhost:8765\"\n    hermes_approve_url: \"http://localhost:8642\"\
    \n</code></pre>\n<br>\n<h3>4. BuddyBridge（独立进程，Mac）</h3>\n<br>\n<p><strong>位置</strong>：<code>hermes_buddy_bridge/</code></p>\n\
    <br>\n<table>\n<tr><th>文件</th><th>职责</th></tr>\n<tr><td>`http_server.py`</td><td>HTTP\
    \ Server (:8765)，接收 Hermes POST /buddy/state，暴露 /internal/approve 端点</td></tr>\n\
    <tr><td>`json_codec.py`</td><td>NUS JSON 编解码</td></tr>\n<tr><td>`main.py`</td><td>入口，整合所有组件，管理\
    \ prompt_id → session_key 映射</td></tr>\n</table>\n<br>\n<h3>5. Hermes Plugin（pre_tool_call\
    \ hook）</h3>\n<br>\n<p><strong>位置</strong>：<code>hermes_plugin/</code></p>\n<br>\n\
    <p>- 注册 <code>pre_tool_call</code> hook</p>\n<p>- 可选：插件侧 allowlist 直接 approve\
    \ 某些工具</p>\n<br>\n<pre><code class=\"language-yaml\">\n# ~/.hermes/config.yaml\n\
    plugins:\n  enabled:\n    - buddy-bridge\n</code></pre>\n<br>\n<h2>HTTP 接口</h2>\n\
    <br>\n<table>\n<tr><th>进程</th><th>Port</th><th>Method</th><th>Path</th><th>Direction</th><th>Body</th></tr>\n\
    <tr><td>BuddyBridge</td><td>8765</td><td>GET</td><td>`/buddy/status`</td><td>Hermes\
    \ → Bridge</td><td>—</td></tr>\n<tr><td>BuddyBridge</td><td>8765</td><td>POST</td><td>`/internal/approve`</td><td>Bridge\
    \ → Hermes</td><td>`{\"session_key\",\"choice\"}`</td></tr>\n<tr><td>Approval\
    \ Relay</td><td>8766</td><td>POST</td><td>`/approve`</td><td>Bridge → Hermes</td><td>`{\"\
    session_key\",\"choice\"}` (fallback)</td></tr>\n</table>\n<br>\n<h2>启动命令</h2>\n\
    <br>\n<pre><code class=\"language-bash\">\n# Terminal 1: BuddyBridge（推荐方式，PR #11812\
    \ 合并后）\npython -m hermes_buddy_bridge.main \\\n    --http-port 8765 \\\n    --hermes-approve-url\
    \ http://localhost:8642 \\\n    --relay-url http://localhost:8766\n\n# PR #11812\
    \ 合并前，需启动 Approval Relay 作为 fallback\npython -m hermes_buddy_bridge.approval_relay\
    \ \\\n    --hermes-home ~/.hermes \\\n    --port 8766\n</code></pre>\n<br>\n<h2>Hermes\
    \ 配置（PR #11812 合并后）</h2>\n<br>\n<pre><code class=\"language-yaml\">\n# ~/.hermes/config.yaml\n\
    \n# 1. 启用 BuddyBridge Platform Adapter（via platform_class）\nplatforms:\n  buddy:\n\
    \    enabled: true\n    platform_class: \"agent_buddy_bridge.platform.BuddyPlatformAdapter\"\
    \n    bridge_url: \"http://localhost:8765\"\n    hermes_approve_url: \"http://localhost:8642\"\
    \n\n# 2. 启用 BuddyBridge Plugin（pre_tool_call hook）\nplugins:\n  enabled:\n   \
    \ - buddy-bridge\n\n# 3. 确保 approvals 配置（默认 telegram 或你的主平台）\napprovals:\n  mode:\
    \ \"telegram\"  # 或 \"buddy\"（PR #11812 后支持）\n</code></pre>\n<br>\n<h2>安装 agent-buddy-bridge</h2>\n\
    <br>\n<pre><code class=\"language-bash\">\n# 编辑模式安装，Hermes 可自动发现\ncd ~/code/agent-buddy-bridge\n\
    pip install -e .\n\n# 或者手动符号链接插件\nln -s ~/code/agent-buddy-bridge/hermes_plugin\
    \ ~/.hermes/plugins/buddy-bridge\n</code></pre>\n<br>\n<h2>关键文件清单</h2>\n<br>\n\
    <pre><code class=\"language-\">\n~/code/agent-buddy-bridge/\n├── README.md\n├──\
    \ LICENSE\n├── requirements.txt          # bleak, aiohttp\n├── .gitignore\n├──\
    \ hermes_plugin/             # Hermes 插件（pre_tool_call hook）\n│   ├── __init__.py\
    \            # register() + _on_pre_tool_call()\n│   └── plugin.yaml\n└── hermes_buddy_bridge/\
    \       # BuddyBridge 主程序\n    ├── __init__.py\n    ├── platform.py          \
    \   # BuddyPlatformAdapter + BuddyApprovalCallback (PR #11812)\n    ├── ble_central.py\
    \          # BLE Central（bleak + CoreBluetooth）\n    ├── json_codec.py       \
    \    # NUS JSON 编解码\n    ├── http_server.py          # HTTP Server (:8765，接收 Hermes\
    \ 状态 + /internal/approve)\n    ├── approval_relay.py       # Approval Relay Server\
    \ (:8766，fallback 方案)\n    └── main.py                 # Bridge 入口\n</code></pre>\n\
    <br>\n<h2>PR #11812 关键改动（待合并）</h2>\n<br>\n<table>\n<tr><th>改动</th><th>文件</th><th>意义</th></tr>\n\
    <tr><td>`pre_tool_call` → `{\"action\": \"approve\"}`</td><td>`tools/terminal_tool.py`</td><td>插件可绕过\
    \ dangerous command 审批</td></tr>\n<tr><td>`\"plugin\"` approval mode</td><td>`tools/approval.py`</td><td>新的审批模式，插件处理审批</td></tr>\n\
    <tr><td>`approval_callback` param</td><td>`run_agent.py`</td><td>AIAgent 接收审批回调参数</td></tr>\n\
    </table>\n<br>\n<h2>参考资料</h2>\n<h2>参考资料</h2>\n<p>- Claude Desktop Buddy 源码：<code>https://github.com/anthropics/claude-desktop-buddy</code></p>\n\
    <p>- BLE NUS 协议：<code>src/ble_bridge.cpp</code>, <code>src/data.h</code>, <code>REFERENCE.md</code></p>\n\
    <p>- PR #11812：<code>https://github.com/NousResearch/hermes-agent/pull/11812</code></p>\n\
    <p>- PR #11816（实现）：<code>https://github.com/NousResearch/hermes-agent/pull/11816</code></p>\n\
    <p>- Hermes Plugin 系统：<code>AGENTS.md</code> → Plugin 部分</p>\n<p>- bleak 文档：<code>https://bleak.readthedocs.io/</code></p>\n\
    <br>\n<h2>开发日志</h2>\n<br>\n<table>\n<tr><th>日期</th><th>阶段</th><th>内容</th><th>产出</th></tr>\n\
    <tr><td>2026-04-26</td><td>项目初始化</td><td>创建 GitHub 仓库 `harryfan1985/agent-buddy-bridge`，编写代码骨架</td><td>`ble_central.py`,\
    \ `http_server.py`, `http_client.py`, `json_codec.py`, `main.py`, `approval_relay.py`</td></tr>\n\
    <tr><td>2026-04-26</td><td>Hermes 调研</td><td>分析 Hermes 扩展机制（Plugin、Webhook、Platform\
    \ Adapter），确认 Hermes 没有内置 HTTP 审批回调端点</td><td>结论：需要 PR #11812</td></tr>\n<tr><td>2026-04-26</td><td>PR\
    \ #11812 研究</td><td>详细查看 Issue 和 PR #11816 代码，理解 `platform_class`、`pre_tool_call\
    \ approve`、`approval_callback` 三大改动</td><td>明确基于 PR #11812 的新架构</td></tr>\n<tr><td>2026-04-26</td><td>集成开发</td><td>基于\
    \ PR #11812 设计实现 BuddyPlatformAdapter + Hermes Plugin + 双路径 fallback</td><td>`platform.py`,\
    \ `hermes_plugin/`, `http_server.py` 更新，`main.py` 重构</td></tr>\n</table>\n<br>\n\
    <h2>后续任务计划</h2>\n<br>\n<h3>Phase 1: BuddyBridge 独立测试（不依赖 Hermes）</h3>\n<br>\n\
    <p>- [ ] <strong>BLE Central 扫描测试</strong></p>\n<p>  - 测试 <code>bleak</code> 能否在\
    \ Mac 上扫描到 M5StickC 设备（设备名 <code>Claude-XXXX</code>）</p>\n<p>  - 验证 CoreBluetooth\
    \ 权限</p>\n<br>\n<p>- [ ] <strong>BLE 连接测试</strong></p>\n<p>  - 建立 BLE 连接，启用 NUS\
    \ TX notify</p>\n<p>  - 测试 JSON 心跳收发</p>\n<br>\n<p>- [ ] <strong>NUS 协议验证</strong></p>\n\
    <p>  - 对比 Claude Desktop Buddy 固件的 NUS 协议与 <code>json_codec.py</code> 实现是否完全匹配</p>\n\
    <p>  - 必要时调整编解码格式</p>\n<br>\n<h3>Phase 2: Hermes 侧桩代码（不等 PR 合并）</h3>\n<br>\n<p>-\
    \ [ ] <strong>手动注册 BuddyAdapter 到 Platform 枚举</strong></p>\n<p>  - 修改 <code>gateway/config.py</code>\
    \ 的 <code>Platform</code> 枚举添加 <code>BUDDY</code></p>\n<p>  - 在 <code>gateway/platforms/</code>\
    \ 创建 <code>buddy.py</code></p>\n<p>  - 绕过 <code>platform_class</code>，直接走 Hermes\
    \ 内置加载机制</p>\n<p>  - ⚠️ 违反\"不修改 Hermes 核心代码\"约束，仅用于原型验证</p>\n<br>\n<p>- [ ] <strong>添加\
    \ Hermes /internal/approve 端点</strong></p>\n<p>  - 在 <code>gateway/platforms/api_server.py</code>\
    \ 添加 <code>/internal/approve</code> POST 端点</p>\n<p>  - 调用 <code>resolve_gateway_approval(session_key,\
    \ choice)</code></p>\n<p>  - ⚠️ 同样需要修改 Hermes</p>\n<br>\n<h3>Phase 3: 端到端集成（需硬件\
    \ + Hermes 改动）</h3>\n<br>\n<p>- [ ] <strong>完整审批流程测试</strong></p>\n<p>  - Hermes\
    \ 检测 dangerous command → <code>send_exec_approval()</code> → POST /buddy/state</p>\n\
    <p>  - BuddyBridge 接收 → BLE → M5StickC 显示</p>\n<p>  - M5StickC 按钮 A/B → BLE 回传\
    \ → POST /internal/approve</p>\n<p>  - Hermes <code>resolve_gateway_approval()</code>\
    \ → Agent 线程解锁</p>\n<br>\n<p>- [ ] <strong>超时和错误处理</strong></p>\n<p>  - M5StickC\
    \ 无响应超时（60s Hermes 默认超时）</p>\n<p>  - BLE 断线重连</p>\n<p>  - Hermes 端点不可用 fallback\
    \ 到 Approval Relay</p>\n<br>\n<h3>Phase 4: 硬件与固件</h3>\n<br>\n<p>- [ ] <strong>M5StickC\
    \ 固件适配</strong></p>\n<p>  - 确认 Claude Desktop Buddy 固件是否需要修改</p>\n<p>  - 验证 NUS\
    \ 心跳间隔、permission 消息格式兼容性</p>\n<br>\n<p>- [ ] <strong>设备配对流程</strong></p>\n<p>\
    \  - macOS BLE 配对对话框处理</p>\n<p>  - 首次配对后的自动重连</p>\n<br>\n<h3>Phase 5: PR #11812\
    \ 合并后</h3>\n<br>\n<p>- [ ] <strong>移除桩代码</strong></p>\n<p>  - 删除 Phase 2 的 Hermes\
    \ 临时修改</p>\n<p>  - 切换到正式的 <code>platform_class</code> 配置方式</p>\n<br>\n<p>- [ ]\
    \ <strong>正式部署</strong></p>\n<p>  - <code>pip install -e .</code> 安装 agent-buddy-bridge</p>\n\
    <p>  - 配置 <code>~/.hermes/config.yaml</code> 的 <code>platforms.buddy</code> 和\
    \ <code>plugins.buddy-bridge</code></p>\n<p>  - 验证 Hermes 自动加载 BuddyPlatformAdapter</p>\n\
    <br>\n<h2>阻塞项</h2>\n<br>\n<table>\n<tr><th>阻塞</th><th>依赖</th><th>解决方案</th></tr>\n\
    <tr><td>`platform_class` 不存在</td><td>PR #11812 未合并</td><td>Phase 2 桩代码 或 等待 PR\
    \ 合并</td></tr>\n<tr><td>无法真机测试 BLE</td><td>需要 M5StickC Plus 硬件</td><td>Phase 1\
    \ 扫描测试验证 bleak 是否正常工作</td></tr>\n<tr><td>NUS 协议兼容性未知</td><td>需要抓包或查看 Claude Buddy\
    \ 固件源码</td><td>Phase 1 协议验证</td></tr>\n</table>\n<br>"
- title: Agent 自驱动代码修复实践：从发现 Hermes Bug 到提交 PR 的完整过程
  date: April 22, 2026
  excerpt: 记录一次完整的 Agent 自驱动代码修复流程：用户配置新模型时发现 /model 命令显示异常，Agent 自动分析配置、追踪源码、定位 bug、编写修复、验证效果、提交
    PR 到社区。全程无需用户手动介入代码细节，展示了 AI Agent 在实际开发场景中的自主问题解决能力。PR
  content: "<blockquote>\n<strong>案例类型</strong>：Agent 自驱动 Bug 修复<br>\n<strong>项目</strong>：Hermes\
    \ Agent (NousResearch/hermes-agent)<br>\n<strong>PR</strong>：<a href=\"https://github.com/NousResearch/hermes-agent/pull/13974\"\
    >#13974</a><br>\n<strong>耗时</strong>：约 10 分钟（从发现问题到提交 PR）<br>\n<strong>人工介入</strong>：仅需确认关键决策（是否提交\
    \ PR）\n</blockquote>\n\n<hr>\n\n<h2>一、案例背景</h2>\n\n<p>用户正在配置 Hermes Agent 的模型切换功能，希望添加火山引擎\
    \ Coding Plan 的多个模型（glm-5.1, kimi-k2-6, minimax-m2-7）到 <code>/model</code> 命令的可选列表中。</p>\n\
    \n<p>配置完成后，用户发现问题：<strong>/model 命令只显示 glm-5.1，不显示其他添加的模型</strong>。</p>\n\n<hr>\n\
    \n<h2>二、Agent 诊断流程</h2>\n\n<h3>2.1 配置检查</h3>\n\n<p>Agent 首先检查用户配置文件，发现两个关键配置项：</p>\n\
    \n<table>\n<tr><th>配置项</th><th>作用</th><th>/model 显示</th></tr>\n<tr><td><code>fallback_providers</code></td><td>主模型失败时的备用链</td><td>❌\
    \ 不显示</td></tr>\n<tr><td><code>custom_providers</code></td><td>用户自定义的 provider</td><td>✅\
    \ 显示</td></tr>\n</table>\n\n<p>用户的新模型被添加到了 <code>fallback_providers</code>，但 <code>custom_providers</code>\
    \ 的配置也存在问题——只显示默认模型。</p>\n\n<h3>2.2 源码追踪</h3>\n\n<p>Agent 追踪到 <code>hermes_cli/model_switch.py</code>\
    \ 中的 <code>list_authenticated_providers()</code> 函数，这是 <code>/model</code> 命令的模型列表生成器。</p>\n\
    \n<p>函数分为 4 个 Section：</p>\n\n<pre style=\"background: #1a1a2e; color: #d4d4d4;\
    \ padding: 1.5em; border-radius: 8px;\">\nSection 1: Hermes-mapped providers (models.dev\
    \ catalog)\nSection 2: Hermes-only providers (nous, openai-codex, copilot, opencode-go)\n\
    Section 2b: Cross-check canonical provider list\nSection 3: User-defined endpoints\
    \ from config  ← 正确处理 models 字典\nSection 4: Saved custom providers from config\
    \  ← ❌ Bug 所在\n</pre>\n\n<h3>2.3 Bug 定位</h3>\n\n<p>Agent 发现 Section 4 的代码逻辑存在明显缺陷：</p>\n\
    \n<pre style=\"background: #1a1a2e; color: #d4d4d4; padding: 1em; border-radius:\
    \ 8px;\">\n# model_switch.py 第 1083-1085 行\ndefault_model = (entry.get(\"model\"\
    ) or \"\").strip()\nif default_model and default_model not in groups[slug][\"\
    models\"]:\n    groups[slug][\"models\"].append(default_model)\n# ❌ 完全忽略了 entry[\"\
    models\"] 字典！\n\n# 对比 Section 3 的正确实现：\ncfg_models = ep_cfg.get(\"models\", [])\n\
    if isinstance(cfg_models, list):\n    for m in cfg_models:\n        if m and m\
    \ not in models_list:\n            models_list.append(m)\n</pre>\n\n<p><strong>根因</strong>：Section\
    \ 4 只读取 <code>model</code> 字段（默认模型），完全忽略 <code>models</code> 字典中的其他模型定义。</p>\n\
    \n<hr>\n\n<h2>三、Agent 自动修复</h2>\n\n<h3>3.1 代码修复</h3>\n\n<p>Agent 使用 patch 工具修改代码，添加遍历\
    \ <code>models</code> 字典的逻辑：</p>\n\n<pre style=\"background: #1a1a2e; color: #d4d4d4;\
    \ padding: 1em; border-radius: 8px;\">\n+ # Also include models from the \"models\"\
    \ dict (model_name -> metadata)\n+ # or list format in the entry.\n+ entry_models\
    \ = entry.get(\"models\")\n+ if isinstance(entry_models, dict):\n+     for m_name\
    \ in entry_models:\n+         if m_name and m_name not in groups[slug][\"models\"\
    ]:\n+             groups[slug][\"models\"].append(m_name)\n+ elif isinstance(entry_models,\
    \ list):\n+     for m in entry_models:\n+         m_str = (m if isinstance(m,\
    \ str) else str(m)).strip()\n+         if m_str and m_str not in groups[slug][\"\
    models\"]:\n+             groups[slug][\"models\"].append(m_str)\n</pre>\n\n<h3>3.2\
    \ 验证修复</h3>\n\n<p>Agent 编写 Python 测试脚本验证修复效果：</p>\n\n<pre style=\"background:\
    \ #1a1a2e; color: #d4d4d4; padding: 1em; border-radius: 8px;\">\nfrom hermes_cli.model_switch\
    \ import list_authenticated_providers\nfrom hermes_cli.config import load_config\n\
    \ncfg = load_config()\nproviders = list_authenticated_providers(\n    current_provider='custom',\n\
    \    custom_providers=cfg.get('custom_providers', []),\n)\n\n# 结果对比\n# Before:\
    \ ['glm-5.1'] (1 model)\n# After:  ['glm-5.1', 'glm-4-7-251222', 'kimi-k2-6',\
    \ 'minimax-m2-7'] (4 models)\n</pre>\n\n<p>验证成功 ✅</p>\n\n<hr>\n\n<h2>四、用户介入点</h2>\n\
    \n<p>修复验证后，Agent 向用户报告进展。用户提出关键问题：</p>\n\n<blockquote>\n\"你直接修改了 hermes 的内部实现？这样我以后升级版本还会有问题吧\"\
    \n</blockquote>\n\n<p><strong>Agent 立即意识到风险</strong>：直接修改本地源码会导致升级时丢失修复。</p>\n\
    \n<p>Agent 提出三个选项：</p>\n\n<table>\n<tr><th>选项</th><th>优点</th><th>缺点</th></tr>\n\
    <tr><td>A. 提交 PR</td><td>永久解决，造福所有用户</td><td>需等待合并</td></tr>\n<tr><td>B. 记录 bug</td><td>不影响升级</td><td>/model\
    \ 显示不完整</td></tr>\n<tr><td>C. 保持修改</td><td>立即可用</td><td>需手动重新应用</td></tr>\n</table>\n\
    \n<p>用户选择<strong>选项 A</strong>：\"帮我创建一个 PR 吧，提交到社区\"</p>\n\n<hr>\n\n<h2>五、自动化\
    \ PR 提交流程</h2>\n\n<h3>5.1 Git 操作</h3>\n\n<pre style=\"background: #1a1a2e; color:\
    \ #d4d4d4; padding: 1em; border-radius: 8px;\">\n# 1. Fork 上游仓库\ngh repo fork\
    \ NousResearch/hermes-agent --clone=false\n\n# 2. 创建修复分支\ngit checkout -b fix-custom-providers-models-list\n\
    \n# 3. 提交修改\ngit add hermes_cli/model_switch.py\ngit commit -m \"fix(model_switch):\
    \ include all models from custom_providers models dict\"\n\n# 4. 推送到 Fork\ngit\
    \ push fork fix-custom-providers-models-list\n\n# 5. 创建 PR\ngh pr create --repo\
    \ NousResearch/hermes-agent         --title \"fix(model_switch): include all models\
    \ from custom_providers models dict\"         --body-file pr_body.md\n</pre>\n\
    \n<h3>5.2 PR 描述生成</h3>\n\n<p>Agent 自动生成英文 PR 描述，包含：</p>\n<ul>\n<li>Bug Description</li>\n\
    <li>Example (config.yaml before/after)</li>\n<li>Root Cause Analysis</li>\n<li>Fix\
    \ Code</li>\n<li>Testing Results</li>\n</ul>\n\n<h3>5.3 提交结果</h3>\n\n<p>PR 创建成功：<a\
    \ href=\"https://github.com/NousResearch/hermes-agent/pull/13974\">#13974</a></p>\n\
    \n<p>维护者已标记标签：<code>type/bug</code>, <code>comp/cli</code>, <code>P2</code></p>\n\
    \n<hr>\n\n<h2>六、持续监控</h2>\n\n<p>Agent 设置 cron 任务自动监控 PR 状态变化：</p>\n\n<table>\n\
    <tr><th>监控项</th><th>频率</th><th>通知方式</th></tr>\n<tr><td>状态变化</td><td>每天 4 次</td><td>Telegram</td></tr>\n\
    <tr><td>合并时间</td><td>↑</td><td>↑</td></tr>\n<tr><td>Review 决定</td><td>↑</td><td>↑</td></tr>\n\
    <tr><td>新评论</td><td>↑</td><td>↑</td></tr>\n<tr><td>标签变化</td><td>↑</td><td>↑</td></tr>\n\
    </table>\n\n<hr>\n\n<h2>七、关键能力展示</h2>\n\n<h3>7.1 Agent 自主能力</h3>\n\n<table>\n\
    <tr><th>能力</th><th>本次案例体现</th></tr>\n<tr><td><strong>问题诊断</strong></td><td>自动检查配置\
    \ → 追踪源码 → 定位根因</td></tr>\n<tr><td><strong>代码修复</strong></td><td>使用 patch 工具精准修改，保持代码风格一致</td></tr>\n\
    <tr><td><strong>验证测试</strong></td><td>编写测试脚本，对比 before/after 效果</td></tr>\n<tr><td><strong>风险评估</strong></td><td>用户提醒后立即意识到升级兼容问题</td></tr>\n\
    <tr><td><strong>方案建议</strong></td><td>提供多个选项，让用户做最终决策</td></tr>\n<tr><td><strong>PR\
    \ 流程</strong></td><td>Fork → Branch → Commit → Push → Create PR 全自动化</td></tr>\n\
    <tr><td><strong>持续跟进</strong></td><td>设置 cron 监控 PR 状态</td></tr>\n</table>\n\n\
    <h3>7.2 人机协作边界</h3>\n\n<table>\n<tr><th>Agent 负责</th><th>用户负责</th></tr>\n<tr><td>配置检查</td><td>问题报告</td></tr>\n\
    <tr><td>源码追踪</td><td>关键决策（是否提交 PR）</td></tr>\n<tr><td>Bug 定位</td><td>语言选择（PR 描述用英语）</td></tr>\n\
    <tr><td>代码修复</td><td></td></tr>\n<tr><td>验证测试</td><td></td></tr>\n<tr><td>Git\
    \ 操作</td><td></td></tr>\n<tr><td>PR 描述</td><td></td></tr>\n<tr><td>状态监控</td><td></td></tr>\n\
    </table>\n\n<hr>\n\n<h2>八、完整聊天记录</h2>\n\n<p>以下是本次修复过程的完整对话记录（从发现问题到提交 PR）：</p>\n\
    \n<hr>\n\n<h3>对话开始</h3>\n\n<p><strong>User</strong>: 当前使用的是哪个模型？</p>\n\n<p><strong>Agent</strong>:\
    \ 当前会话显示使用 **GLM-5** 模型（provider: custom）。让我查看完整的配置文件...</p>\n\n<p>（读取 config.yaml，展示模型配置）</p>\n\
    \n<hr>\n\n<p><strong>User</strong>: 我切换到 glm5.1 作为 hermes 的模型，现在能工作吗？</p>\n\n\
    <p><strong>Agent</strong>: **✅ 正常工作**。你正在与 glm-5.1 对话，通过 Ark.cn-beijing.volces.com\
    \ provider 路由...</p>\n\n<hr>\n\n<p><strong>User</strong>: 我还增加了其他两个模型，为什么 /model\
    \ 命令只显示 glm5.1？</p>\n\n<p><strong>Agent</strong>: 问题在 list_authenticated_providers()\
    \ 的 custom_providers 处理逻辑。让我确认...</p>\n\n<p>（读取 model_switch.py，分析 Section 4 代码）</p>\n\
    \n<p><strong>发现 Bug</strong>: list_authenticated_providers() 处理 custom_providers\
    \ 时只读取 model 字段（即默认模型），完全忽略 models 字典。所以 Ark provider 只显示 glm-5.1 一个。</p>\n\n\
    <hr>\n\n<p><strong>Agent</strong>: 修复代码...</p>\n\n<p>（使用 patch 工具修改 model_switch.py）</p>\n\
    \n<p>验证修复效果...</p>\n\n<p>（执行测试脚本，确认修复成功）</p>\n\n<p><strong>修复完成 ✅**</strong></p>\n\
    \n<hr>\n\n<p><strong>User</strong>: 检查一下</p>\n\n<p><strong>Agent</strong>: （再次验证修复，展示配置\
    \ vs /model 显示对比）</p>\n\n<p>**检查完成 ✅**</p>\n\n<hr>\n\n<p><strong>User</strong>:\
    \ 你直接修改了 hermes 的内部实现？这样我以后升级版本还会有问题吧</p>\n\n<p><strong>Agent</strong>: 你说得对。我直接修改了\
    \ hermes-agent 源码，升级时会丢失这个修复。</p>\n\n<p>（分析问题，提出三个选项）</p>\n\n<p><strong>建议：选项\
    \ A + B</strong> — 回退修改 + 提交 PR 到社区</p>\n\n<hr>\n\n<p><strong>User</strong>: 帮我创建一个\
    \ PR 吧，提交到社区</p>\n\n<p><strong>Agent</strong>: （执行 Git 操作流程）</p>\n\n<pre>\n1.\
    \ Fork: harryfan1985/hermes-agent ✓\n2. Branch: fix-custom-providers-models-list\
    \ ✓\n3. Commit: fe1b6715 ✓\n4. Push ✓\n</pre>\n\n<hr>\n\n<p><strong>User</strong>:\
    \ 注意 PR 的描述语言使用英语</p>\n\n<p><strong>Agent</strong>: （创建英文 PR 描述文件，提交 PR）</p>\n\
    \n<p><strong>PR 创建成功 ✅**</strong></p>\n\n<p>链接：https://github.com/NousResearch/hermes-agent/pull/13974</p>\n\
    \n<hr>\n\n<p><strong>User</strong>: 帮我关注一下我刚才提交 PR 的状态</p>\n\n<p><strong>Agent</strong>:\
    \ （查询 PR 状态，设置 cron 监控任务）</p>\n\n<p><strong>PR 监控已设置 ✅**</strong></p>\n\n<hr>\n\
    \n<h2>九、总结</h2>\n\n<p>本次案例展示了 AI Agent 在实际开发场景中的<strong>自驱动问题解决能力</strong>：</p>\n\
    \n<ol>\n<li><strong>主动诊断</strong>：无需用户详细描述，Agent 从症状自动追踪到根因</li>\n<li><strong>精准修复</strong>：使用代码工具进行最小化修改，保持风格一致</li>\n\
    <li><strong>风险意识</strong>：用户提醒后立即评估升级兼容风险</li>\n<li><strong>流程自动化</strong>：Fork\
    \ → Branch → Commit → PR 全流程自动化</li>\n<li><strong>持续跟进</strong>：设置监控任务，自动通知 PR\
    \ 状态变化</li>\n</ol>\n\n<p><strong>关键启示</strong>：Agent 不是替代开发者，而是<strong>加速开发流程</strong>——让开发者专注于决策，Agent\
    \ 执行细节。</p>\n\n<hr>\n\n<p><em>案例发生时间：2026-04-22</em></p>\n<p><em>PR 链接：<a href=\"\
    https://github.com/NousResearch/hermes-agent/pull/13974\">https://github.com/NousResearch/hermes-agent/pull/13974</a></em></p>\n"
- title: Joern：Code Property Graph 静态分析引擎深度解析
  date: April 21, 2026
  excerpt: Joern 是基于 Code Property Graph (CPG) 的静态代码分析引擎。CPG = AST + CFG + PDG 三图融合，提供完整代码语义。支持
    12 种语言（C/C++/Java/Python/JS/Go/C#/PHP/Ruby/Swift/Kotlin/Ghidra）。查询语言 CPGQL 是 Scala
    DSL，支持跨函数数据流追踪、污点分析、程序切片。codebadger 封装 Joern 为 MCP Server，让 LLM Agent 按需获取语义信息。技术优势：精确跨函数分析、高效缓存、可扩展查询。与其他工具对比：Joern
    vs CodeQL vs Semgrep vs Clang。部署方式：Docker 或独立安装。理论基础：NDSS 2014 论文 'The Code Property
    Graph'。
  content: "<blockquote>\n<strong>类型</strong>：静态代码分析框架<br>\n<strong>核心概念</strong>：Code\
    \ Property Graph (CPG) = AST + CFG + PDG<br>\n<strong>语言</strong>：Scala<br>\n\
    <strong>查询语言</strong>：CPGQL<br>\n<strong>官网</strong>：<a href=\"https://joern.io\"\
    >https://joern.io</a><br>\n<strong>GitHub</strong>：<a href=\"https://github.com/joernio/joern\"\
    >https://github.com/joernio/joern</a>\n</blockquote>\n\n<hr>\n\n<h2>一、Code Property\
    \ Graph (CPG) 核心概念</h2>\n\n<p><strong>CPG = AST + CFG + PDG</strong></p>\n\n<pre\
    \ style=\"background: #1a1a2e; color: #d4d4d4; padding: 1.5em; border-radius:\
    \ 8px;\">\n┌─────────────────────────────────────────────────────────────┐\n│\
    \              Code Property Graph (CPG)                       │\n├─────────────────────────────────────────────────────────────┤\n\
    │                                                              │\n│   ┌─────────────┐\
    \                                           │\n│   │  AST        │  抽象语法树    \
    \                            │\n│   │ (语法结构)   │  if/while/赋值/函数调用...        \
    \         │\n│   └─────────────┘                                           │\n\
    │         +                                                    │\n│   ┌─────────────┐\
    \                                           │\n│   │  CFG        │  控制流图     \
    \                             │\n│   │ (执行路径)   │  程序执行的分支路径                 \
    \       │\n│   └─────────────┘                                           │\n│\
    \         +                                                    │\n│   ┌─────────────┐\
    \                                           │\n│   │  PDG        │  程序依赖图    \
    \                            │\n│   │ (数据依赖)   │  变量定义→使用 的数据流关系             \
    \   │\n│   └─────────────┘                                           │\n│    \
    \                                                          │\n│   = 一个统一图结构，支持跨函数数据流追踪\
    \                       │\n└─────────────────────────────────────────────────────────────┘\n\
    </pre>\n\n<h3>三张图的融合</h3>\n\n<table>\n<tr><th>图类型</th><th>表示内容</th><th>漏洞分析用途</th></tr>\n\
    <tr><td><strong>AST</strong></td><td>语法结构（语法树节点）</td><td>定位函数、变量、表达式</td></tr>\n\
    <tr><td><strong>CFG</strong></td><td>控制流（分支跳转路径）</td><td>分析 if/switch/循环 执行路径</td></tr>\n\
    <tr><td><strong>PDG</strong></td><td>数据依赖（变量流向）</td><td>污点追踪：source → sink</td></tr>\n\
    </table>\n\n<hr>\n\n<h2>二、Joern 在 codebadger 中的架构</h2>\n\n<pre style=\"background:\
    \ #1a1a2e; color: #d4d4d4; padding: 1.5em; border-radius: 8px;\">\ncodebadger\
    \ MCP Server\n         │\n         │ Docker API\n         ↓\n┌─────────────────────────────────────────────────────────────┐\n\
    │            Joern Docker Container                            │\n│         (codebadger-joern-server)\
    \                            │\n├─────────────────────────────────────────────────────────────┤\n\
    │                                                              │\n│   ┌─────────────────┐\
    \                                       │\n│   │  Joern CLI      │  CPG 生成   \
    \                          │\n│   │  joern-parse    │  源码 → CPG.bin          \
    \             │\n│   └─────────────────┘                                     \
    \  │\n│         │                                                    │\n│    \
    \     ↓                                                    │\n│   ┌─────────────────┐\
    \                                       │\n│   │  CPG 文件       │  playground/cpgs/{hash}/cpg.bin\
    \       │\n│   │  (二进制图)      │  包含完整的 AST+CFG+PDG               │\n│   └─────────────────┘\
    \                                       │\n│         │                       \
    \                             │\n│         ↓                                 \
    \                   │\n│   ┌─────────────────┐                               \
    \        │\n│   │  Joern Server   │  查询执行                             │\n│   │\
    \  (Scala REPL)   │  加载 CPG → 执行 CPGQL 查询            │\n│   └─────────────────┘\
    \                                       │\n│                                 \
    \                             │\n└─────────────────────────────────────────────────────────────┘\n\
    </pre>\n\n<hr>\n\n<h2>三、Joern 工作流程</h2>\n\n<h3>3.1 CPG 生成</h3>\n\n<pre style=\"\
    background: #1a1a2e; color: #d4d4d4; padding: 1em; border-radius: 8px;\">\n//\
    \ Joern CLI 命令\njoern-parse --language c /path/to/codebase\n\n// 输出\n生成 cpg.bin（二进制\
    \ CPG 文件）\n</pre>\n\n<p><strong>生成过程</strong>：</p>\n<ol>\n<li>解析源码 → AST</li>\n\
    <li>构建 CFG（控制流分析）</li>\n<li>构建 PDG（数据依赖分析）</li>\n<li>合并为 CPG → 序列化为 cpg.bin</li>\n\
    </ol>\n\n<h3>3.2 CPGQL 查询执行</h3>\n\n<pre style=\"background: #1a1a2e; color: #d4d4d4;\
    \ padding: 1em; border-radius: 8px;\">\n// 加载 CPG\nimportCode(\"path/to/cpg.bin\"\
    )\n\n// 查询所有函数\ncpg.method.name.l\n\n// 查询所有调用点\ncpg.call.code.l\n\n// 污点追踪：从\
    \ getenv 到 system\nval sources = cpg.call.name(\"getenv\")\nval sinks = cpg.call.name(\"\
    system\")\nsink.reachableByFlows(source).l\n</pre>\n\n<hr>\n\n<h2>四、CPGQL 查询示例</h2>\n\
    \n<h3>4.1 查找所有外部函数调用</h3>\n\n<pre style=\"background: #1a1a2e; color: #d4d4d4;\
    \ padding: 1em; border-radius: 8px;\">\ncpg.call\n  .where(_.methodName.not(\"\
    .*internal.*\"))\n  .code.l\n</pre>\n\n<h3>4.2 查找缓冲区操作</h3>\n\n<pre style=\"background:\
    \ #1a1a2e; color: #d4d4d4; padding: 1em; border-radius: 8px;\">\ncpg.call\n  .name(\"\
    strcpy\", \"memcpy\", \"sprintf\")\n  .code.l\n</pre>\n\n<h3>4.3 污点追踪</h3>\n\n\
    <pre style=\"background: #1a1a2e; color: #d4d4d4; padding: 1em; border-radius:\
    \ 8px;\">\n// 定义污点源\nval sources = cpg.call.name(\"getenv\", \"fgets\", \"read\"\
    )\n\n// 定义污点汇\nval sinks = cpg.call.name(\"system\", \"strcpy\", \"sprintf\")\n\
    \n// 追踪数据流\nsinks.reachableByFlows(sources).map(_.elements).l\n</pre>\n\n<h3>4.4\
    \ 程序切片</h3>\n\n<pre style=\"background: #1a1a2e; color: #d4d4d4; padding: 1em;\
    \ border-radius: 8px;\">\n// 从某个调用点向后切片\ncpg.call.name(\"malloc\")\n  .newSink\n\
    \  .reachableBy(cpg.method.astNodes)\n  .l\n</pre>\n\n<h3>4.5 查找危险函数调用</h3>\n\n\
    <pre style=\"background: #1a1a2e; color: #d4d4d4; padding: 1em; border-radius:\
    \ 8px;\">\n// 查找所有 system() 调用\ncpg.call.name(\"system\").code.l\n\n// 查找参数来源\n\
    cpg.call.name(\"system\")\n  .argument.code.l\n</pre>\n\n<h3>4.6 查找整数溢出模式</h3>\n\
    \n<pre style=\"background: #1a1a2e; color: #d4d4d4; padding: 1em; border-radius:\
    \ 8px;\">\n// 查找乘法运算后用于内存分配\ncpg.call.name(\"malloc\")\n  .where(_.argument.isCall.name(\"\
    mul\", \"*\"))\n  .code.l\n</pre>\n\n<hr>\n\n<h2>五、codebadger 对 Joern 的封装</h2>\n\
    \n<table>\n<tr><th>codebadger 工具</th><th>Joern 底层调用</th></tr>\n<tr><td>generate_cpg</td><td>joern-parse\
    \ --language {lang} {path}</td></tr>\n<tr><td>list_methods</td><td>cpg.method.name.l</td></tr>\n\
    <tr><td>get_call_graph</td><td>cpg.method.callIn.l + cpg.method.callOut.l</td></tr>\n\
    <tr><td>find_taint_sources</td><td>cpg.call.name(getenv, fgets, ...)</td></tr>\n\
    <tr><td>find_taint_flows</td><td>sink.reachableByFlows(source)</td></tr>\n<tr><td>get_program_slice</td><td>sink.reachableBy(cpg.method.astNodes)</td></tr>\n\
    <tr><td>find_use_after_free</td><td>free() → 后续引用追踪</td></tr>\n<tr><td>find_double_free</td><td>多个\
    \ free() 调用点检测</td></tr>\n<tr><td>find_null_pointer_deref</td><td>空指针解引用模式匹配</td></tr>\n\
    <tr><td>find_integer_overflow</td><td>malloc 参数溢出检测</td></tr>\n<tr><td>find_format_string_vulns</td><td>printf\
    \ 非字面量格式参数</td></tr>\n<tr><td>find_heap_overflow</td><td>堆缓冲区写入越界</td></tr>\n\
    <tr><td>find_stack_overflow</td><td>栈缓冲区写入越界</td></tr>\n<tr><td>find_toctou</td><td>access/stat\
    \ + open 分离操作</td></tr>\n<tr><td>find_uninitialized_reads</td><td>变量未初始化使用</td></tr>\n\
    </table>\n\n<hr>\n\n<h2>六、Joern 技术优势</h2>\n\n<table>\n<tr><th>优势</th><th>说明</th></tr>\n\
    <tr><td><strong>跨函数分析</strong></td><td>PDG 支持跨函数数据流追踪（突破 LLM token 限制）</td></tr>\n\
    <tr><td><strong>多语言支持</strong></td><td>C/C++/Java/Python/JS/Go/C#/PHP/Ruby/Swift/Kotlin\
    \ (12 种)</td></tr>\n<tr><td><strong>可扩展查询</strong></td><td>CPGQL 是 Scala DSL，可写任意复杂查询</td></tr>\n\
    <tr><td><strong>高效缓存</strong></td><td>CPG.bin 可持久化，代码不变无需重新生成</td></tr>\n<tr><td><strong>精确语义</strong></td><td>三图融合提供完整语义信息（AST+CFG+PDG）</td></tr>\n\
    <tr><td><strong>开源免费</strong></td><td>Apache 2.0 许可证，社区活跃</td></tr>\n</table>\n\
    \n<hr>\n\n<h2>七、与其他静态分析工具对比</h2>\n\n<table>\n<tr><th>工具</th><th>类型</th><th>跨函数分析</th><th>污点追踪</th><th>LLM\
    \ 集成</th></tr>\n<tr><td><strong>Joern</strong></td><td>CPG</td><td>✓ 精确</td><td>✓\
    \ 原生</td><td>✗ 需封装</td></tr>\n<tr><td><strong>CodeQL</strong></td><td>Datalog</td><td>✓\
    \ 精确</td><td>✓ 原生</td><td>✗ 需封装</td></tr>\n<tr><td><strong>Semgrep</strong></td><td>Pattern</td><td>✗\
    \ 单函数</td><td>✗ 无</td><td>✓ 直接</td></tr>\n<tr><td><strong>Clang Static Analyzer</strong></td><td>Path-sensitive</td><td>✓\
    \ 精确</td><td>✓ 原生</td><td>✗ 需封装</td></tr>\n<tr><td><strong>RAG/grep</strong></td><td>文本</td><td>✗\
    \ 无</td><td>✗ 无</td><td>✓ 直接</td></tr>\n</table>\n\n<p><strong>codebadger 的独特价值</strong>：Joern\
    \ 的精确语义分析 + MCP 协议 LLM 集成。</p>\n\n<hr>\n\n<h2>八、Joern 核心数据结构</h2>\n\n<h3>8.1 CPG\
    \ 节点类型</h3>\n\n<table>\n<tr><th>节点类型</th><th>说明</th><th>示例</th></tr>\n<tr><td>Method</td><td>函数/方法定义</td><td>int\
    \ foo(int x) {...}</td></tr>\n<tr><td>Call</td><td>函数调用</td><td>foo(42)</td></tr>\n\
    <tr><td>Local</td><td>局部变量</td><td>int x = 10;</td></tr>\n<tr><td>Identifier</td><td>标识符引用</td><td>x,\
    \ y, foo</td></tr>\n<tr><td>Literal</td><td>字面量</td><td>42, \"hello\", true</td></tr>\n\
    <tr><td>Block</td><td>代码块</td><td>{ ... }</td></tr>\n<tr><td>If/Else/While/For</td><td>控制结构</td><td>if\
    \ (x > 0) {...}</td></tr>\n<tr><td>Return</td><td>返回语句</td><td>return x;</td></tr>\n\
    <tr><td>Member</td><td>类成员</td><td>class.field</td></tr>\n<tr><td>TypeDecl</td><td>类型声明</td><td>struct\
    \ Foo {...}</td></tr>\n</table>\n\n<h3>8.2 CPG 边类型</h3>\n\n<table>\n<tr><th>边类型</th><th>说明</th><th>用途</th></tr>\n\
    <tr><td>AST 边</td><td>语法父子关系</td><td>结构遍历</td></tr>\n<tr><td>CFG 边</td><td>控制流跳转</td><td>执行路径分析</td></tr>\n\
    <tr><td>DDG 边</td><td>数据依赖（定义→使用）</td><td>污点追踪</td></tr>\n<tr><td>CDG 边</td><td>控制依赖</td><td>条件影响分析</td></tr>\n\
    <tr><td>CALL 边</td><td>函数调用关系</td><td>调用图构建</td></tr>\n<tr><td>EVAL_TYPE 边</td><td>类型信息</td><td>类型推断</td></tr>\n\
    </table>\n\n<hr>\n\n<h2>九、部署 Joern</h2>\n\n<h3>9.1 codebadger Docker（推荐）</h3>\n\
    \n<pre style=\"background: #1a1a2e; color: #d4d4d4; padding: 1em; border-radius:\
    \ 8px;\">\n# 启动预配置的 Joern 容器\ndocker compose up -d\n\n# 验证服务\ndocker ps | grep\
    \ joern\n</pre>\n\n<h3>9.2 独立安装</h3>\n\n<pre style=\"background: #1a1a2e; color:\
    \ #d4d4d4; padding: 1em; border-radius: 8px;\">\n# 安装 Joern\ncurl -L \"https://github.com/joernio/joern/releases/latest/download/joern-install.sh\"\
    \ | sh\n\n# 生成 CPG\njoern-parse /path/to/code\n\n# 启动交互式查询\njoern\n\n# 在 REPL\
    \ 中查询\nimportCode(\"cpg.bin\")\ncpg.method.name.l\n</pre>\n\n<h3>9.3 配置选项</h3>\n\
    \n<pre style=\"background: #1a1a2e; color: #d4d4d4; padding: 1em; border-radius:\
    \ 8px;\">\n# Java 堆内存（大代码库需要更多内存）\nJOERN_JAVA_OPTS=\"-Xmx16G -Xms8G\"\n\n# CPG\
    \ 生成超时\nCPG_GENERATION_TIMEOUT=600  # 10 分钟\n\n# 最大仓库大小\nMAX_REPO_SIZE_MB=500\n\
    </pre>\n\n<hr>\n\n<h2>十、CPG 论文背景</h2>\n\n<p><strong>原始论文</strong>：</p>\n<blockquote>\n\
    <strong>The Code Property Graph — A New Program Representation for Security Analysis</strong><br>\n\
    Fabian Yamaguchi, Nico Golde, Daniel Arp, Konrad Rieck<br>\nNDSS 2014 (Network\
    \ and Distributed System Security Symposium)<br>\n<a href=\"https://www.usenix.org/conference/ndss14\"\
    >https://www.usenix.org/conference/ndss14</a>\n</blockquote>\n\n<p><strong>论文贡献</strong>：</p>\n\
    <ul>\n<li>提出 Code Property Graph 统一表示（AST + CFG + PDG）</li>\n<li>设计 CPGQL 查询语言</li>\n\
    <li>验证在漏洞检测中的有效性（分析 6 个真实 CVE）</li>\n<li>奠定 Joern 的理论基础</li>\n</ul>\n\n<hr>\n\n\
    <h2>十一、Joern 应用场景</h2>\n\n<table>\n<tr><th>场景</th><th>用途</th></tr>\n<tr><td>漏洞扫描</td><td>检测\
    \ UAF/Double-Free/Overflow/TOCTOU 等</td></tr>\n<tr><td>代码审计</td><td>理解大型代码库结构和数据流</td></tr>\n\
    <tr><td>安全研究</td><td>发现未公开漏洞（如 codebadger 的 5 个 CVE）</td></tr>\n<tr><td>补丁验证</td><td>确认修复是否完整覆盖漏洞路径</td></tr>\n\
    <tr><td>逆向分析</td><td>Ghidra 二进制 CPG 支持</td></tr>\n<tr><td>LLM 增强</td><td>为 AI\
    \ Agent 提供精确语义导航</td></tr>\n</table>\n\n<hr>\n\n<h2>十二、总结</h2>\n\n<h3>三句话总结</h3>\n\
    \n<ol>\n<li><strong>理论基础</strong>：CPG = AST + CFG + PDG，三图融合提供完整代码语义</li>\n<li><strong>技术优势</strong>：跨函数数据流追踪、12\
    \ 种语言支持、可扩展 CPGQL 查询</li>\n<li><strong>应用价值</strong>：codebadger 封装后成为 LLM Agent\
    \ 的漏洞检测引擎，发现 5 个真实 CVE</li>\n</ol>\n\n<h3>核心价值表</h3>\n\n<table>\n<tr><th>价值</th><th>说明</th></tr>\n\
    <tr><td>精确语义分析</td><td>三图融合提供完整语义信息，超越纯文本分析</td></tr>\n<tr><td>跨函数追踪</td><td>PDG\
    \ 支持跨边界数据流追踪，突破 LLM token 限制</td></tr>\n<tr><td>开源生态</td><td>Apache 2.0 许可证，活跃社区，持续迭代</td></tr>\n\
    <tr><td>LLM 集成桥梁</td><td>codebadger MCP Server 让 Joern 能被 AI Agent 直接调用</td></tr>\n\
    </table>\n\n<hr>\n\n<h2>参考文献</h2>\n\n<ul>\n<li><a href=\"https://joern.io\">Joern\
    \ 官方文档</a></li>\n<li><a href=\"https://github.com/joernio/joern\">Joern GitHub\
    \ 仓库</a></li>\n<li><a href=\"https://www.usenix.org/conference/ndss14\">The Code\
    \ Property Graph 论文 (NDSS 2014)</a></li>\n<li><a href=\"https://arxiv.org/abs/2603.24837\"\
    >Bridging CPG and LLM 论文 (SVM '26)</a></li>\n<li><a href=\"https://github.com/lekssays/codebadger\"\
    >codebadger 项目</a></li>\n</ul>\n"
- title: codebadger：MCP + CPG 语义代码分析引擎深度解析
  date: April 21, 2026
  excerpt: codebadger 是 MCP Server + Joern CPG 的语义代码分析引擎，让 LLM 按需获取代码语义信息而非加载全部代码。支持
    12 种语言，提供 29 个 MCP 工具（核心 4 + 浏览 8 + 语义 3 + 漏洞检测 14）。实战成果：5 个真实 CVE（libsoup HTTP
    Smuggling、VLC OOB Read、libxml2 Stack Overflow、php-src Integer Overflow）。架构详解：JoernServerManager
    LRU 服务池、CPGGenerator 缓存策略、QueryExecutor CPGQL 翻译。污点分析引擎配置：Sources/Sinks/Sanitizers
    按语言定制。集成方式：GitHub Copilot / Claude Code / Hermes Agent MCP 配置。
  content: "<blockquote>\n<strong>项目</strong>：https://github.com/lekssays/codebadger<br>\n\
    <strong>论文</strong>：Bridging Code Property Graphs and Language Models for Program\
    \ Analysis (SVM '26 @ ICSE 2026)<br>\n<strong>实战成果</strong>：5 个真实 CVE，含 Bug Bounty\n\
    </blockquote>\n\n<hr>\n\n<h2>一、项目概览</h2>\n\n<table>\n<tr><th>维度</th><th>数据</th></tr>\n\
    <tr><td>Stars</td><td>77</td></tr>\n<tr><td>Forks</td><td>11</td></tr>\n<tr><td>License</td><td>GPL-3.0</td></tr>\n\
    <tr><td>主要语言</td><td>Python</td></tr>\n<tr><td>代码量</td><td>8,680 行</td></tr>\n\
    <tr><td>测试量</td><td>7,480 行, 25 个测试文件</td></tr>\n<tr><td>支持语言</td><td>12 种（C/C++/Java/Python/JS/Go/C#/PHP/Ruby/Swift/Kotlin/Ghidra）</td></tr>\n\
    <tr><td>创建时间</td><td>2025-10-01</td></tr>\n</table>\n\n<hr>\n\n<h2>二、核心架构</h2>\n\
    \n<pre style=\"background: #1a1a2e; color: #d4d4d4; padding: 1.5em; border-radius:\
    \ 8px;\">\n┌─────────────────────────────────────────────────────────────┐\n│\
    \                    MCP Client (LLM)                          │\n│         Claude\
    \ Code / GitHub Copilot / Hermes               │\n└─────────────────────┬───────────────────────────────────────┘\n\
    \                      │ MCP Protocol (HTTP)\n                      ↓\n┌─────────────────────────────────────────────────────────────┐\n\
    │              codebadger MCP Server (FastMCP)                 │\n│          \
    \          http://localhost:4242/mcp                 │\n├─────────────────────────────────────────────────────────────┤\n\
    │  Tools Layer                                                 │\n│  ├── core_tools\
    \ (generate_cpg, run_cpgql_query)             │\n│  ├── code_browsing_tools (list_methods,\
    \ get_call_graph)     │\n│  ├── taint_analysis_tools (find_taint_flows, ...) \
    \          │\n│  └── custom_tools (可扩展探测器)                             │\n├─────────────────────────────────────────────────────────────┤\n\
    │  Services Layer                                              │\n│  ├── JoernServerManager\
    \ (LRU 池, 端口分配)                   │\n│  ├── CPGGenerator (Joern CLI → CPG.bin)\
    \                     │\n│  ├── QueryExecutor (CPGQL → 结构化结果)                \
    \      │\n│  ├── CodebaseTracker (状态追踪)                              │\n│  └──\
    \ GitManager (GitHub URL clone)                          │\n├─────────────────────────────────────────────────────────────┤\n\
    │  Storage Layer                                               │\n│  ├── SQLite\
    \ (codebadger.db)                                 │\n│  ├── File Cache (playground/cpgs/*.bin)\
    \                     │\n│  └── Redis (可选, 会话状态)                             \
    \     │\n└─────────────────────┬───────────────────────────────────────┘\n   \
    \                   │ Docker API\n                      ↓\n┌─────────────────────────────────────────────────────────────┐\n\
    │            Joern Container (Docker)                          │\n│         codebadger-joern-server\
    \                              │\n│  ├── Joern CLI (CPG 生成)                  \
    \                 │\n│  ├── Joern Server (查询执行, 多实例)                         │\n\
    │  └── Scala CPGQL 引擎                                        │\n└─────────────────────────────────────────────────────────────┘\n\
    </pre>\n\n<hr>\n\n<h2>三、核心组件详解</h2>\n\n<h3>3.1 JoernServerManager（服务池管理）</h3>\n\
    \n<p><strong>关键设计</strong>：</p>\n<ul>\n<li><strong>LRU 池</strong>：最多 max_active_servers\
    \ (默认 3) 个活跃 Joern 实例</li>\n<li><strong>端口分配</strong>：动态分配端口，避免冲突</li>\n<li><strong>Watchdog</strong>：定期检查服务器健康状态</li>\n\
    <li><strong>自动驱逐</strong>：超出上限时驱逐最久未使用的实例</li>\n</ul>\n\n<pre style=\"background:\
    \ #1a1a2e; color: #d4d4d4; padding: 1em; border-radius: 8px;\">\n# LRU 驱动逻辑\n\
    def _evict_lru_if_needed(self):\n    if len(self._ports) < self._max_active:\n\
    \        return None\n    lru_hash = next(iter(self._lru.items()))[0]\n    self.terminate_server(lru_hash)\n\
    \    self._lru_eviction_count += 1\n</pre>\n\n<h3>3.2 CPGGenerator（CPG 生成引擎）</h3>\n\
    \n<p><strong>流程</strong>：</p>\n<pre style=\"background: #1a1a2e; color: #d4d4d4;\
    \ padding: 1em; border-radius: 8px;\">\nGitHub URL / Local Path → Clone → Joern\
    \ CLI → CPG.bin → Cache\n</pre>\n\n<p><strong>缓存策略</strong>：</p>\n<ul>\n<li>按\
    \ source_type:source_path:language:commit_hash 生成 SHA256[:16] 作为缓存键</li>\n<li>CPG\
    \ 文件存储在 playground/cpgs/{cache_key}/cpg.bin</li>\n</ul>\n\n<p><strong>关键配置</strong>：</p>\n\
    <pre style=\"background: #1a1a2e; color: #d4d4d4; padding: 1em; border-radius:\
    \ 8px;\">\nCPG_GENERATION_TIMEOUT=600  # 10 分钟超时\nMAX_REPO_SIZE_MB=500       \
    \ # 最大仓库大小\n</pre>\n\n<h3>3.3 QueryExecutor（查询执行器）</h3>\n\n<p><strong>功能</strong>：</p>\n\
    <ul>\n<li>将高层工具调用翻译为 CPGQL 查询</li>\n<li>执行查询 → 返回结构化 JSON 结果</li>\n<li>查询缓存 +\
    \ TTL</li>\n</ul>\n\n<p><strong>配置</strong>：</p>\n<pre style=\"background: #1a1a2e;\
    \ color: #d4d4d4; padding: 1em; border-radius: 8px;\">\nQUERY_TIMEOUT=30     \
    \      # 查询超时\nQUERY_CACHE_ENABLED=true   # 启用缓存\nQUERY_CACHE_TTL=300        #\
    \ 缓存 5 分钟\n</pre>\n\n<hr>\n\n<h2>四、工具集详解</h2>\n\n<h3>4.1 Core Tools（4 个）</h3>\n\
    \n<table>\n<tr><th>工具</th><th>功能</th><th>使用场景</th></tr>\n<tr><td>generate_cpg</td><td>生成\
    \ CPG</td><td>初始化代码库分析</td></tr>\n<tr><td>get_cpg_status</td><td>检查 CPG 状态</td><td>确认\
    \ CPG 是否已生成</td></tr>\n<tr><td>run_cpgql_query</td><td>执行原生 CPGQL</td><td>高级用户自定义查询</td></tr>\n\
    <tr><td>get_cpgql_syntax_help</td><td>CPGQL 语法帮助</td><td>查询调试</td></tr>\n</table>\n\
    \n<h3>4.2 Code Browsing Tools（8 个）</h3>\n\n<table>\n<tr><th>工具</th><th>功能</th><th>返回内容</th></tr>\n\
    <tr><td>list_methods</td><td>查找函数</td><td>函数名、签名、文件位置</td></tr>\n<tr><td>list_files</td><td>文件树</td><td>分页文件列表</td></tr>\n\
    <tr><td>get_method_source</td><td>获取函数源码</td><td>完整函数实现</td></tr>\n<tr><td>list_calls</td><td>调用点列表</td><td>caller\
    \ → callee 映射</td></tr>\n<tr><td>get_call_graph</td><td>调用图</td><td>入向/出向调用关系</td></tr>\n\
    <tr><td>list_parameters</td><td>参数列表</td><td>参数名、类型、顺序</td></tr>\n<tr><td>get_codebase_summary</td><td>代码库概览</td><td>文件数、方法数、调用数</td></tr>\n\
    <tr><td>get_code_snippet</td><td>代码片段</td><td>指定行范围的代码</td></tr>\n</table>\n\n\
    <h3>4.3 Semantic Analysis Tools（3 个）</h3>\n\n<table>\n<tr><th>工具</th><th>功能</th><th>用途</th></tr>\n\
    <tr><td>get_cfg</td><td>控制流图</td><td>理解函数内部流程</td></tr>\n<tr><td>get_type_definition</td><td>类型定义</td><td>结构体/类成员</td></tr>\n\
    <tr><td>get_macro_expansion</td><td>宏展开检测</td><td>C/C++ 宏分析</td></tr>\n</table>\n\
    \n<h3>4.4 Taint & Vulnerability Analysis Tools（14 个）</h3>\n\n<table>\n<tr><th>工具</th><th>功能</th><th>CWE</th></tr>\n\
    <tr><td>find_taint_sources</td><td>定位污点源</td><td>—</td></tr>\n<tr><td>find_taint_sinks</td><td>定位危险操作点</td><td>—</td></tr>\n\
    <tr><td>find_taint_flows</td><td>source→sink 数据流</td><td>—</td></tr>\n<tr><td>get_program_slice</td><td>程序切片</td><td>—</td></tr>\n\
    <tr><td>get_variable_flow</td><td>变量数据依赖</td><td>—</td></tr>\n<tr><td>find_bounds_checks</td><td>边界检查验证</td><td>—</td></tr>\n\
    <tr><td>find_use_after_free</td><td>释放后使用检测</td><td>CWE-416</td></tr>\n<tr><td>find_double_free</td><td>双重释放检测</td><td>CWE-415</td></tr>\n\
    <tr><td>find_null_pointer_deref</td><td>空指针解引用</td><td>CWE-476</td></tr>\n<tr><td>find_integer_overflow</td><td>整数溢出</td><td>CWE-190</td></tr>\n\
    <tr><td>find_format_string_vulns</td><td>格式字符串漏洞</td><td>CWE-134</td></tr>\n<tr><td>find_heap_overflow</td><td>堆溢出</td><td>CWE-122</td></tr>\n\
    <tr><td>find_stack_overflow</td><td>栈溢出</td><td>CWE-121</td></tr>\n<tr><td>find_toctou</td><td>TOCTOU\
    \ 竞态</td><td>CWE-367</td></tr>\n<tr><td>find_uninitialized_reads</td><td>未初始化读取</td><td>CWE-457</td></tr>\n\
    </table>\n\n<hr>\n\n<h2>五、污点分析引擎配置</h2>\n\n<h3>5.1 Taint Sources（按语言）</h3>\n\n\
    <p><strong>C/C++</strong>：</p>\n<pre style=\"background: #1a1a2e; color: #d4d4d4;\
    \ padding: 1em; border-radius: 8px;\">\n[\"getenv\", \"fgets\", \"scanf\", \"\
    read\", \"recv\", \"fread\", \"gets\", \n \"getchar\", \"fscanf\", \"recvfrom\"\
    , \"socket\", \"accept\", \"fopen\", \n \"getline\", \"realpath\", \"getaddrinfo\"\
    ]\n</pre>\n\n<p><strong>Python</strong>：</p>\n<pre style=\"background: #1a1a2e;\
    \ color: #d4d4d4; padding: 1em; border-radius: 8px;\">\n[\"input\", \"sys.argv\"\
    , \"os.environ\", \"request.args\", \"request.form\",\n \"request.json\", \"request.cookies\"\
    , \"request.headers\"]\n</pre>\n\n<p><strong>JavaScript</strong>：</p>\n<pre style=\"\
    background: #1a1a2e; color: #d4d4d4; padding: 1em; border-radius: 8px;\">\n[\"\
    req.body\", \"req.query\", \"req.params\", \"process.env\", \"fetch\"]\n</pre>\n\
    \n<h3>5.2 Taint Sinks（按语言）</h3>\n\n<p><strong>C/C++</strong>：</p>\n<pre style=\"\
    background: #1a1a2e; color: #d4d4d4; padding: 1em; border-radius: 8px;\">\n[\"\
    system\", \"popen\", \"execl\", \"sprintf\", \"strcpy\", \"strcat\", \n \"memcpy\"\
    , \"malloc\", \"free\", \"printf\", \"fopen\", \"write\"]\n</pre>\n\n<p><strong>Python</strong>：</p>\n\
    <pre style=\"background: #1a1a2e; color: #d4d4d4; padding: 1em; border-radius:\
    \ 8px;\">\n[\"eval\", \"exec\", \"os.system\", \"subprocess.Popen\", \"pickle.load\"\
    ]\n</pre>\n\n<h3>5.3 Sanitizers（清洁器）</h3>\n\n<p><strong>C/C++</strong>：</p>\n\
    <pre style=\"background: #1a1a2e; color: #d4d4d4; padding: 1em; border-radius:\
    \ 8px;\">\n[\"strlcpy\", \"strlcat\", \"snprintf\", \"strtol\", \"atoi\"]\n</pre>\n\
    \n<p><strong>PHP</strong>：</p>\n<pre style=\"background: #1a1a2e; color: #d4d4d4;\
    \ padding: 1em; border-radius: 8px;\">\n[\"htmlspecialchars\", \"htmlentities\"\
    , \"mysqli_real_escape_string\"]\n</pre>\n\n<hr>\n\n<h2>六、实战成果（TROPHIES）</h2>\n\
    \n<table>\n<tr><th>CVE</th><th>项目</th><th>漏洞类型</th><th>严重性</th><th>日期</th></tr>\n\
    <tr><td><strong>CVE-2026-1801</strong></td><td>libsoup</td><td>HTTP Request Smuggling</td><td>High</td><td>2026-02-11</td></tr>\n\
    <tr><td><strong>CVE-2025-51602</strong></td><td>VLC</td><td>Out-of-Bounds Read</td><td>Medium</td><td>2026-02-11</td></tr>\n\
    <tr><td><strong>CVE-2025-6170</strong></td><td>libxml2</td><td>Stack Buffer Overflow\
    \ (xmllint)</td><td>Medium</td><td>2026-02-02</td></tr>\n<tr><td><strong>CVE-2025-6021</strong></td><td>libxml2</td><td>Integer\
    \ Overflow → Stack Overflow</td><td>High</td><td>2026-02-02</td></tr>\n<tr><td><strong>CVE-2025-6491</strong></td><td>php-src</td><td>Integer\
    \ Overflow (SoapVar)</td><td>High</td><td>2026-02-02</td></tr>\n</table>\n\n<p><strong>关键成果</strong>：</p>\n\
    <ul>\n<li>5 个真实 CVE（含 Bug Bounty）</li>\n<li>libxml2 补丁首次尝试生成正确修复</li>\n</ul>\n\
    \n<hr>\n\n<h2>七、测试覆盖</h2>\n\n<table>\n<tr><th>测试文件</th><th>覆盖内容</th></tr>\n<tr><td>test_double_free.py</td><td>双重释放检测</td></tr>\n\
    <tr><td>test_format_string.py</td><td>格式字符串漏洞</td></tr>\n<tr><td>test_heap_overflow.py</td><td>堆溢出检测</td></tr>\n\
    <tr><td>test_integer_overflow.py</td><td>整数溢出检测</td></tr>\n<tr><td>test_null_pointer_deref.py</td><td>空指针解引用</td></tr>\n\
    <tr><td>test_stack_overflow.py</td><td>栈溢出检测</td></tr>\n<tr><td>test_toctou.py</td><td>TOCTOU\
    \ 竞态</td></tr>\n<tr><td>test_use_after_free.py</td><td>释放后使用</td></tr>\n<tr><td>test_uninitialized_read.py</td><td>未初始化读取</td></tr>\n\
    <tr><td>test_program_slice.py</td><td>程序切片算法</td></tr>\n<tr><td>test_taint_tools.py</td><td>污点分析工具</td></tr>\n\
    <tr><td>test_mcp_tools.py</td><td>MCP 协议集成</td></tr>\n</table>\n\n<p><strong>测试密度</strong>：src\
    \ 代码量 : tests 代码量 ≈ 1:0.86（高覆盖）</p>\n\n<hr>\n\n<h2>八、集成方式</h2>\n\n<h3>8.1 GitHub\
    \ Copilot</h3>\n\n<pre style=\"background: #1a1a2e; color: #d4d4d4; padding: 1em;\
    \ border-radius: 8px;\">\n// ~/.config/Code/User/mcp.json\n{\n  \"servers\": {\n\
    \    \"codebadger\": {\n      \"url\": \"http://localhost:4242/mcp\",\n      \"\
    type\": \"http\"\n    }\n  }\n}\n</pre>\n\n<h3>8.2 Claude Code</h3>\n\n<pre style=\"\
    background: #1a1a2e; color: #d4d4d4; padding: 1em; border-radius: 8px;\">\n//\
    \ Claude → Settings → Developer → claude_desktop_config.json\n{\n  \"mcpServers\"\
    : {\n    \"codebadger\": {\n      \"url\": \"http://localhost:4242/mcp\",\n  \
    \    \"type\": \"http\"\n    }\n  }\n}\n</pre>\n\n<h3>8.3 Hermes Agent</h3>\n\n\
    <p>通过 native-mcp 技能配置：</p>\n<pre style=\"background: #1a1a2e; color: #d4d4d4;\
    \ padding: 1em; border-radius: 8px;\">\n# ~/.hermes/config.yaml\nmcp_servers:\n\
    \  - name: codebadger\n    url: http://localhost:4242/mcp\n    transport: http\n\
    </pre>\n\n<hr>\n\n<h2>九、关键技术亮点</h2>\n\n<table>\n<tr><th>亮点</th><th>说明</th></tr>\n\
    <tr><td>语义导航架构</td><td>LLM 不读全部代码，按需调用工具获取语义信息</td></tr>\n<tr><td>LRU 服务池</td><td>动态管理\
    \ Joern 实例，自动驱逐最久未用</td></tr>\n<tr><td>缓存策略</td><td>按 commit hash 缓存 CPG，代码变更自动失效</td></tr>\n\
    <tr><td>跨语言支持</td><td>12 种语言的 sources/sinks/sanitizers 配置</td></tr>\n<tr><td>可扩展探测器</td><td>用户可添加自定义\
    \ Scala 查询 + Python 工具</td></tr>\n<tr><td>OpenTelemetry</td><td>可选分布式追踪，集成 Jaeger</td></tr>\n\
    <tr><td>真实漏洞发现</td><td>5 个 CVE，含 Bug Bounty</td></tr>\n</table>\n\n<hr>\n\n<h2>十、部署流程</h2>\n\
    \n<pre style=\"background: #1a1a2e; color: #d4d4d4; padding: 1em; border-radius:\
    \ 8px;\">\n# 1. 安装依赖\npip install -r requirements.txt\n\n# 2. 启动 Joern Docker\n\
    docker compose up -d\n\n# 3. 启动 MCP Server\npython main.py &\n\n# 4. 验证服务\ncurl\
    \ http://localhost:4242/health\n</pre>\n\n<hr>\n\n<h2>十一、与 Hermes Agent 集成建议</h2>\n\
    \n<table>\n<tr><th>集成点</th><th>建议</th></tr>\n<tr><td>MCP 配置</td><td>在 config.yaml\
    \ 添加 codebadger MCP server</td></tr>\n<tr><td>代码审查增强</td><td>在 github-code-review\
    \ 技能中调用 find_taint_flows</td></tr>\n<tr><td>漏洞扫描流程</td><td>创建新技能 codebadger-vulnerability-scan</td></tr>\n\
    <tr><td>自定义探测器</td><td>为 Hermes 项目添加 Hermes-specific 漏洞检测</td></tr>\n</table>\n\
    \n<hr>\n\n<h2>十二、总结</h2>\n\n<h3>三句话总结</h3>\n\n<ol>\n<li><strong>架构创新</strong>：MCP\
    \ Server + Joern CPG，让 LLM 语义导航大型代码库</li>\n<li><strong>实战验证</strong>：5 个真实 CVE，含首次尝试生成正确补丁</li>\n\
    <li><strong>可扩展</strong>：支持 12 种语言，用户可添加自定义探测器</li>\n</ol>\n\n<h3>核心价值</h3>\n\n\
    <table>\n<tr><th>价值</th><th>说明</th></tr>\n<tr><td>解决 Token 困境</td><td>不加载全部代码，按需获取语义信息</td></tr>\n\
    <tr><td>跨函数漏洞检测</td><td>污点追踪 + 程序切片，发现跨边界漏洞</td></tr>\n<tr><td>MCP 协议兼容</td><td>可被\
    \ Claude Code / Copilot / Hermes 直接调用</td></tr>\n<tr><td>开源 + 可扩展</td><td>GPL-3.0，支持自定义\
    \ Scala 查询 + Python 工具</td></tr>\n</table>\n\n<hr>\n\n<h2>参考文献</h2>\n\n<ul>\n\
    <li><a href=\"https://github.com/lekssays/codebadger\">codebadger GitHub 仓库</a></li>\n\
    <li><a href=\"https://arxiv.org/abs/2603.24837\">Bridging Code Property Graphs\
    \ and Language Models for Program Analysis</a></li>\n<li><a href=\"https://joern.io\"\
    >Joern 官方文档</a></li>\n</ul>\n"
- title: Oh My OpenAgent：为什么它不是另一个 Boilerplate
  date: April 21, 2026
  excerpt: Anthropic 因它封禁 OpenCode。核心定位：生产级多 Agent 编排引擎，不是模板。五大特征：Hashline 编辑工具（6.7%→68.3%成功率）、Discipline
    Agents（永不停止）、Category-Based Model Routing（自动路由）、Skill-Embedded MCPs（按需启动）、LSP+AST-Grep（IDE级精度）。三种模式：Ultrawork懒人模式、Prometheus规划模式、Hephaestus深度模式。架构图+流程图详解。
  content: "<blockquote>\n<strong>项目</strong>：https://github.com/code-yeongyu/oh-my-openagent<br>\n\
    <strong>热度</strong>：Anthropic 因它封禁 OpenCode<br>\n<strong>核心定位</strong>：生产级多 Agent\
    \ 编排引擎，不是模板\n</blockquote>\n\n<hr>\n\n<h2>一、核心论断</h2>\n\n<p><strong>这不是模板，是运行时编排引擎。</strong></p>\n\
    \n<table>\n<tr><th>维度</th><th>Boilerplate</th><th>Oh My OpenAgent</th></tr>\n\
    <tr><td>本质</td><td>预配置模板（复制即用）</td><td>运行时编排引擎（动态决策）</td></tr>\n<tr><td>模型选择</td><td>硬编码单模型</td><td>Category\
    \ 系统自动路由</td></tr>\n<tr><td>编辑工具</td><td>标准 patch/replace</td><td>Hashline（行哈希校验）</td></tr>\n\
    <tr><td>Agent 协作</td><td>单 Agent</td><td>Sisyphus + 5+ 子 Agent 并行</td></tr>\n\
    <tr><td>状态追踪</td><td>无</td><td>.sisyphus/ wisdom 积累</td></tr>\n<tr><td>MCP 管理</td><td>全局加载</td><td>Skill-Embedded\
    \ 按需启动</td></tr>\n<tr><td>LSP/AST</td><td>无</td><td>IDE 级精度</td></tr>\n</table>\n\
    \n<hr>\n\n<h2>二、架构总览</h2>\n\n<h3>层级关系图</h3>\n\n<pre style=\"background: #1a1a2e;\
    \ color: #d4d4d4; padding: 1.5em; border-radius: 8px;\">\n┌─────────────────────────────────────────────────────────┐\n\
    │                      Hermes Agent                        │\n│          (上层编排器，管理终端/进程/会话)\
    \                   │\n└─────────────────────┬───────────────────────────────────┘\n\
    \                      │ terminal / process\n                      ↓\n┌─────────────────────────────────────────────────────────┐\n\
    │                     OpenCode CLI                         │\n│       (基础 AI 编码代理，TUI\
    \ + CLI，工具调用)              │\n└─────────────────────┬───────────────────────────────────┘\n\
    \                      │ 插件系统\n                      ↓\n┌─────────────────────────────────────────────────────────┐\n\
    │              Oh My OpenAgent (OmO) 插件                  │\n│       (多 Agent 编排层，Sisyphus/Prometheus/Atlas等)\
    \     │\n└─────────────────────────────────────────────────────────┘\n</pre>\n\
    \n<h3>定位说明</h3>\n\n<table>\n<tr><th>组件</th><th>定位</th><th>类比</th></tr>\n<tr><td>OpenCode</td><td>基础执行引擎</td><td>单兵作战</td></tr>\n\
    <tr><td>OmO</td><td>编排插件</td><td>团队协作</td></tr>\n<tr><td>Hermes</td><td>上层控制器</td><td>项目经理</td></tr>\n\
    </table>\n\n<hr>\n\n<h2>三、OmO 内部架构流程图</h2>\n\n<pre style=\"background: #1a1a2e;\
    \ color: #d4d4d4; padding: 1.5em; border-radius: 8px;\">\n用户请求 → IntentGate（意图识别）\n\
    \              ↓\n         Sisyphus（永不停止的主编排器）\n              ↓\n    ┌─────────┼─────────┬─────────┐\n\
    \    ↓         ↓         ↓         ↓\nPrometheus   Atlas   Hephaestus  Librarian\n\
    (规划师)    (执行者)  (深度工)   (文档搜索)\n    ↓         ↓         ↓         ↓\n Metis  \
    \    Category   自主研究   Explore\n(差距分析)   Agents    +验证\n    ↓         ↓\n Momus\
    \      visual/deep/quick\n(无情评审)\n</pre>\n\n<h3>核心 Agent 角色</h3>\n\n<table>\n\
    <tr><th>Agent</th><th>模型推荐</th><th>职责</th></tr>\n<tr><td>Sisyphus</td><td>GLM-5\
    \ / Claude Opus</td><td>主编排器，永不停止</td></tr>\n<tr><td>Prometheus</td><td>GLM-5\
    \ / Kimi K2.5</td><td>战略规划，访谈澄清需求</td></tr>\n<tr><td>Atlas</td><td>Claude/GPT/Gemini</td><td>执行\
    \ Prometheus 计划</td></tr>\n<tr><td>Hephaestus</td><td>GPT-5.4 xhigh</td><td>自主深度工</td></tr>\n\
    <tr><td>Metis</td><td>—</td><td>规划前差距分析</td></tr>\n<tr><td>Momus</td><td>—</td><td>无情评审计划</td></tr>\n\
    <tr><td>Oracle</td><td>GLM-5</td><td>架构顾问（只读）</td></tr>\n<tr><td>Librarian</td><td>MiniMax\
    \ / Haiku</td><td>OSS 文档搜索</td></tr>\n<tr><td>Explore</td><td>快模型</td><td>代码库\
    \ grep</td></tr>\n</table>\n\n<hr>\n\n<h2>四、五大非 Boilerplate 特征</h2>\n\n<h3>1.\
    \ Hash-Anchored Edit Tool（解决 Harness Problem）</h3>\n\n<blockquote>\n<strong>\"\
    Most agent failures aren't the model. It's the edit tool.\"</strong> — Can Bölük\n\
    </blockquote>\n\n<p><strong>问题根源</strong>：传统 edit tool 要求模型复现已读内容，模型做不到 → 用户怪模型。</p>\n\
    \n<p><strong>OmO 解决方案（Hashline）</strong>：</p>\n\n<pre style=\"background: #1a1a2e;\
    \ color: #d4d4d4; padding: 1.5em; border-radius: 8px;\">\n# 传统编辑（模型需复现内容）\npatch(old=\"\
    function hello() {\", new=\"function greet() {\")\n\n# Hashline 编辑（引用哈希标签）\n11#VK|\
    \ function hello() {\n22#XJ|   return \"world\";\n33#MB| }\n\n# Agent 只需引用标签，不复现内容\n\
    edit(line=11, hash=VK, new_content=\"function greet() {\")\n</pre>\n\n<p><strong>机制</strong>：</p>\n\
    <ul>\n<li>每行带哈希标签 #VK</li>\n<li>Agent 编辑时引用标签</li>\n<li>文件变更 → 哈希不匹配 → 编辑被拒绝</li>\n\
    <li>零 whitespace 复现错误，零 stale-line 错误</li>\n</ul>\n\n<p><strong>实测数据</strong>：Grok\
    \ Code Fast 1 成功率 <strong>6.7% → 68.3%</strong>（仅换编辑工具）</p>\n\n<hr>\n\n<h3>2.\
    \ Discipline Agents（永不停止的编排器）</h3>\n\n<p><strong>Sisyphus = \"永不停止\"的主 Agent</strong>：</p>\n\
    \n<pre style=\"background: #1a1a2e; color: #d4d4d4; padding: 1.5em; border-radius:\
    \ 8px;\">\n用户任务 → Sisyphus 接管\n    ↓\n监控子 Agent 进度\n    ↓\n阻塞 → 自动重试 → 换策略 → 再试\n\
    \    ↓\n任务完成才退出\n</pre>\n\n<h3>效率对比</h3>\n\n<table>\n<tr><th>系统</th><th>完成时间</th><th>原因</th></tr>\n\
    <tr><td>Human</td><td>3 months</td><td>手动迭代</td></tr>\n<tr><td>Claude Code</td><td>7\
    \ days</td><td>单 Agent，每步需确认</td></tr>\n<tr><td><strong>Sisyphus</strong></td><td><strong>1\
    \ hour</strong></td><td>多 Agent 并行，自动闭环</td></tr>\n</table>\n\n<blockquote>\n\
    <strong>\"If Claude Code does in 7 days what a human does in 3 months, Sisyphus\
    \ does it in 1 hour.\"</strong> — B, Quant Researcher\n</blockquote>\n\n<hr>\n\
    \n<h3>3. Category-Based Model Routing（任务→模型自动映射）</h3>\n\n<p><strong>Boilerplate\
    \ 做法</strong>：硬编码 \"model\": \"claude-opus-4\"</p>\n\n<p><strong>OmO 做法</strong>：Agent\
    \ 声明 category → Harness 自动选模型</p>\n\n<table>\n<tr><th>Category</th><th>默认模型</th><th>适用场景</th></tr>\n\
    <tr><td>visual-engineering</td><td>Gemini 3.1 Pro</td><td>前端/UI/UX</td></tr>\n\
    <tr><td>ultrabrain</td><td>GPT-5.4 xhigh</td><td>深度推理/架构</td></tr>\n<tr><td>deep</td><td>GPT-5.4\
    \ medium</td><td>自主执行</td></tr>\n<tr><td>quick</td><td>GPT-5.4-mini</td><td>单文件修改</td></tr>\n\
    <tr><td>unspecified-high</td><td>Claude Opus 4.7</td><td>通用高投入</td></tr>\n<tr><td>writing</td><td>Kimi\
    \ K2.5</td><td>文档/博客</td></tr>\n</table>\n\n<p><strong>动态优势</strong>：</p>\n<ul>\n\
    <li>Agent 不需要知道模型名</li>\n<li>模型成本下降 → 自动换更便宜的</li>\n<li>新模型发布 → 更新映射表 → 无需改代码</li>\n\
    </ul>\n\n<hr>\n\n<h3>4. Skill-Embedded MCPs（Context 预算管理）</h3>\n\n<p><strong>传统\
    \ MCP 问题</strong>：全局加载所有 MCP servers → 吃掉 context window → 长任务失败</p>\n\n<p><strong>OmO\
    \ 解决方案</strong>：</p>\n\n<pre style=\"background: #1a1a2e; color: #d4d4d4; padding:\
    \ 1.5em; border-radius: 8px;\">\nSkill 携带自己的 MCP server\n    ↓\n任务触发 Skill → MCP\
    \ 按需启动\n    ↓\nScoped 到任务\n    ↓\n任务结束 → MCP 关闭 → context 释放\n</pre>\n\n<table>\n\
    <tr><th>方案</th><th>Context 占用</th><th>适用场景</th></tr>\n<tr><td>传统全局 MCP</td><td>持续占用</td><td>短任务</td></tr>\n\
    <tr><td>Skill-Embedded</td><td>按需分配</td><td>长任务/多任务并行</td></tr>\n</table>\n\n\
    <hr>\n\n<h3>5. LSP + AST-Grep（IDE 级精度）</h3>\n\n<p><strong>传统 Agent 编辑</strong>：grep\
    \ 找文本 → patch 替换 → whitespace 错误 → 破坏代码</p>\n\n<p><strong>OmO 工具集</strong>：</p>\n\
    \n<table>\n<tr><th>工具</th><th>功能</th><th>精度</th></tr>\n<tr><td>lsp_rename</td><td>Workspace\
    \ 级重命名</td><td>IDE 级（跨文件同步）</td></tr>\n<tr><td>lsp_goto_definition</td><td>跨文件跳转</td><td>IDE\
    \ 级（AST 解析）</td></tr>\n<tr><td>lsp_diagnostics</td><td>预构建诊断</td><td>IDE 级（实时错误检测）</td></tr>\n\
    <tr><td>ast_grep</td><td>25 语言 AST-aware 搜索</td><td>AST 级（语义匹配）</td></tr>\n</table>\n\
    \n<hr>\n\n<h2>五、三种工作模式流程图</h2>\n\n<h3>Mode 1: Ultrawork（懒人模式）</h3>\n\n<pre style=\"\
    background: #1a1a2e; color: #d4d4d4; padding: 1.5em; border-radius: 8px;\">\n\
    opencode run 'ulw add JWT auth to Express'\n\nIntentGate 识别 ulw 关键词\n    ↓\nSisyphus\
    \ 启动编排\n    ↓\nExplore Agent 扫描代码库\n    ↓\nLibrarian 搜索 JWT 最佳实践\n    ↓\nCategory\
    \ Agent (deep) 实现核心逻辑\n    ↓\nCategory Agent (quick) 添加测试\n    ↓\n验证 → 发现问题 →\
    \ 自动修复循环\n    ↓\n完成，无需用户干预\n</pre>\n\n<p><strong>特点</strong>：一句话触发，自动完成全流程</p>\n\
    \n<hr>\n\n<h3>Mode 2: Prometheus Planning（精确控制模式）</h3>\n\n<pre style=\"background:\
    \ #1a1a2e; color: #d4d4d4; padding: 1.5em; border-radius: 8px;\">\nopencode  \
    \                      # 启动 TUI\n@plan migrate MongoDB to PostgreSQL  # 进入规划\n\
    \nPrometheus 访谈用户\n    ↓\n生成详细计划 → .sisyphus/plans/migrate-db.md\n    ↓\nMetis\
    \ 分析差距（缺失信息、风险）\n    ↓\nMomus 评审计划（拒绝不靠谱部分）\n    ↓\n/start-work\n    ↓\nAtlas\
    \ 执行计划，记录 wisdom\n    ↓\n.sisyphus/notepads/migrate-db/\n    ├── learnings.md\n\
    \    ├── decisions.md\n    └── issues.md\n</pre>\n\n<p><strong>特点</strong>：决策留痕，跨会话连续执行</p>\n\
    \n<hr>\n\n<h3>Mode 3: Hephaestus Deep Work（深度推理模式）</h3>\n\n<pre style=\"background:\
    \ #1a1a2e; color: #d4d4d4; padding: 1.5em; border-radius: 8px;\">\nopencode --agent\
    \ hephaestus\n\nHephaestus (GPT-5.4 xhigh)\n    ↓\n自主探索代码库\n    ↓\n跨域综合、架构决策\n\
    \    ↓\n复杂调试、系统性重构\n</pre>\n\n<p><strong>特点</strong>：最高推理能力，自主执行</p>\n\n<hr>\n\
    \n<h2>六、状态持久化结构</h2>\n\n<p>OmO 创建 <code>.sisyphus/</code> 目录追踪执行状态：</p>\n\n<pre\
    \ style=\"background: #1a1a2e; color: #d4d4d4; padding: 1.5em; border-radius:\
    \ 8px;\">\n.sisyphus/\n├── plans/\n│   └── migrate-db.md          # Prometheus\
    \ 计划文件\n├── boulder.json               # Atlas 执行状态（进度、阻塞点）\n├── notepads/\n│\
    \   └── migrate-db/\n│       ├── learnings.md       # 成功经验、发现模式\n│       ├── decisions.md\
    \       # 架构决策记录\n│       ├── issues.md          # 遇到的问题、阻塞点\n│       └── verification.md\
    \    # 测试结果、验证步骤\n</pre>\n\n<p><strong>作用</strong>：</p>\n<ul>\n<li>跨会话恢复执行</li>\n\
    <li>Wisdom 积累（成功经验复用）</li>\n<li>问题追踪（阻塞点不丢失）</li>\n</ul>\n\n<hr>\n\n<h2>七、Anthropic\
    \ 为什么封禁 OpenCode</h2>\n\n<blockquote>\n<strong>\"Anthropic blocked OpenCode because\
    \ of us. They want you locked in.\"</strong>\n</blockquote>\n\n<p><strong>核心冲突</strong>：</p>\n\
    \n<table>\n<tr><th>系统</th><th>立场</th><th>模型策略</th></tr>\n<tr><td>Claude Code</td><td>Anthropic\
    \ 生态闭环</td><td>只推 Claude 模型</td></tr>\n<tr><td><strong>OmO</strong></td><td><strong>多供应商开放</strong></td><td>Claude/Kimi/GLM\
    \ + GPT + Gemini</td></tr>\n</table>\n\n<p><strong>技术洞察</strong>：</p>\n<pre style=\"\
    background: #1a1a2e; color: #d4d4d4; padding: 1.5em; border-radius: 8px;\">\n\
    Claude Code = 精装修的监狱\nOmO = 骑所有模型，不绑定供应商\n</pre>\n\n<p>作者将 Hephaestus 命名为 \"The\
    \ Legitimate Craftsman\" —— 讽刺 Anthropic 的封锁行为。</p>\n\n<hr>\n\n<h2>八、真实用户证据</h2>\n\
    \n<table>\n<tr><th>用户</th><th>评价</th><th>来源</th></tr>\n<tr><td>Arthur Guiot</td><td>\"\
    取消 Cursor订阅，开源太疯狂\"</td><td>X</td></tr>\n<tr><td>Jacob Ferrari</td><td>\"一天消灭\
    \ 8000 eslint warnings\"</td><td>X</td></tr>\n<tr><td>James Hargis</td><td>\"\
    45k 行 Tauri App → SaaS 一夜完成\"</td><td>X</td></tr>\n<tr><td>Henning Kilset</td><td>\"\
    应该拉进 core 并招募他\"</td><td>反馈</td></tr>\n<tr><td>mysticaltech</td><td>\"hire 作者，他革命了\
    \ opencode\"</td><td>X</td></tr>\n</table>\n\n<hr>\n\n<h2>九、开发者动机</h2>\n\n<blockquote>\n\
    <strong>\"I burned through $24K in LLM tokens on personal projects. Tried every\
    \ tool. OpenCode won.\"</strong>\n</blockquote>\n\n<p><strong>这不是为了卖模板，是解决自己的痛点</strong>：</p>\n\
    \n<table>\n<tr><th>问题</th><th>OmO 答案</th></tr>\n<tr><td>哪个模型逻辑最锐利？</td><td>GPT-5.4\
    \ xhigh</td></tr>\n<tr><td>谁是调试之神？</td><td>Hephaestus</td></tr>\n<tr><td>谁写散文最好？</td><td>Kimi\
    \ K2.5</td></tr>\n<tr><td>谁统治前端？</td><td>Gemini 3.1 Pro</td></tr>\n<tr><td>日常驾驶最快的？</td><td>GPT-5.4-mini</td></tr>\n\
    </table>\n\n<p><strong>OmO = 这些问题的答案集合，持续更新。</strong></p>\n\n<hr>\n\n<h2>十、结论</h2>\n\
    \n<h3>三句话总结</h3>\n\n<ol>\n<li><strong>不是模板，是引擎</strong>：runtime 决策，动态路由，自动恢复</li>\n\
    <li><strong>解决 Harness Problem</strong>：Hashline 把编辑成功率从 6.7% 拉到 68.3%</li>\n\
    <li><strong>多模型编排</strong>：Claude/Kimi/GLM 编排 + GPT 推理 + Gemini 前端，不绑定供应商</li>\n\
    </ol>\n\n<h3>关键引用</h3>\n\n<blockquote>\n<strong>\"Anthropic blocked OpenCode because\
    \ of us. That's why Hephaestus is called 'The Legitimate Craftsman.' The irony\
    \ is intentional.\"</strong>\n</blockquote>\n\n<blockquote>\n<strong>\"If OpenCode\
    \ is Debian/Arch, OmO is Ubuntu/Omarchy.\"</strong>\n</blockquote>\n\n<hr>\n\n\
    <h2>参考文献</h2>\n\n<ul>\n<li><a href=\"https://github.com/code-yeongyu/oh-my-openagent\"\
    >OmO GitHub 仓库</a></li>\n<li><a href=\"https://blog.can.ac/2026/02/12/the-harness-problem/\"\
    >The Harness Problem — Can Bölük</a></li>\n<li><a href=\"https://x.com/thdxr/status/2010149530486911014\"\
    >Anthropic 封禁 OpenCode 证据</a></li>\n</ul>\n"
- title: OpenMythos：解构 Claude Mythos 的循环深度 Transformer 架构
  date: April 21, 2026
  excerpt: GitHub 热度 4161⭐（仅3天）的理论重建项目。核心假设：Mythos = Recurrent-Depth Transformer (RDT)。六大创新：LTI-stable
    Injection、ACT Halting、MLA（KV减少10-20x）、DeepSeekMoE FFN（~5%激活）、Loop-Index Embedding、Depth-wise
    LoRA。应用场景：深度推理、实时交互、大规模部署、边缘设备、研究实验。关键洞察：相同权重多次循环实现深度推理，参数不增长。
  content: "<h1>OpenMythos：解构 Claude Mythos 的循环深度 Transformer 架构</h1>\n\n<blockquote>\n\
    <strong>项目</strong>：https://github.com/kyegomez/OpenMythos<br>\n<strong>作者</strong>：Kye\
    \ Gomez<br>\n<strong>热度</strong>：4161 ⭐（仅 3 天）\n</blockquote>\n\n<hr>\n\n<h2>一、项目概述：现象级爆发的理论重建</h2>\n\
    \n<p>2026年4月18日，一个名为 OpenMythos 的项目在 GitHub 上诞生。仅 3 天内收获 <strong>4161 star</strong>，fork\
    \ 数 911。项目核心命题：<strong>对 Claude Mythos 的架构进行理论重建</strong>。</p>\n\n<h3>核心假设</h3>\n\
    \n<p><strong>Claude Mythos = Recurrent-Depth Transformer (RDT)</strong></p>\n\n\
    <table>\n<tr><th>传统模型</th><th>循环深度模型</th></tr>\n<tr><td>堆叠数百层独立权重</td><td>循环使用少量层的权重</td></tr>\n\
    <tr><td>参数量 ∝ 深度</td><td>参数量固定，深度由循环次数决定</td></tr>\n<tr><td>推理成本固定</td><td>推理时可动态增加循环</td></tr>\n\
    </table>\n\n<p>所有推理<strong>静默发生在单次前向传递中</strong>，在连续潜在空间内——没有中间 token 输出。</p>\n\
    \n<hr>\n\n<h2>二、架构解析：三段式循环设计</h2>\n\n<h3>整体流程</h3>\n\n<table style=\"background:\
    \ #f8f9fa; border: none;\">\n<tr style=\"background: linear-gradient(90deg, #667eea,\
    \ #764ba2); color: white;\">\n<th style=\"border-radius: 8px 0 0 0;\">阶段</th>\n\
    <th style=\"border-radius: 0;\">功能</th>\n<th style=\"border-radius: 0 8px 0 0;\"\
    >执行次数</th>\n</tr>\n<tr><td><strong>Prelude</strong></td><td>输入编码，提取初始特征</td><td>1\
    \ 次</td></tr>\n<tr><td><strong>Recurrent Block</strong></td><td>深度推理循环</td><td>T\
    \ 次（可动态调整）</td></tr>\n<tr><td><strong>Coda</strong></td><td>输出投影，生成 logits</td><td>1\
    \ 次</td></tr>\n</table>\n\n<h3>循环更新公式</h3>\n\n<pre><code>h_{t+1} = A·h_t + B·e\
    \ + Transformer(h_t, e)</code></pre>\n\n<table>\n<tr><th>符号</th><th>含义</th><th>作用</th></tr>\n\
    <tr><td><code>h_t</code></td><td>循环 t 后的隐藏状态</td><td>累积推理深度</td></tr>\n<tr><td><code>e</code></td><td>编码输入（来自\
    \ Prelude）</td><td>每步注入，防止漂移</td></tr>\n<tr><td><code>A, B</code></td><td>学习的注入参数</td><td>LTI\
    \ 稳定化</td></tr>\n<tr><td><code>Transformer</code></td><td>Attention + MLP</td><td>非线性变换</td></tr>\n\
    </table>\n\n<p>关键：<code>e</code> 在每步注入，保持原始输入信号在整个循环深度中活跃。</p>\n\n<hr>\n\n<h2>三、六大技术创新</h2>\n\
    \n<h3>1. LTI-stable Injection（谱半径 < 1 保证）</h3>\n\n<p>循环模型训练不稳定的原因：<strong>残差爆炸</strong>（隐藏状态跨循环无界增长）和<strong>损失尖峰</strong>（谱范数过大）。</p>\n\
    \n<table>\n<tr><th>问题</th><th>Parcae 解决方案</th></tr>\n<tr><td>A 可能发散</td><td>A_continuous\
    \ = Diag(-exp(log_A)) 永远负对角</td></tr>\n<tr><td>离散化不稳定</td><td>A_discrete = exp(Δt·A_c)\
    \ 保证值 ∈ (0,1)</td></tr>\n<tr><td>梯度爆炸</td><td>log space 计算 + clamp(-20,20)</td></tr>\n\
    </table>\n\n<pre><code># 核心实现\ndef get_A(self):\n    # log space 避免 0 * inf =\
    \ NaN\n    return torch.exp(-torch.exp((log_dt + log_A).clamp(-20, 20)))\n\n#\
    \ 保证: ρ(A) < 1 无论学习率或批次噪声如何</code></pre>\n\n<h3>2. ACT Halting（自适应计算时间）</h3>\n\
    \n<p>超过某深度后，过度循环<strong>退化预测</strong>。解决方案：每个位置学习停止概率。</p>\n\n<table>\n<tr><th>Token\
    \ 类型</th><th>行为</th><th>循环次数</th></tr>\n<tr><td>简单 token</td><td>早退出</td><td>1-4\
    \ 次</td></tr>\n<tr><td>中等复杂</td><td>正常循环</td><td>8-12 次</td></tr>\n<tr><td>困难\
    \ token</td><td>完整深度</td><td>16+ 次</td></tr>\n</table>\n\n<p><strong>同一批次内</strong>，不同位置可不同深度——2-3x\
    \ throughput 提升。</p>\n\n<h3>3. Multi-Latent Attention（MLA）</h3>\n\n<table>\n<tr><th>机制</th><th>KV\
    \ Cache 存储</th><th>内存减少</th></tr>\n<tr><td>GQA</td><td>n_kv_heads × head_dim ×\
    \ 2</td><td>~4x</td></tr>\n<tr><td><strong>MLA</strong></td><td>kv_lora_rank +\
    \ n_heads × rope_dim</td><td><strong>10-20x</strong></td></tr>\n</table>\n\n<p>MLA\
    \ 缓存<strong>低秩 KV latent</strong>，每步从 latent 快速重建完整 K/V。</p>\n\n<h3>4. DeepSeekMoE\
    \ FFN</h3>\n\n<table>\n<tr><th>配置</th><th>值</th><th>说明</th></tr>\n<tr><td>n_experts</td><td>64-512</td><td>路由专家池</td></tr>\n\
    <tr><td>n_shared_experts</td><td>2-8</td><td>始终激活，吸收通用知识</td></tr>\n<tr><td>n_experts_per_tok</td><td>4-8</td><td>每\
    \ token top-K 选择</td></tr>\n<tr><td>激活率</td><td>~5-6%</td><td>真正计算数 ≠ 存储数</td></tr>\n\
    </table>\n\n<p>跨循环演化时，路由器可能在不同深度选择不同专家子集。</p>\n\n<h3>5. Loop-Index Embedding</h3>\n\
    \n<p>每个循环是<strong>不同计算阶段</strong>，类似 RoPE 但作用于循环深度而非序列位置。</p>\n\n<pre><code>#\
    \ 循环索引嵌入\nfreqs = 1.0 / theta ** (arange(0, loop_dim, 2) / loop_dim)\nangles =\
    \ loop_t * freqs\nemb = cat([angles.sin(), angles.cos()])\nh = h + emb  # 让共享权重在不同循环行为不同</code></pre>\n\
    \n<h3>6. Depth-wise LoRA Adapter</h3>\n\n<pre><code>delta(x, t) = (down(x) * scale[t])\
    \ @ B</code></pre>\n\n<table>\n<tr><th>组件</th><th>作用</th></tr>\n<tr><td>down:\
    \ Linear(dim, rank)</td><td>共享降维</td></tr>\n<tr><td>B: Parameter(rank, dim)</td><td>共享升维</td></tr>\n\
    <tr><td>scale: Embedding(max_loops, rank)</td><td>每循环的缩放向量</td></tr>\n</table>\n\
    \n<hr>\n\n<h2>四、为什么这解释了 Mythos</h2>\n\n<h3>1. 系统化泛化</h3>\n\n<p>三阶段 grokking：<strong>记忆\
    \ → 分布内泛化 → 系统化泛化（OOD，突然涌现）</strong></p>\n\n<table>\n<tr><th>阶段</th><th>表现</th><th>触发条件</th></tr>\n\
    <tr><td>阶段1</td><td>拟合训练分布</td><td>初始训练</td></tr>\n<tr><td>阶段2</td><td>处理已知组合</td><td>足够数据</td></tr>\n\
    <tr><td>阶段3</td><td>novel 组合 OOD</td><td>循环深度足够 + grokking</td></tr>\n</table>\n\
    \n<h3>2. 深度外推</h3>\n\n<table>\n<tr><th>场景</th><th>标准 Transformer</th><th>循环 Transformer</th></tr>\n\
    <tr><td>训练 5-hop</td><td>✓ 成功</td><td>✓ 成功</td></tr>\n<tr><td>测试 10-hop</td><td>✗\
    \ 失败</td><td>✓ 成功（增加循环）</td></tr>\n</table>\n\n<h3>3. 潜在思想 = 隐式 CoT</h3>\n\n<p>T\
    \ 循环隐式模拟 T 步 CoT，但在<strong>连续潜在空间</strong>而非 token 间。可同时编码多种替代下一步——接近对推理空间的<strong>广度优先搜索</strong>。</p>\n\
    \n<h3>4. 参数效率</h3>\n\n<table>\n<tr><th>模型</th><th>参数</th><th>等效深度</th></tr>\n\
    <tr><td>标准 Transformer</td><td>kL 层参数</td><td>kL 层</td></tr>\n<tr><td>循环 Transformer</td><td>k\
    \ 层参数</td><td>kL 层质量</td></tr>\n<tr><td>效率提升</td><td><strong>~L 倍</strong></td><td>推理时可扩展</td></tr>\n\
    </table>\n\n<hr>\n\n<h2>五、应用场景</h2>\n\n<h3>1. 深度推理任务</h3>\n\n<table>\n<tr><th>场景</th><th>循环次数</th><th>优势</th></tr>\n\
    <tr><td>多步数学推导</td><td>32-64</td><td>无需显式 CoT，一步到位</td></tr>\n<tr><td>复杂逻辑分析</td><td>24-48</td><td>隐式推理链，避免中间\
    \ token</td></tr>\n<tr><td>长程规划</td><td>48-64</td><td>连续潜在空间编码多路径</td></tr>\n\
    <tr><td>代码生成</td><td>16-32</td><td>深度语义理解</td></tr>\n</table>\n\n<h3>2. 实时交互系统</h3>\n\
    \n<p>ACT Halting 让简单请求快速响应（1-4 循环），复杂问题深度思考（16+ 循环），同一批次内混合处理。</p>\n\n<pre><code>#\
    \ 推理时间控制\n简单请求:  0.1s  (4 loops)\n中等复杂:  0.3s  (12 loops)\n深度推理:  1.0s+ (32+ loops)</code></pre>\n\
    \n<h3>3. 大规模部署</h3>\n\n<table>\n<tr><th>配置</th><th>参数存储</th><th>激活计算</th><th>KV\
    \ Cache</th></tr>\n<tr><td>100B MLA</td><td>100B</td><td>~5B/token</td><td>减少\
    \ 15x</td></tr>\n<tr><td>传统 100B</td><td>100B</td><td>100B/token</td><td>标准</td></tr>\n\
    <tr><td>效率提升</td><td>-</td><td><strong>20x</strong></td><td><strong>15x</strong></td></tr>\n\
    </table>\n\n<h3>4. 边缘设备推理</h3>\n\n<p>1B-3B 配置可在手机端运行，循环次数根据设备算力动态调整：</p>\n\n<pre><code>#\
    \ 边缘部署示例\n手机端: mythos_1b, 8-16 loops, ~100ms\n笔记本: mythos_3b, 16-24 loops, ~200ms\n\
    服务器: mythos_10b+, 32-64 loops</code></pre>\n\n<h3>5. 研究与实验</h3>\n\n<table>\n<tr><th>实验方向</th><th>OpenMythos\
    \ 支持</th></tr>\n<tr><td>深度外推研究</td><td>n_loops 可超过训练值</td></tr>\n<tr><td>ACT 机制实验</td><td>act_threshold\
    \ 可调整</td></tr>\n<tr><td>MoE 路由分析</td><td>完整路由日志</td></tr>\n<tr><td>稳定性研究</td><td>谱半径监控\
    \ get_A()</td></tr>\n</table>\n\n<hr>\n\n<h2>六、模型规模配置</h2>\n\n<table>\n<tr><th>Variant</th><th>dim</th><th>Experts</th><th>Loops</th><th>Context</th><th>Max\
    \ output</th></tr>\n<tr><td>mythos_1b</td><td>2048</td><td>64</td><td>16</td><td>4k</td><td>4k</td></tr>\n\
    <tr><td>mythos_3b</td><td>3072</td><td>64</td><td>16</td><td>4k</td><td>4k</td></tr>\n\
    <tr><td>mythos_10b</td><td>4096</td><td>128</td><td>24</td><td>8k</td><td>4k</td></tr>\n\
    <tr><td>mythos_50b</td><td>6144</td><td>256</td><td>32</td><td>8k</td><td>4k</td></tr>\n\
    <tr><td>mythos_100b</td><td>8192</td><td>256</td><td>32</td><td>1M</td><td>128k</td></tr>\n\
    <tr><td>mythos_500b</td><td>12288</td><td>512</td><td>48</td><td>1M</td><td>128k</td></tr>\n\
    <tr><td>mythos_1t</td><td>16384</td><td>512</td><td>64</td><td>1M</td><td>128k</td></tr>\n\
    </table>\n\n<hr>\n\n<h2>七、关键洞察总结</h2>\n\n<table>\n<tr><th>属性</th><th>描述</th></tr>\n\
    <tr><td>架构</td><td>Prelude + Looped Recurrent + Coda</td></tr>\n<tr><td>FFN</td><td>MoE\
    \ — fine-grained + shared experts</td></tr>\n<tr><td>激活率</td><td>~5% per token（存储数\
    \ ≠ 计算数）</td></tr>\n<tr><td>推理机制</td><td>Implicit multi-hop via latent updates</td></tr>\n\
    <tr><td>推理扩展</td><td>更多循环 = 更深推理，指数衰减</td></tr>\n<tr><td>稳定性</td><td>LTI-constrained:\
    \ ρ(A) < 1 by construction</td></tr>\n<tr><td>循环差异化</td><td>RoPE-like loop-index\
    \ embedding</td></tr>\n<tr><td>结构偏向</td><td>推理强，记忆弱</td></tr>\n</table>\n\n<hr>\n\
    \n<h2>八、参考文献</h2>\n\n<ul>\n<li><a href=\"https://arxiv.org/pdf/2604.07822\">Loop,\
    \ Think, & Generalize</a> — Implicit Reasoning in RDT</li>\n<li><a href=\"https://arxiv.org/abs/2604.12946\"\
    >Parcae</a> — Scaling Laws for Stable Looped LM</li>\n<li><a href=\"https://arxiv.org/abs/2502.17416\"\
    >Reasoning with Latent Thoughts</a> — Power of Looped Transformers</li>\n<li><a\
    \ href=\"https://arxiv.org/abs/2405.04434\">DeepSeek-V2</a> — Multi-Latent Attention</li>\n\
    <li><a href=\"https://arxiv.org/abs/2401.06066\">DeepSeekMoE</a> — Fine-grained\
    \ Expert Segmentation</li>\n<li><a href=\"https://arxiv.org/pdf/2410.20672\">Relaxed\
    \ Recursive Transformers</a> — Depth-wise LoRA</li>\n</ul>\n\n<hr>\n\n<h2>结论</h2>\n\
    \n<p>OpenMythos 让循环 Transformer 从研究论文变成<strong>可训练、可部署的工程系统</strong>。无论 Claude\
    \ Mythos 是否证实为 RDT，这个项目已经提供了可验证的理论框架和完整实现。</p>\n\n<blockquote>\n<strong>如果 Claude\
    \ Mythos 真的是 RDT，OpenMythos 就是通往理解它的钥匙。</strong>\n</blockquote>\n\n<p>项目地址：<a\
    \ href=\"https://github.com/kyegomez/OpenMythos\">https://github.com/kyegomez/OpenMythos</a></p>\n"
- title: Hermes → OpenCode → OhMyOpenAgent 架构详解
  date: April 20, 2026
  excerpt: 详解 Hermes、OpenCode、OhMyOpenAgent 三层代理架构：Hermes 是上层协调代理（项目经理），OpenCode 是专业编码代理（程序员），OhMyOpenAgent
    是多代理编排扩展（程序员团队）。三者共享同一 LLM 后端但编排能力逐层增强。核心模式：ulw 懒人模式（自动完成）、@plan Prometheus 规划模式（精确控制）、普通单代理模式...
  content: '<h1>Hermes → OpenCode → OhMyOpenAgent 架构详解</h1>


    <blockquote>发布日期：April 20, 2026</blockquote>


    <hr>


    <h2>层级关系</h2>


    <p>这三层代理架构共享同一个 LLM 后端，但编排能力逐层增强：</p>


    <pre style="background: #1a1a2e; padding: 1em; overflow-x: auto;">

    用户 → Hermes → OpenCode CLI → OhMyOpenAgent (OmO) → LLM 后端

    </pre>


    <table>

    <tr><th>层级</th><th>名称</th><th>角色</th><th>类比</th></tr>

    <tr><td><strong>第0层</strong></td><td>LLM 后端</td><td>推理引擎</td><td>大脑</td></tr>

    <tr><td><strong>第1层</strong></td><td>Hermes</td><td>上层协调代理</td><td>项目经理</td></tr>

    <tr><td><strong>第2层</strong></td><td>OpenCode</td><td>专业编码代理</td><td>程序员</td></tr>

    <tr><td><strong>第3层</strong></td><td>OhMyOpenAgent</td><td>多代理编排扩展</td><td>程序员团队</td></tr>

    </table>


    <h2>具体关系</h2>


    <h3>Hermes ↔ OpenCode</h3>

    <ul>

    <li><strong>关系</strong>：Hermes 是上层，OpenCode 是被调用的工具之一</li>

    <li><strong>方式</strong>：Hermes 通过 terminal() 工具执行 opencode run ... 命令</li>

    <li><strong>用途</strong>：当 Hermes 认为某个编码任务适合交给专业编码代理时</li>

    </ul>


    <h3>OpenCode ↔ OhMyOpenAgent</h3>

    <ul>

    <li><strong>关系</strong>：OpenCode 是宿主，OmO 是插件</li>

    <li><strong>方式</strong>：通过 bun 安装，扩展 OpenCode 的能力</li>

    <li><strong>用途</strong>：让单一代理变成多代理协作团队</li>

    </ul>


    <h2>OmO 核心代理</h2>


    <table>

    <tr><th>Agent</th><th>角色</th></tr>

    <tr><td><strong>Sisyphus</strong></td><td>主协调器，永不停止</td></tr>

    <tr><td><strong>Hephaestus</strong></td><td>自主深度工作者</td></tr>

    <tr><td><strong>Atlas</strong></td><td>Prometheus 计划执行器</td></tr>

    <tr><td><strong>Prometheus</strong></td><td>战略规划师（访谈模式）</td></tr>

    <tr><td><strong>Oracle</strong></td><td>架构顾问（只读）</td></tr>

    <tr><td><strong>Librarian</strong></td><td>文档和 OSS 搜索</td></tr>

    <tr><td><strong>Explore</strong></td><td>代码库搜索</td></tr>

    <tr><td><strong>Metis</strong></td><td>计划前的差距分析</td></tr>

    <tr><td><strong>Momus</strong></td><td>严格的计划审查者</td></tr>

    </table>


    <h2>三种使用模式</h2>


    <h3>Mode 1: Ultrawork (懒人模式)</h3>


    <pre><code>opencode run ''ulw add JWT authentication to Express API''</code></pre>


    <ul>

    <li>输入 ulw 或 ultrawork 关键词</li>

    <li>自动探索、研究、实现、验证</li>

    <li>工作直到完成，不停止不提问</li>

    </ul>


    <p><strong>适用场景</strong>：当你懒得解释细节，或说"你看着办"时使用。</p>


    <h3>Mode 2: Prometheus 规划 (精确模式)</h3>


    <pre><code>opencode              # 启动 TUI

    @plan refactor auth system  # 进入规划

    /start-work           # 执行计划</code></pre>


    <ul>

    <li>Prometheus 访谈用户澄清需求</li>

    <li>创建计划到 .sisyphus/plans/*.md</li>

    <li>Atlas 编排执行</li>

    </ul>


    <h3>Mode 3: 普通模式</h3>


    <pre><code>opencode run ''Fix the login bug''</code></pre>


    <ul>

    <li>标准 OpenCode 单代理交互</li>

    <li>适合简单、明确的任务</li>

    </ul>


    <h2>使用场景选择指南</h2>


    <table>

    <tr><th>你说</th><th>谁干活</th><th>怎么跑</th></tr>

    <tr><td>"帮我改一下这个文件"</td><td>Hermes 直接处理</td><td>自己用 file/patch 工具</td></tr>

    <tr><td>"用 opencode 实现登录"</td><td>OpenCode 单代理</td><td>opencode run ''...''</td></tr>

    <tr><td>"ulw 实现整个支付系统"</td><td>OmO 多代理协作</td><td>opencode run ''ulw ...''</td></tr>

    <tr><td>"@plan 重构架构"</td><td>OmO 规划模式</td><td>Prometheus 访谈 + Atlas 执行</td></tr>

    </table>


    <h2>核心洞察</h2>


    <p>这三层共享同一个 LLM 后端，但编排能力逐层增强：</p>


    <ul>

    <li><strong>Hermes</strong> = 通用代理 + 工具集</li>

    <li><strong>OpenCode</strong> = 专业编码代理</li>

    <li><strong>OmO</strong> = 编码代理团队</li>

    </ul>


    <blockquote>关键：这三层不是替代关系，而是<strong>协作增强</strong>关系。每一层都可以独立工作，也可以调用下一层的能力。</blockquote>


    <h2>配置文件位置</h2>


    <table>

    <tr><th>组件</th><th>配置文件</th></tr>

    <tr><td>Hermes</td><td>~/.hermes/config.yaml</td></tr>

    <tr><td>OpenCode</td><td>~/.config/opencode/opencode.json</td></tr>

    <tr><td>OhMyOpenAgent</td><td>~/.config/opencode/oh-my-openagent.json</td></tr>

    </table>


    <h2>相关资源</h2>


    <ul>

    <li><a href="https://opencode.ai">OpenCode 官网</a></li>

    <li><a href="https://github.com/oh-my-openagent">OhMyOpenAgent GitHub</a></li>

    <li><a href="https://github.com/harryfan1985/hermes-agent">Hermes Agent (本地项目)</a></li>

    </ul>

    '
- title: AI时代的三重张力：理论、实践与研究的碰撞
  date: April 18, 2026
  excerpt: 综合a16z、CREAO、DORA三篇文章揭示AI时代三大张力：验证税、专家悖论、工作流差距。核心共识：AI-first ≠ AI-assisted——换电机≠重新设计工厂。AI是放大器而非线性改进器，放大组织优势或dysfunction。关键洞察：顺序决定成败，先构建基础设施再引入AI-first。实践建议：培养Architect角色（领域专业知识+批判性思维）...
  content: '<h1>AI时代的三重张力：理论、实践与研究的碰撞</h1>


    <blockquote>本文综合三篇AI工程领域的深度文章：a16z《Institutional AI vs Individual AI》、CREAO《We
    Built an Agent Platform》、DORA《Balancing AI Tensions》</blockquote>


    <blockquote>发布日期：April 18, 2026</blockquote>


    <hr>


    <h2>引言：三个视角的碰撞</h2>


    <p>2026年春天，三篇文章在AI工程领域引发广泛关注，它们分别从<strong>理论框架、实践案例、学术研究</strong>三个维度审视AI在企业中的真实影响：</p>


    <table>

    <tr><th>来源</th><th>视角</th><th>核心命题</th></tr>

    <tr><td><strong>a16z</strong> (George Sivulka)</td><td>理论</td><td>AI让个体效率提升10倍，但企业价值未同步增长——换电机≠重新设计工厂</td></tr>

    <tr><td><strong>CREAO</strong> (Peter Pang)</td><td>实践</td><td>AI-first ≠ AI-assisted：99%代码由AI编写，5人团队实现100人等效产出</td></tr>

    <tr><td><strong>DORA</strong> (Google)</td><td>研究</td><td>AI不是线性改进器，是放大器——带来三大张力：验证税、专家悖论、工作流差距</td></tr>

    </table>


    <p>这三篇文章看似独立，实则<strong>高度互补又相互印证</strong>。本文将综合分析它们的交叉发现、矛盾之处，并提炼出可操作的实践框架。</p>


    <hr>


    <h2>一、核心共识：AI-first ≠ AI-assisted</h2>


    <p>三篇文章最核心的共识是：<strong>在现有流程上加AI（AI-assisted）只是效率提升，重新设计流程让AI成为核心构建者（AI-first）才是范式转变</strong>。</p>


    <h3>a16z的电气化类比</h3>


    <p>George Sivulka用1890年代纺织厂电气化的历史类比：</p>


    <blockquote>

    1890年代纺织厂把蒸汽机换成电动机，但<strong>30年内产出几乎没有提升</strong>。直到1920年代彻底重新设计流水线——每台设备独立电机、工人与机器执行完全不同的任务——电气化才产生真正回报。

    </blockquote>


    <p><strong>换电机 ≠ 重新设计工厂</strong>。我们现在有了电力（AI），但还没重新设计工厂（组织流程）。</p>


    <h3>CREAO的实践验证</h3>


    <p>Peter Pang给出了CREAO的转型数据：</p>


    <table>

    <tr><th>指标</th><th>AI-assisted时期</th><th>AI-first时期</th></tr>

    <tr><td>AI编写代码比例</td><td><50%</td><td><strong>>99%</strong></td></tr>

    <tr><td>发布周期</td><td>4-6周</td><td><strong>每天</strong></td></tr>

    <tr><td>等效产出所需人数</td><td>>100人</td><td><strong>5核心工程师</strong></td></tr>

    <tr><td>日均部署次数</td><td>-</td><td><strong>3-8次</strong></td></tr>

    </table>


    <p>关键差异：<strong>AI-assisted只是在现有流程上加Cursor/ChatGPT，效率提升10-20%；AI-first则是重新设计流程、架构、组织，假设AI是主要构建者</strong>。</p>


    <h3>DORA的研究支撑</h3>


    <p>DORA基于1,110位Google软件工程师的调查发现：</p>


    <ul>

    <li><strong>90%</strong>技术专业人员使用AI</li>

    <li><strong>80%</strong>认为提升了生产力</li>

    <li>但<strong>30%</strong>对AI生成代码几乎没有信任</li>

    </ul>


    <p>这说明：<strong>AI adoption ≠ AI effectiveness</strong>。采用率很高，但有效性取决于组织是否重新设计了流程。</p>


    <hr>


    <h2>二、交叉验证：三大核心张力</h2>


    <p>三篇文章共同揭示了AI在企业部署中的<strong>三大张力</strong>，虽然表述不同，但本质一致。</p>


    <h3>张力1：验证税（Verification Tax）</h3>


    <p><strong>DORA表述</strong>：节省写代码的时间被重新分配到审计验证。30%开发者对AI代码无信任，AI无法signal uncertainty，工程师被迫把每个交互当作潜在欺骗性。</p>


    <p><strong>a16z表述</strong>：Sycophant问题——过度RLHF让模型变成迎合者。最差员工获得最强AI认同，造成组织毒性。</p>


    <p><strong>CREAO表述</strong>：三轮Claude评审作为quality gate。日部署8次时，人类评审无法持续注意力。</p>


    <p><strong>交叉结论</strong>：AI加速输出的同时<strong>放大了验证负担</strong>。解决方案不是减少AI使用，而是<strong>重新设计验证流程</strong>：</p>


    <ul>

    <li>CREAO用AI评审AI（三轮Claude并行评审）</li>

    <li>a16z提出"No-man agent"挑战推理</li>

    <li>DORA建议shift automation to author（AI feedback在写作阶段给作者）</li>

    </ul>


    <h3>张力2：专家悖论（Expertise Paradox）</h3>


    <p><strong>DORA表述</strong>：AI降低入门门槛提供安全网，但风险绕过deep technical expertise所需的"productive
    struggle"，导致superficial learning和长期技能退化。</p>


    <p><strong>a16z表述</strong>：领域专家胜过软件专家——银行选择Hebbia的原因是团队懂CIM（投资备忘录），而大模型实验室团队不懂业务架构。</p>


    <p><strong>CREAO表述</strong>：两类工程师——Architect（批判AI、定义"好"的标准）和Operator（验证、批准、执行）。批判AI的能力比产出代码更有价值。</p>


    <p><strong>交叉结论</strong>：<strong>AI时代更需要深度专业知识，但获取方式需要改变</strong>：</p>


    <ul>

    <li>不再是"productive struggle"式的学徒期</li>

    <li>而是通过<strong>批判AI输出</strong>来构建专业知识</li>

    <li>初级工程师适应更快（没有传统习惯需要"遗忘"）</li>

    </ul>


    <h3>张力3：工作流差距（Workflow Gap）</h3>


    <p><strong>DORA表述</strong>：AI加速初始bulk work（原型），但剩余工作（生产集成）往往neutralize这些收益。工具sprawl的认知努力破坏flow
    state。</p>


    <p><strong>CREAO表述</strong>：三大瓶颈——产品管理（规划周期>构建时间）、QA（测试时间>构建时间）、人力（无法招聘追平竞对）。AI加速一个环节后，新瓶颈在旧瓶颈下游10英尺。</p>


    <p><strong>a16z表述</strong>：机构AI必须主动行动——无需人类prompt，持续监控数据，发现没人想到问的风险和机会。</p>


    <p><strong>交叉结论</strong>：<strong>AI放大一个环节的效率后，会暴露下游的新瓶颈</strong>：</p>


    <ul>

    <li>CREAO的Self-Healing Loop：错误检测→Claude分级→Linear ticket→修复→验证→自动关闭</li>

    <li>必须<strong>全链路AI-native</strong>，否则人类速度环节成为约束</li>

    <li>CREAO把产品发布说明、功能视频、社交帖子都AI化，避免"一个功能以Agent速度运行，另一个以人类速度"</li>

    </ul>


    <hr>


    <h2>三、AI Amplifier效应：核心统一框架</h2>


    <p>DORA提出的最深刻洞察：<strong>AI是放大器（Amplifier），而非线性改进器</strong>。</p>


    <table>

    <tr><th>组织状态</th><th>AI效果</th></tr>

    <tr><td>高质量内部平台 + 强API + 清晰工作流 + 强测试</td><td>AI是强大协作者</td></tr>

    <tr><td>碎片化工具 + siloed数据 + 脆弱基础设施</td><td>AI<strong>加速生成技术债务</strong></td></tr>

    </table>


    <p>这个框架<strong>统一了三篇文章</strong>：</p>


    <ul>

    <li><strong>a16z</strong>：Institutional AI需要过程工程——这是"高质量平台"的必要条件</li>

    <li><strong>CREAO</strong>：AI-first转型前必须构建测试harness——这是"强测试"的必要条件</li>

    <li><strong>DORA</strong>：AI adoption ≠ AI effectiveness——没有基础，采用率只是放大 dysfunction</li>

    </ul>


    <p><strong>核心结论</strong>：<strong>AI-first转型的顺序至关重要</strong>：</p>


    <ol>

    <li>先构建<strong>系统化基础设施</strong>（高质量平台、强API、强测试）</li>

    <li>再引入<strong>AI评审AI</strong>的验证流程</li>

    <li>然后<strong>重新设计流程</strong>让AI成为核心构建者</li>

    <li>最后<strong>全链路AI-native</strong>（否则人类速度环节成为约束）</li>

    </ol>


    <p>反向顺序会<strong>放大 dysfunction</strong>。</p>


    <hr>


    <h2>四、实践建议</h2>


    <h3>给工程师</h3>


    <p><strong>CREAO Peter Pang</strong>："你的价值从代码输出转向决策质量。写代码快的能力每月贬值。评估、批判、指导AI的能力升值。"</p>


    <p><strong>DORA建议</strong>：</p>

    <ul>

    <li>能看生成的UI就知道它错（在用户告诉你之前）</li>

    <li>能看架构提案发现Agent遗漏的失败模式</li>

    <li>训练批判思维：评估论证、找漏洞、质疑假设</li>

    </ul>


    <h3>给CTO和创始人</h3>


    <p><strong>CREAO建议</strong>：</p>

    <ol>

    <li>如果PM流程时间 > 构建时间，从那里开始</li>

    <li>在扩展Agent前先构建测试harness</li>

    <li>从一个Architect开始，证明系统工作后再引入Operator</li>

    <li>推动AI-native进入每个功能</li>

    <li>预期阻力</li>

    </ol>


    <h3>给组织决策者</h3>


    <p><strong>核心问题</strong>：你的组织是<strong>高质量平台+强API+强测试</strong>，还是<strong>碎片化工具+siloed数据+脆弱基础设施</strong>？</p>


    <table>

    <tr><th>组织状态</th><th>第一步</th></tr>

    <tr><td>高质量基础设施</td><td>重新设计流程，引入AI-first</td></tr>

    <tr><td>碎片化基础设施</td><td>先修复基础设施，否则AI加速生成技术债务</td></tr>

    </table>


    <hr>


    <h2>五、未来预测：单人公司的崛起</h2>


    <p>CREAO Peter Pang："单人公司将变得常见。如果一个Architect加Agent能做100人的工作，很多公司不需要第二个员工。"</p>


    <p>a16z George Sivulka："每个组织未来都会有来自大实验室的chatbot，也会有针对领域特定问题的机构AI，个人AI会把机构AI作为自己工具链里的关键工具。"</p>


    <hr>


    <h2>六、总结：从换电机到重新设计工厂</h2>


    <p>三篇文章共同指向一个结论：<strong>AI时代的关键不是工具升级，而是组织重构</strong>。</p>


    <blockquote>

    <strong>我们有了电力。现在是时候重新设计工厂了。</strong>

    <strong>但记住1890年代纺织厂的教训——先电气化的工厂输给了重新设计车间布局的工厂。</strong>

    <strong>顺序决定成败。</strong>

    </blockquote>


    <hr>


    <h2>参考文献</h2>


    <ul>

    <li><strong>a16z</strong>: <a href="https://www.a16z.news/p/institutional-ai-vs-individual-ai">Institutional
    AI vs Individual AI</a> - George Sivulka</li>

    <li><strong>CREAO</strong>: <a href="https://creao.ai/blog/we-built-an-agent-platform.-then-the-agents-rebuilt-it">We
    Built an Agent Platform</a> - Peter Pang</li>

    <li><strong>DORA</strong>: <a href="https://dora.dev/insights/balancing-ai-tensions/">Balancing
    AI tensions</a> - Google</li>

    </ul>

    '
- content: '<h1>Meta-Harness：LLM Harness 的端到端优化革命</h1>


    <blockquote>作者：Yoonho Lee, Roshen Nair, Qizheng Zhang, Kangwook Lee, Omar Khattab,
    Chelsea Finn (Stanford IRIS Lab)</blockquote>

    <blockquote>论文：arXiv:2603.28052</blockquote>

    <blockquote>代码：https://github.com/stanford-iris-lab/meta-harness</blockquote>

    <blockquote>发布日期：March 30, 2026</blockquote>


    <hr>


    <h2>一、核心问题：为什么 Harness 很重要？</h2>


    <p>LLM 系统的性能不仅取决于<strong>模型权重</strong>，还取决于<strong>Harness</strong>——决定存储什么信息、检索什么内容、如何呈现给模型的代码。</p>


    <p>然而，Harness 目前<strong>主要靠手工设计</strong>，现有的文本优化器（如 TextGrad、OPRO、Self-Refine）因为<strong>过度压缩反馈</strong>，不适合这个场景。</p>


    <h3>Harness 是什么？</h3>


    <ul>

    <li><strong>上下文管理</strong>：决定哪些信息进入 prompt</li>

    <li><strong>检索策略</strong>：如何从历史记忆中提取相关信息</li>

    <li><strong>输出处理</strong>：如何解析和验证模型响应</li>

    <li><strong>工具调用</strong>：如何协调多工具协作</li>

    </ul>


    <p>一个优秀的 Harness 可以让同一个模型表现显著不同——但设计好 Harness 需要大量调试和实验。</p>


    <hr>


    <h2>二、Meta-Harness 的核心创新</h2>


    <p><strong>Meta-Harness</strong> 是一个<strong>外循环优化系统</strong>，自动搜索 LLM 应用的最佳 Harness
    代码。</p>


    <h3>关键突破：诊断上下文的规模</h3>


    <p>核心差异在于<strong>优化器能看到多少信息</strong>：</p>


    <table>

    <tr><th>方法</th><th>历史记录</th><th>日志内容</th><th>Mtok/iter</th></tr>

    <tr><td>Self-Refine</td><td>Last</td><td>output + self-generated critique</td><td>0.001</td></tr>

    <tr><td>OPRO</td><td>Window</td><td>past (solution, score) pairs</td><td>0.002</td></tr>

    <tr><td>TextGrad</td><td>Last</td><td>LLM textual gradient</td><td>0.015</td></tr>

    <tr><td>MIPRO</td><td>Summary</td><td>bootstrapped program traces</td><td>0.003</td></tr>

    <tr><td>AlphaEvolve</td><td>Window</td><td>program database + eval. scores</td><td>0.022</td></tr>

    <tr><td>GEPA</td><td>Summary</td><td>rollout traces (reasoning + tools)</td><td>0.008</td></tr>

    <tr><td>TTT-Discover</td><td>Window</td><td>prev. solution fragment</td><td>0.026</td></tr>

    <tr><td><strong>Meta-Harness</strong></td><td><strong>Full</strong></td><td><strong>all
    logs and scores</strong></td><td><strong>10.0</strong></td></tr>

    </table>


    <p>Meta-Harness 提供<strong>10M tokens/step</strong>的诊断上下文，而先前方法最多<strong>26K tokens</strong>——差距
    <strong>380倍</strong>。</p>


    <h3>为什么这很重要？</h3>


    <p>Harness 工程产生的失败<strong>难以诊断</strong>——如果不看原始执行痕迹，你无法知道：</p>


    <ul>

    <li>为什么某个检索策略返回了无关信息？</li>

    <li>哪个工具调用导致了连锁失败？</li>

    <li>模型是如何误解了 prompt 格式？</li>

    </ul>


    <p>压缩成分数或摘要后，这些<strong>因果关系丢失了</strong>。Meta-Harness 让 proposer 能<strong>追溯失败到具体的
    Harness 决策</strong>，而不是从分数猜测。</p>


    <hr>


    <h2>三、方法架构</h2>


    <h3>搜索循环</h3>


    <p>Meta-Harness 的核心是一个<strong>三步循环</strong>：</p>


    <ol>

    <li><strong>Propose</strong>：一个 coding agent（Claude Code）读取包含所有候选 Harness 的<strong>文件系统</strong>——源代码、执行痕迹、分数——然后提出新的
    Harness</li>

    <li><strong>Evaluate</strong>：在 held-out 任务上评估新 Harness</li>

    <li><strong>Store</strong>：所有日志存入文件系统，循环重复</li>

    </ol>


    <h3>为什么用文件系统？</h3>


    <p>Proposer 是一个<strong>coding agent</strong>，可以用标准工具（<code>grep</code>、<code>cat</code>等）按需读取信息：</p>


    <ul>

    <li><strong>选择性读取</strong>：不需要一次性加载全部上下文</li>

    <li><strong>反事实诊断</strong>：可以跨多个候选的执行痕迹对比分析</li>

    <li><strong>原始日志访问</strong>：能看到完整的不压缩的失败细节</li>

    </ul>


    <hr>


    <h2>四、实验结果</h2>


    <h3>1. 文本分类（Online Text Classification）</h3>


    <p>遵循 ACE 的在线文本分类设定：LLM 逐个接收标注样本，更新记忆，在 held-out 测试集评估。</p>


    <p>使用三个数据集：</p>

    <ul>

    <li>LawBench（215 类别）</li>

    <li>Symptom2Disease（22 类别）</li>

    <li>USPTO-50k（180 类别）</li>

    </ul>


    <p><strong>结果</strong>：最佳发现的 Harness（<em>Label-Primed Query</em>）：</p>


    <table>

    <tr><th>指标</th><th>Meta-Harness</th><th>ACE</th><th>改进</th></tr>

    <tr><td>准确率</td><td>48.6%</td><td>40.9%</td><td>+7.7 points</td></tr>

    <tr><td>Context tokens</td><td>4x 更少</td><td>baseline</td><td>效率提升</td></tr>

    </table>


    <p>增益集中在<strong>大类别、易混淆标签空间</strong>：LawBench +16 points，Symptom2Disease +9 points。</p>


    <h3>2. 数学推理（Retrieval-Augmented Math Reasoning）</h3>


    <p>在<strong>200 个 IMO 级别数学问题</strong>上测试。</p>


    <p><strong>结果</strong>：单个发现的 Harness 在<strong>5 个 held-out 模型</strong>上平均提升<strong>+4.7
    points</strong>。</p>


    <p>这证明了<strong>泛化能力</strong>：在一个模型上发现的 Harness 可以迁移到其他模型。</p>


    <h3>3. Agentic Coding（TerminalBench-2）</h3>


    <p>TerminalBench-2 是一个<strong>89 个终端任务</strong>的基准，测试 AI agent 的编程能力。</p>


    <p><strong>结果</strong>：发现的 Harness<strong>超越最佳手工设计基线</strong>：</p>


    <table>

    <tr><th>Harness</th><th>准确率</th></tr>

    <tr><td>Meta-Harness (discovered)</td><td>46.5%</td></tr>

    <tr><td>Judy</td><td>35.8%</td></tr>

    <tr><td>Terminus-KIRA</td><td>28.5%</td></tr>

    <tr><td>Claude Code</td><td>28.0%</td></tr>

    <tr><td>Factory Droid</td><td>27.4%</td></tr>

    <tr><td>Goose</td><td>23.2%</td></tr>

    </table>


    <p>从 Terminus-KIRA（28.5%）经过<strong>7 次迭代</strong>到达<strong>46.5%</strong>——纯 Harness
    改变带来的提升。</p>


    <hr>


    <h2>五、发现的 Harness 有什么特点？</h2>


    <h3>文本分类：Label-Primed Query</h3>


    <p>发现的最佳 Harness 使用<strong>标签预置查询</strong>策略：</p>


    <ul>

    <li>不额外调用 LLM（效率高）</li>

    <li>在查询前先枚举可能的标签，引导模型注意力</li>

    <li>针对大类别空间特别有效</li>

    </ul>


    <h3>Agentic Coding 的迭代诊断</h3>


    <p>Meta-Harness 的 proposer 能<strong>跨候选对比诊断</strong>：</p>


    <ul>

    <li>读取多个候选的执行痕迹</li>

    <li>识别<strong>失败模式</strong>（如工具调用超时、格式误解）</li>

    <li>提出<strong>针对性修复</strong>（如添加 timeout 处理、改进输出解析）</li>

    </ul>


    <hr>


    <h2>六、关键启示</h2>


    <ol>

    <li><strong>上下文规模是关键</strong>：380 倍的诊断上下文差异，让 proposer 能做真正的因果分析，而不是从分数猜测</li>

    <li><strong>文件系统访问模式</strong>：让 coding agent 按需读取，避免一次性加载全部上下文的开销</li>

    <li><strong>Harness 可泛化</strong>：在一个模型上发现的 Harness 可以迁移到其他模型</li>

    <li><strong>超越手工设计</strong>：在 TerminalBench-2 上，自动发现的 Harness 超过最佳手工设计基线 18 points</li>

    </ol>


    <hr>


    <h2>七、实践意义</h2>


    <p>Meta-Harness 证明了<strong>自动化 Harness 工程是可行的</strong>：</p>


    <ul>

    <li><strong>减少人工调试</strong>：不再需要手工迭代 prompt 设计</li>

    <li><strong>发现新颖策略</strong>：自动发现人类可能忽略的有效策略</li>

    <li><strong>跨模型迁移</strong>：一次优化，多模型受益</li>

    <li><strong>数据驱动改进</strong>：每个改进都基于具体失败证据，而非直觉</li>

    </ul>


    <hr>


    <h2>八、开源资源</h2>


    <ul>

    <li><strong>论文</strong>：https://arxiv.org/abs/2603.28052</li>

    <li><strong>代码</strong>：https://github.com/stanford-iris-lab/meta-harness</li>

    <li><strong>TerminalBench-2 Artifact</strong>：https://github.com/stanford-iris-lab/meta-harness-tbench2-artifact</li>

    <li><strong>交互式 Demo</strong>：https://yoonholee.com/meta-harness/</li>

    </ul>


    <hr>


    <blockquote><strong>图片来源</strong>：本文图片和表格信息来自论文项目页面 yoonholee.com/meta-harness</blockquote>

    '
