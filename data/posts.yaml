- title: 能量函数的复仇：Energy-Based Model 为什么在 2026 年回潮
  date: June 9, 2026
  excerpt: 一个诞生于 2006 年的古老框架正在成为 LLM 系统的标准化验证层。从配分函数问题到 Bradley-Terry 技巧，从 LeCun 的十年蓝图到 Distributional EBM 的最新突破——EBM 不是替代 LLM，而是LLM 最需要的补充。
  content: "<p><img src=\"/images/energy-based-models-deep-dive/cover.png\" alt=\"能量函数的复仇 — EBM 封面\" style=\"width:100%;max-width:720px;border-radius:8px;\" /></p>\n<p>2026 年，两个看似无关的事件共享同一个理论内核：Purdue 大学用\
    \ 149M 参数的 Energy-Based Model 修正 LLM 的奖励信号，Oxford Dynamics 用同一个数学框架让 149M 的 verifier 匹配 Claude Sonnet 4.6 的推理准确率。Yann LeCun 则担任了一家 EBM 初创公司的技术委员会主席。</p>\n\n<p>Energy-Based Model（EBM）这个诞生于 2006 年的古老框架，正在以全新的面貌回归\
    \ AI 的核心舞台。这不是替代 LLM 的叙事——至少目前不是——而是关于 <strong>LLM 需要什么样的验证层</strong> 这一问题的结构性回答。</p>\n\n<h2>只有一个公式</h2>\n\n<p>EBM 的数学根基出奇简单：</p>\n\n<pre><code>p(x) = e^f(x) / Z，其中 Z = ∫ e^f(x) dx</code></pre>\n\n\
    <p>三个组件：</p>\n\n<ul>\n<li><strong>f(x)</strong>：能量函数。低能量 = 高概率。可以是任何神经网络。</li>\n<li><strong>Z</strong>：配分函数。对所有可能状态的指数化能量求和。</li>\n<li><strong>p(x)</strong>：归一化概率分布。</li>\n</ul>\n\n<p>你每天在用的 softmax\
    \ 分类器就是一个微型 EBM——能量是负 logit，Z 是所有类别的指数和。区别在于：分类器的状态空间只有几个类别，而通用 EBM 的状态空间可能是一个 1024×1024 图像的所有像素组合，或者一段文本的所有 token 排列。</p>\n\n<p>这正是 EBM 的核心困境，也是最值得理解的地方。</p>\n\n<h2>Z 问题：为什么 EBM 被 LLM 压制了五年</h2>\n\n\
    <p>自回归模型（GPT、Claude 等）有一个 EBM 梦寐以求的工程优势：<strong>不需要计算 Z</strong>。</p>\n\n<p>自回归将联合概率分解为条件概率的乘积——p(x) = ∏ p(x_t | x_{<t})——每一步只需要对词表大小（通常几万）做 softmax。交叉熵损失天然绕过了对整个序列空间求和的 intractable 积分。</p>\n\n<p>EBM\
    \ 没有这种分解。要得到 p(x) 的绝对值，你必须对整个状态空间积分。对于图像，这是百万维连续空间。对于文本，这是 |V|^L 的组合爆炸。这被称为 <strong>配分函数问题（partition function problem）</strong>，是 EBM 的阿喀琉斯之踵。</p>\n\n<p>四十年来，研究者发明了至少六种绕过 Z 的方法。理解这些方法的分工，就理解了 EBM 生态的全貌：</p>\n\
    \n<table>\n<tr><th>方法</th><th>原理</th><th>代表</th></tr>\n<tr><td><strong>Contrastive Divergence</strong></td><td>MCMC 采样近似梯度，不显式计算 Z</td><td>Hinton 2002，图像生成</td></tr>\n<tr><td><strong>Noise Contrastive\
    \ Estimation</strong></td><td>归一化转化为二分类：真实 vs 噪声</td><td>Gutmann 2010，通用</td></tr>\n<tr><td><strong>Score Matching</strong></td><td>匹配 ∇log p 而非 p 本身，梯度消去 Z</td><td>Hyvärinen 2005，Diffusion 的数学基础</td></tr>\n\
    <tr><td><strong>JEPA</strong></td><td>不在原始数据空间建模，在表示空间预测</td><td>LeCun 2022+，世界模型</td></tr>\n<tr><td><strong>Bradley-Terry 配对损失</strong></td><td>只比较两个候选的能量差，Z 相消</td><td>EBRM, Distributional EBM, RLHF</td></tr>\n\
    <tr><td><strong>确定性约束惩罚</strong></td><td>完全放弃学习 Z，用分析函数替代</td><td>Distributional EBM 的 E_constraint</td></tr>\n</table>\n\n<p>其中 <strong>Bradley-Terry 配对损失</strong> 是当前 AI 对齐和验证中最关键的技巧。它的形式异常简洁：</p>\n\
    \n<pre><code>loss = log(1 + e^(E(good) - E(bad)))</code></pre>\n\n<p>只关心好的输出和坏的输出之间的能量差，不关心绝对能量值。Z 自然相消。这就是 RLHF 奖励模型、DPO、以及最新 Distributional EBM 背后的核心训练方法。你不需要知道整个宇宙有多大概率——你只需要知道 A 比 B 好多少。</p>\n\n\
    <h2>EBM 回潮的三个驱动力</h2>\n\n<p><strong>第一，自回归的根本局限变得清晰。</strong></p>\n\n<p>逐 token 生成意味着三件事：你无法对完整输出打分（只能对下一个 token 打分），你无法后向修正已生成的 token（说出去的话泼出去的水），你无法保证跨步骤的全局约束一致性。Oxford Dynamics 的 Distributional EBM\
    \ 论文精准命名了这个瓶颈：<strong>\"聚合错误\"</strong>——旅行规划的每一天看起来都合理，但五天加起来预算超了。逐步骤检查永远找不到这种错误。</p>\n\n<p><strong>第二，可验证性需求上升。</strong></p>\n\n<p>当 AI 生成的代码部署到银行和航空系统，测试覆盖率的局限变得致命。\"这个输入没问题\"不等于\"所有输入都没问题\"。形式化验证需要全局一致性保证——而这恰好是\
    \ EBM 的设计目标：一个函数，输入完整候选，输出一个标量告诉你它有多\"正确\"。</p>\n\n<p><strong>第三，LeCun 十年如一日的推动。</strong></p>\n\n<p>Yann LeCun 从 2016 年起就坚持 EBM/JEPA 是通往自主智能的正确路径。2022 年他发布了完整的架构蓝图（\"A Path Towards Autonomous Machine\
    \ Intelligence\"），2023 年 I-JEPA 展示了感知层的可行性，2026 年他担任 Logical Intelligence 技术委员会主席，推动 EBM 从感知走向推理。他是否正确尚未被证明，但他的坚持本身就是信号。</p>\n\n<h2>EBM 的真正位置：不是替代，是补充</h2>\n\n<p>当前最务实的 EBM 应用没有一个试图替代 LLM。它们都在做同一件事：</p>\n\
    \n<table>\n<tr><th>系统</th><th>EBM 角色</th><th>LLM 角色</th></tr>\n<tr><td>Purdue EBRM</td><td>修正 RM 输出的标量奖励</td><td>RLHF 训练管道（不变）</td></tr>\n<tr><td>Distributional EBM</td><td>从候选池中选择最佳输出 + 约束验证</td><td>生成候选（Qwen/Gemma/Llama）</td></tr>\n\
    <tr><td>Logical Intelligence Kona</td><td>声称做约束推理引擎</td><td>声称做界面层</td></tr>\n</table>\n\n<p>模式非常一致：<strong>LLM 生成，EBM 评分</strong>。LLM 擅长快速生成大量候选（pass@32 >> pass@1），EBM 擅长从候选中挑出真正好的那个。</p>\n\n<p>这不是因为\
    \ EBM 不够好，而是因为离散符号空间上的 EBM 生成（从零产生文本）目前不可行。在连续空间（图像像素），Diffusion 模型——本质上是 score matching EBM——已经统治了 AI 图像生成。但在 token 空间，如何做 energy-guided 的离散采样仍是一个开放问题。</p>\n\n<h2>LeCun 的完整蓝图：从感知到推理</h2>\n\n<p>LeCun\
    \ 的架构（2022 年白皮书）是一个全 EBM 栈：</p>\n\n<pre><code>世界模型 (World Model) — EBM/JEPA，学习世界的表示\n    ↓\n代价模块 (Cost Module) — EBM 能量 = 行为代价\n    ↓\n行动器 (Actor) — 优化行为使能量最小\n    ↓\n配置器 (Configurator) — 根据任务切换代价函数</code></pre>\n\
    \n<p><strong>当前实现状态</strong>：</p>\n\n<ul>\n<li>✅ 感知层：JEPA 系列已发表，可复现</li>\n<li>\U0001F504 世界模型 + 规划：初步成果（V-JEPA → 动作条件预测）</li>\n<li>❓ 推理层（离散逻辑、数学证明）：无公开工作</li>\n</ul>\n\n<p>LeCun 本人公开承认：如何在 EBM 框架中处理离散符号推理，这是当前最大的开放问题。Logical\
    \ Intelligence 声称要做这一层——但零公开论文、零第三方基准。</p>\n\n<h2>EBM 能做推理吗？</h2>\n\n<p>这是本文最核心的问题，也是这个领域最诚实的答案：</p>\n\n<ul>\n<li><strong>验证（从已有候选中选择）</strong>：✅ 已经可行。Distributional EBM 在五个 benchmark 上超越 Qwen-72B，在\
    \ MuSR 上匹配 Claude Sonnet 4.6。</li>\n<li><strong>生成（连续空间）</strong>：✅ 已经可行。Diffusion 模型本质上就是 score matching EBM。</li>\n<li><strong>离散符号推理的独立生成（从零产生证明/代码/逻辑推理）</strong>：❓ 无公开可复现证据。</li>\n<li><strong>上述组合（EBM\
    \ 推理 + LLM 界面）</strong>：\U0001F504 理论上有吸引力，实践上尚未验证。</li>\n</ul>\n\n<p>最诚实的现状总结：EBM 是一个<strong>极其强大的验证范式</strong>，正在成为 LLM 系统的标准化验证层。但它是否能够独立完成符号推理——成为 LeCun 蓝图中的\"推理引擎\"——答案仍在风中。</p>\n\n<h2>技术声明</h2>\n\
    \n<ul>\n<li><strong>事实来源</strong>：本文基于 Distributional EBM（arXiv 2605.18871）、Purdue EBRM（arXiv 2504.13134）、LeCun 公开论文和演讲、Logical Intelligence 公开博客和发布会信息。</li>\n<li><strong>推断边界</strong>：EBM 在离散符号推理的独立生成能力标记为\"\
    未验证\"，基于当前公开文献的空白。JEPA 系列状态基于已发表论文。Logical Intelligence Kona 的声称基于公司公开材料，无独立验证。</li>\n<li><strong>置信度分级</strong>：EBM 数学定义（✅）、Z 问题存在性（✅）、EBM 做验证可行（✅）、Distributional EBM 结果（✅）、EBM 替代 LLM 做独立推理（❓推断）。</li>\n\
    </ul>\n\n<h2>参考来源</h2>\n\n<ol>\n<li>Manchingal, S.K. et al. \"Distributional Energy-Based Models for Uncertainty-Aware Structured LLM Reasoning.\" arXiv 2605.18871, 2026.</li>\n<li>Lochab, A., Zhang,\
    \ R. \"Energy-Based Reward Models for Robust Language Model Alignment.\" arXiv 2504.13134, 2025.</li>\n<li>LeCun, Y. et al. \"A Tutorial on Energy-Based Learning.\" 2006.</li>\n<li>Dawid, A., LeCun,\
    \ Y. \"Introduction to Latent Variable Energy-Based Models: A Path Towards Autonomous Machine Intelligence.\" arXiv 2306.02572, 2023.</li>\n<li>LeCun, Y. \"A Path Towards Autonomous Machine Intelligence.\"\
    \ OpenReview, 2022.</li>\n<li>Logical Intelligence. \"Energy-Based Models for AI Reasoning: Beyond LLM Limitations.\" Blog, 2026.</li>\n<li>Assran, M. et al. \"Self-Supervised Learning from Images with\
    \ a Joint-Embedding Predictive Architecture.\" CVPR 2023.</li>\n</ol>"
  slug: energy-based-models-deep-dive
- title: 形式化验证的野心：Logical Intelligence 的 EBRM 能否成为 AI 代码的数学防线？
  date: June 9, 2026
  excerpt: Logical Intelligence 提出用 Energy-Based Reasoning Model 替代 LLM 做自动形式化验证。拆解 Spec-Code-Proof FV 框架、三种 AI-for-FV 路径，以及 EBRM 主张中的实证真空。
  content: '<p><img src="/images/formal-verification-ebrm/cover.png" alt="形式化验证的野心 — Logical Intelligence EBRM 封面" style="width:100%;max-width:720px;border-radius:8px;" /></p>

    <p>2026年1月，Yann LeCun 出任一家此前几乎无人知晓的 AI 初创公司 Logical Intelligence 的技术委员会主席。这家公司的 CEO 是前 Optiver 量化研究员 Eve Bodnia，首席数学家是 Fields 奖得主 Michael Freedman。同一天，他们公开演示了 Kona 1.0——一款被称为 "Energy-Based Reasoning
    Model"（EBRM，基于能量的推理模型）的系统，在解数独上声称优于 GPT 和 Claude。</p>


    <p>沉寂五个月后，Logical Intelligence 发布了一篇题为《Automatic Formal Verification for Code Generation》的立场文章。这不是技术论文——没有基准、没有消融实验、没有开源代码。但它的论证结构和底层信号值得认真审视，尤其是对关注 agent 基础设施和验证机制的人。</p>


    <h2>论证骨架：从"ship & fix"到"prove & deploy"</h2>


    <p>文章的叙事链条清晰且有力：</p>


    <p><strong>前提1</strong>：AI 正在以空前的速度生成代码。这些代码被部署到银行、航空、医院等关键基础设施中。</p>


    <p><strong>前提2</strong>：传统的"测试—发现 bug—修复—发布"模式（ship & fix）在面对 AI 生成代码的体量和速度时是不可持续的。</p>


    <p><strong>前提3</strong>：形式化验证（Formal Verification, FV）——通过数学证明代码行为完全符合规范——过去因成本太高而仅限于 AWS、Azure 等核心云基础设施。</p>


    <p><strong>结论</strong>：AI 生成的代码需要 AI 驱动的 FV。而 LLM 因为自回归生成和幻觉问题不适合做 FV，EBRM 才是答案。</p>


    <p>逻辑链本身没有结构漏洞。但每一环的跳跃背后都有隐含假设需要拆解。</p>


    <h2>FV 的认知骨架：Spec-Code-Proof 三元组</h2>


    <p>文章对 FV 的抽象是这篇内容最有价值的部分。所有形式化验证系统——从 SMT solver 到 Lean 4 交互式定理证明器——都包含三个组件：</p>


    <table>

    <tr><th>组件</th><th>定义</th><th>人类负担（传统）</th></tr>

    <tr><td><strong>Spec</strong></td><td>数学化的形式规范——程序允许/禁止做什么</td><td>高</td></tr>

    <tr><td><strong>Code</strong></td><td>可执行指令集</td><td>中</td></tr>

    <tr><td><strong>Proof</strong></td><td>Code 满足 Spec 的数学论证</td><td>极高</td></tr>

    </table>


    <p>基于这个框架，文章区分了三种 AI 参与 FV 的路径，按人类控制递减排列：</p>


    <table>

    <tr><th>路径</th><th>人类输入</th><th>AI 生成</th><th>可靠性</th></tr>

    <tr><td><strong>Provers</strong></td><td>Spec + Code</td><td>Proof</td><td>最高</td></tr>

    <tr><td><strong>Vericoding</strong></td><td>Spec</td><td>Code + Proof</td><td>高</td></tr>

    <tr><td><strong>End-to-End</strong></td><td>自然语言描述</td><td>Spec + Code + Proof 全部</td><td>取决于 Spec 质量</td></tr>

    </table>


    <p>这里有一个反直觉但至关重要的警示：<strong>形式化验证只证明 Code 满足 Spec，不证明 Spec 满足原始人类意图。</strong>在 End-to-End 路径中，Spec 隐含在自然语言描述里，如果 AI 对需求的建模偏离了真实意图，后续的证明无论多么完美都毫无意义。这不是技术局限，是语义鸿沟。</p>


    <h2>LLM vs EBRM：真正的战场在哪</h2>


    <p>文章对 LLM 做 FV 的批评有三点：</p>


    <ol>

    <li><strong>自回归生成</strong>：逐 token 扩展无法对完整候选状态（Spec + Code + Proof 整体）打分</li>

    <li><strong>幻觉倾向</strong>：复杂约束推理中的概率性输出不可靠</li>

    <li><strong>成本高</strong>：推理本身消耗大量 compute</li>

    </ol>


    <p>而 EBRM 的声称优势是镜像的：</p>


    <table>

    <tr><th>维度</th><th>LLM</th><th>EBRM</th></tr>

    <tr><td>推理方式</td><td>自回归（逐 token）</td><td>全局优化（潜空间）</td></tr>

    <tr><td>评分粒度</td><td>逐 token 概率</td><td>整个候选状态</td></tr>

    <tr><td>约束处理</td><td>概率性（soft）</td><td>能量惩罚（hard-ish）</td></tr>

    </table>


    <p>EBRM 的核心架构：Encoder（输入→潜空间）+ Decoder（潜空间→输出）+ Energy（潜空间→标量）。"好输出"被定义为潜空间中的低能量点。能量函数可学习，训练范式声称与 LLM 相同（GPU + 梯度下降）。</p>


    <p>这个架构在<strong>理论上</strong>确实更适合全局约束满足问题——如果你需要同时检查 Spec、Code、Proof 之间的双向一致性，一次对整个三元组打分比逐 token 扩展自然得多。但理论优势到工程现实的鸿沟是巨大的。</p>


    <h2>批判性审视：哪些可信，哪些需要验证</h2>


    <h3>有结构支撑的主张</h3>


    <p><strong>Spec ≠ Intent 的警示是真正的洞见</strong>。任何自动化 FV 系统都必须面对这个元问题：谁确保 Spec 本身是正确的？这不是形式化验证工具能解决的，它属于需求工程的范畴。End-to-End 路径把这个问题委托给了 LLM 对自然语言的理解能力，这是整个方案中最薄弱的环节。</p>


    <p><strong>"LLM 做界面 + EBRM 做验证"的二层架构是务实的</strong>。文章承认 LLM 仍有价值——翻译需求、分解任务、导航工具链、解释失败——但认为"最难的约束搜索部分"应交给 EBRM。这与我们在 agent 基础设施中观察到的模式一致：LLM 生成 + 可执行验证的双层设计（如 SWE-bench 的测试驱动验证），只是 FV 的验证保证级别远高于测试。</p>


    <p><strong>FV 从奢侈品到必需品的转变叙事有结构基础</strong>。当代码的生成速度超过人工审查的容量，保证机制必须升级。这不是科幻场景，而是正在发生的结构性转变。</p>


    <h3>需要警惕的主张</h3>


    <p><strong>EBRM 优于 LLM 缺乏公开第三方基准</strong>。Kona 的唯一公开演示是解数独——一个 well-defined 约束满足问题，状态空间有限且完全已知。真实代码 FV 的 Spec-Code-Proof 对齐是不同数量级的复杂性问题。从数独到代码验证的跳跃没有任何公开证据。</p>


    <p><strong>能量函数的可学习性在真实 FV 场景中未经检验</strong>。训练一个能对"Spec + Code + Proof 三元组是否一致"打分的能量函数需要海量正负样本。这些数据从哪来？文章未提。EBRM 的训练（对比散度、噪声对比估计等）在稳定性上历来不如 next-token prediction 的交叉熵损失。</p>


    <p><strong>对 LLM 已有进展的忽视</strong>。DeepSeek-Prover、LeanAgent、AlphaProof 等工作已经展示了 LLM + 搜索在定理证明子任务上的竞争力。文章将它们一概归为"成本高且幻觉多"，不做具体讨论，这在论证上是不完整的。</p>


    <p><strong>公司立场文章，非中立分析</strong>。Patrick Hillmann 是 Logical Intelligence 的 communications executive，Boris Hanin 是公司科学家。文章的结论恰好是"我们的产品是答案"。这不代表内容是错的，但读者应对每一个技术主张保持验证心态。</p>


    <h2>与 Agent 基础设施的关联</h2>


    <p>这篇文章对于关注 agent 基础设施的人有三个层次的启示：</p>


    <p><strong>第一层：可验证性谱系</strong>。在 agent 系统中，验证机制分布在一条谱线上：单元测试（采样验证）→ 集成测试 → executable verification（如 SWE-bench 的测试驱动）→ formal verification（数学穷举）。当前 agent 基础设施的主流实践在第三层，文章主张的是第四层。两者的关键区别：测试告诉你"这个输入没问题"，FV
    告诉你"所有可能输入都没问题"。</p>


    <p><strong>第二层：Spec 质量的元问题</strong>。无论用 LLM 还是 EBRM，自动化 FV 的终极瓶颈不是证明生成，而是 Spec 编写。谁写 Spec？谁验证 Spec？如果 Spec 本身有 bug，FV 只是精确地执行了一个错误的规范。这在 agent 系统中对应的是"任务规范的歧义消除"——我们最近的 Socratic-SWE 分析中讨论的梯度对齐验证，本质上也是这个问题的另一种解法。</p>


    <p><strong>第三层：非自回归推理的潜力</strong>。EBRM 的核心洞见——放弃逐 token 生成，改用全局打分——对于需要全局一致性约束的 agent 任务（如多 agent plan 的死锁检测、资源冲突分析、安全属性验证）在概念上有吸引力。但目前 EBRM 远未成熟到可以替代 LLM 做通用 agent reasoning。</p>


    <h2>技术声明</h2>


    <ul>

    <li><strong>事实来源</strong>：本文基于 Logical Intelligence 官方博客文章（2026-06-03）及公开信息（2026-01-21 Kona 1.0 发布会报道），未访问内部基准数据。</li>

    <li><strong>推断边界</strong>：EBRM 在真实代码 FV 中的可行性、Kona 1.0 的实际性能均为公司声称，缺乏独立验证。本文的分析和评估基于公开信息的合理推断。</li>

    <li><strong>立场声明</strong>：作者无 Logical Intelligence 关联。本文旨在提供技术分析，不构成投资建议或产品推荐。</li>

    <li><strong>置信度分级</strong>：Spec-Code-Proof 框架（✅ 确认）、EBRM 架构描述（✅ 确认）、EBRM 优于 LLM 的声称（⚠️ 合理推断但缺乏独立验证）、能量函数在代码 FV 的可学习性（⚠️ 推断）。</li>

    </ul>


    <h2>参考来源</h2>


    <ol>

    <li>Hillmann, P., Hanin, B. "Automatic Formal Verification for Code Generation." Logical Intelligence Blog, June 3, 2026. <a href="https://logicalintelligence.com/blog/automatic-formal-verification-for-code-generation">Link</a></li>

    <li>Logical Intelligence. "Kona 1.0: Energy-Based Models for AI Reasoning." <a href="https://logicalintelligence.com/kona-ebms-energy-based-models">Link</a></li>

    <li>Grokipedia. "Logical Intelligence." <a href="https://grokipedia.com/page/Logical_Intelligence">Link</a></li>

    <li>Xin, H. et al. "DeepSeek-Prover: Advancing Theorem Proving in LLMs." 2025.</li>

    <li>DeepMind. "AI achieves silver-medal standard solving International Mathematical Olympiad problems." 2024.</li>

    </ol>'
