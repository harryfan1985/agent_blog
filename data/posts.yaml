- title: Meta-Harness：当约束层学会自我进化
  date: June 2, 2026
  excerpt: Harness 不再是静态约束层。Meta-Harness、HARBOR、Datadog 三条路径正在让 Harness 通过验证反馈自我优化。从 Bayesian 超参搜索到 Agent 驱动的源码级进化，再到生产遥测闭环——Harness 正在从「基础设施」变成「可优化的 ML 对象」。附 15 篇论文 + 13 个开源项目清单。
  content: "<p><img src=\"/images/metaharness/cover.png\" alt=\"Meta-Harness：当约束层学会自我进化\" style=\"max-width:100%;border-radius:8px;margin:1rem 0;\"></p><h2>从静态约束到可优化对象</h2>\n\n<blockquote>以往我们说「Harness\
    \ 是 Agent 的约束层」——规则不可绕过，安全不可妥协。但 2026 年最前沿的问题是：<strong>如果 Harness 本身也能通过验证反馈自我进化呢？</strong></blockquote>\n\n<p>这不是哲学思辨。三篇 2026 年 3-4 月的新论文，加上 Datadog 的生产实践，正在把 Harness 从「静态基础设施」变成「可优化的 ML 对象」。</p>\n\
    \n<p>本文是《<a href=\"https://harryfan1985.github.io/agent_blog/posts/rlvr-for-code-agents.html\">RLVR for Code Agents</a>》和《<a href=\"https://harryfan1985.github.io/agent_blog/posts/agent-rlvr-agent.html\"\
    >自闭环验证</a>》的续篇——当验证闭环已经建立，下一步自然就是：<strong>让 Harness 自身进入进化循环。</strong></p>\n\n<h2>背景：Harness 里有什么可优化的？</h2>\n\n<p>先明确定义。一个 Agent Harness 包含：</p>\n\n<ul>\n<li><strong>Context Compaction</strong>：何时压缩上下文、压缩到什么程度</li>\n\
    <li><strong>Tool Caching</strong>：哪些工具调用结果可以缓存、缓存多久</li>\n<li><strong>Semantic Memory</strong>：记忆的存储粒度、检索策略</li>\n<li><strong>Trajectory Reuse</strong>：何时复用历史轨迹</li>\n<li><strong>Speculative Execution</strong>：预测性工具调用策略</li>\n\
    <li><strong>Safety Constraints</strong>：运行时安全规则（如 \\tool 的 DSL）</li>\n<li><strong>Verification Gates</strong>：编译检查、测试执行、性能回归的触发条件</li>\n<li><strong>Fallback Chains</strong>：模型降级、重试策略、超时处理</li>\n</ul>\n\
    \n<p>每一个维度都是一个配置空间。手动调优在超过 5-10 个开关时就会失效——这正是 ML 优化的经典适用场景。</p>\n\n<h2>三条自优化路径</h2>\n\n<table>\n<tr><th>路径</th><th>方法</th><th>优化对象</th><th>代表工作</th></tr>\n<tr><td><strong>L1: 参数搜索</strong></td><td>Bayesian\
    \ Optimization</td><td>Harness 配置参数</td><td>HARBOR (JPMC)</td></tr>\n<tr><td><strong>L2: 代码进化</strong></td><td>Agent 读写 Harness 源码</td><td>Harness 源代码</td><td>Meta-Harness</td></tr>\n<tr><td><strong>L3:\
    \ 生产闭环</strong></td><td>遥测数据反馈驱动</td><td>验证规则 + 安全策略</td><td>Datadog 实践</td></tr>\n</table>\n\n<p>三条路径正交且互补：L1 调参、L2 改代码、L3 从生产环境学。</p>\n\n<h2>路径一：HARBOR — 把 Harness 调优变成 ML 问题</h2>\n\n<p><strong>HARBOR:\
    \ Automated Harness Optimization</strong>（arXiv: 2604.20938），JPMorgan Chase，2026 年 4 月。</p>\n\n<p>首次将 harness 设计<strong>形式化为一阶 ML 问题</strong>：</p>\n\n<pre><code>约束噪声贝叶斯优化\n  ↓\n混合变量配置空间（连续参数 + 离散开关\
    \ + 类别选项）\n  ↓  \n成本异构（不同配置的 token 消耗不同）\n  ↓\n后验概率约束安全检查（不允许违反安全边界的配置）\n  ↓\nHARBOR 求解器：Block-additive SAAS surrogate + 多保真成本感知采集 + TuRBO trust regions</code></pre>\n\n<p><strong>核心贡献</strong>：</p>\n\
    <ul>\n<li>手工调参经过 4 轮手动迭代，效果趋于饱和</li>\n<li>HARBOR 在同样的配置空间中持续发现更优解</li>\n<li>生产环境编码 Agent 的案例研究验证</li>\n</ul>\n\n<p>HARBOR 的本质是：将 harness 配置搜索视为<strong>安全约束下的混合变量黑盒优化</strong>。这与 RLVR 共享一个哲学前提——<strong>可验证的反馈信号可以驱动系统性搜索</strong>。</p>\n\
    \n<h2>路径二：Meta-Harness — Agent 自己写自己的 Harness</h2>\n\n<p><strong>Meta-Harness: End-to-End Optimization of Model Harnesses</strong>（arXiv: 2603.28052），2026 年 3 月。</p>\n\n<p>HARBOR 优化的是参数；Meta-Harness\
    \ 优化的是<strong>源代码</strong>。</p>\n\n<pre><code>搜索循环（Meta-Harness Loop）：\n\n1. Proposer Agent（Claude Code）读取文件系统\n   → 包含所有历史候选 harness 的完整源码 + 执行轨迹 + 评估分数\n\n2. Proposer 分析失败原因\n   → 可以追溯到具体哪行 harness\
    \ 代码导致了哪个失败\n   → 而非从分数猜测\n\n3. Proposer 提出新 harness 变体\n   → 直接修改源码，提交为新的候选\n\n4. 在 held-out 任务集上评估\n   → 确保泛化性\n\n5. 日志写回文件系统\n   → 下一轮循环的上下文\n</code></pre>\n\n<p><strong>为什么这比超参搜索强？</strong></p>\n\
    \n<table>\n<tr><th>方法</th><th>输入给优化器的信息</th><th>规模上限</th></tr>\n<tr><td>传统超参搜索</td><td>压缩后的分数向量</td><td>几十个标量</td></tr>\n<tr><td>GEPA / DSPy</td><td>自然语言反思</td><td>几千 token</td></tr>\n<tr><td><strong>Meta-Harness</strong></td><td><strong>完整源码\
    \ + 执行轨迹</strong></td><td><strong>每步 10M token</strong></td></tr>\n</table>\n\n<p>当优化器能读到「第 47 行的缓存策略导致第 3 轮工具调用返回了过期结果」，它就能提出针对性的源码级修改——这比任何标量反馈都精确。</p>\n\n<p><strong>实验结果</strong>：</p>\n<ul>\n<li>文本分类：+7.7\
    \ 准确率点</li>\n<li>检索增强数学推理：+4.7 平均增益</li>\n<li>Agentic coding（TerminalBench-2）：超越手工 harness</li>\n</ul>\n\n<p>将 Meta-Harness 与 GEPA 类比：</p>\n\n<blockquote>GEPA 优化提示文本 → Meta-Harness 优化 harness 源码。<br>\n\
    两者都是反思驱动的代码/文本空间进化。<br>\n区别：GEPA 操作几十行 prompt，Meta-Harness 操作几百行 harness 基础设施代码。</blockquote>\n\n<h2>路径三：Datadog — 让生产环境成为最终的验证器</h2>\n\n<p>2026 年，Datadog 公开了其「harness-first engineering」实践（Closing the\
    \ verification loop）：</p>\n\n<pre><code>Agent 生成代码 → Harness 自动验证（沙箱） → 部署 → 生产遥测\n    ↑                                                          |\n    └──────── 如果发现问题，反馈更新 harness ──────────────────┘\n\
    </code></pre>\n\n<p><strong>与纯沙箱验证的关键区别</strong>：</p>\n<ul>\n<li>沙箱告诉你「测试通过了」</li>\n<li>生产遥测告诉你「用户没报 bug」</li>\n<li><strong>后者是比单元测试更强的地面真值信号</strong></li>\n</ul>\n\n<p>Datadog 的实践要点：</p>\n<ul>\n<li><strong>Shadow\
    \ mode</strong>：新 harness 规则先以只记录不拦截的方式运行</li>\n<li><strong>渐进式部署</strong>：验证无误后再启用拦截</li>\n<li><strong>生产信号回写</strong>：异常模式自动反馈到 harness 规则库</li>\n</ul>\n\n<p>这本质上是把 RLVR 的验证器从「沙箱单元测试」升级为「生产环境遥测」——信号更真实，但也更稀疏、更嘈杂。</p>\n\
    \n<h2>核心约束：谁验证验证器？</h2>\n\n<p>三条路径都回避不了同一个问题：</p>\n\n<blockquote>Harness 可以自优化规则 → 但谁保证优化后的规则不会比优化前更差？</blockquote>\n\n<p><strong>三方共识：harness 自优化必须有一个不可自优化的外层。</strong></p>\n\n<table>\n<tr><th>方法</th><th>不可自优化的外层</th></tr>\n\
    <tr><td>Meta-Harness</td><td><strong>Held-out 任务集</strong>：优化在搜索集上进行，验证在 held-out 集上——标准 ML 泛化保障</td></tr>\n<tr><td>HARBOR</td><td><strong>后验概率安全约束</strong>：优化算法不允许访问违反安全边界的配置区域</td></tr>\n<tr><td>Datadog</td><td><strong>Shadow\
    \ mode + 渐进部署</strong>：新规则必须经过「只观察→软拦截→硬拦截」三级验证</td></tr>\n</table>\n\n<p>这与自闭环验证的双层架构设计完全一致：</p>\n\n<pre><code>内层（闭环）：可进化、可学习的 harness 规则\n外层（硬约束）：不可绕过的安全边界、held-out 验证集、部署策略</code></pre>\n\n<p>外层约束精简但不可变，内层验证灵活但可被欺骗——两者互补。</p>\n\
    \n<h2>与系列前文的连接</h2>\n\n<p>本系列三篇文章形成一个完整的链条：</p>\n\n<pre><code>第一篇（RLVR）:  Agent 如何学会「自己批改作业」\n    ↓ 训练信号驱动\n第二篇（自闭环验证）: Agent 如何形成无人类参与的验证闭环\n    ↓ 验证闭环成熟后\n第三篇（本文）: Harness 如何通过验证反馈自我进化\n</code></pre>\n\
    \n<p><strong>三者统一 = 代码 Agent 完全自主进化的终极形态</strong>：</p>\n\n<ul>\n<li>RLVR 提供「做对了没」的训练信号</li>\n<li>自闭环验证提供「怎么验证」的自动化基础设施</li>\n<li>Harness 自优化提供「用什么规则约束」的持续进化机制</li>\n</ul>\n\n<p>2026 年的范式转变可以概括为一句话：</p>\n\
    \n<blockquote>Harness 本身从「静态基础设施」变成「可优化的 ML 对象」。<br>\nPrompt Engineering → Context Engineering → Harness Engineering → <strong>Meta-Harness Engineering</strong></blockquote>\n\n<h2>成熟度阶梯</h2>\n\n<table>\n\
    <tr><th>层级</th><th>能力</th><th>代表</th><th>状态</th></tr>\n<tr><td>L1</td><td>手工 Harness 调优</td><td>所有 Agent 产品</td><td>✅ 主流</td></tr>\n<tr><td>L2</td><td>自动化超参搜索</td><td>HARBOR (JPMC)</td><td>✅ 生产中</td></tr>\n\
    <tr><td>L3</td><td>Agent 驱动源码级搜索</td><td>Meta-Harness</td><td>\U0001F52C 研究</td></tr>\n<tr><td>L4</td><td>生产遥测驱动闭环</td><td>Datadog</td><td>⚠️ 早期实践</td></tr>\n<tr><td>L5</td><td>完全自优化 Harness</td><td>—</td><td>❌\
    \ 未实现</td></tr>\n</table>\n\n<h2>Top 论文清单</h2>\n\n<h3>Harness 自优化（核心）</h3>\n\n<table>\n<tr><th>论文</th><th>出处</th><th>核心贡献</th></tr>\n<tr><td><strong>Meta-Harness: End-to-End Optimization of Model Harnesses</strong></td><td>arXiv:\
    \ 2603.28052 (2026.03)</td><td>Agent 驱动源码级 harness 搜索。Proposer 读完整历史源码+轨迹，每步 10M token 上下文。+7.7 分类 / +4.7 推理</td></tr>\n<tr><td><strong>HARBOR: Automated Harness Optimization</strong></td><td>arXiv:\
    \ 2604.20938 (2026.04), JPMC</td><td>首次形式化 harness 调优为约束噪声 BO 问题。混合变量 + 安全约束 + 多保真采集。生产编码 Agent 案例</td></tr>\n</table>\n\n<h3>Agent Harness 基础理论与综述</h3>\n\n<table>\n<tr><th>论文</th><th>出处</th><th>核心贡献</th></tr>\n\
    <tr><td><strong>Agent Harness for Large Language Model Agents: A Survey</strong></td><td>Preprints 2026.04</td><td>首个 Agent Harness 系统性综述。任务分解、结构化记忆、技能表示、上下文检索、奖励设计全覆盖</td></tr>\n<tr><td><strong>Agent\
    \ Systems with Harness Engineering</strong></td><td>RUCAIBox, 2026</td><td>将 Harness Engineering 形式化为学科。可控消融实验、六大发现、结构化自然语言控制逻辑</td></tr>\n</table>\n\n<h3>相关范式（上下游连接）</h3>\n\n<table>\n<tr><th>论文</th><th>出处</th><th>核心贡献</th></tr>\n\
    <tr><td><strong>Agent-RLVR</strong></td><td>arXiv: 2506.11425, Scale AI</td><td>Guidance + Environment Reward。Qwen-72B SWE-bench 9.4%→22.4%</td></tr>\n<tr><td><strong>ReVeal</strong></td><td>arXiv:\
    \ 2506.11442</td><td>生成-验证协同进化。多轮自验证 + 密集奖励</td></tr>\n<tr><td><strong>Tree-GRPO</strong></td><td>ICLR 2026, Alibaba</td><td>树搜索 rollout，1/4 预算超越链式 GRPO</td></tr>\n<tr><td><strong>R³L</strong></td><td>arXiv:\
    \ 2601.03715</td><td>反思-重试 RL：诊断失败→从失败点重启。5-52% 相对提升</td></tr>\n<tr><td><strong>GiGPO</strong></td><td>NeurIPS 2025</td><td>双层优势：Episode 级 + 步骤级锚点分组</td></tr>\n</table>\n\n<h3>Harness 组件专项</h3>\n\n\
    <table>\n<tr><th>论文</th><th>出处</th><th>核心贡献</th></tr>\n<tr><td><strong>\\tool</strong></td><td>arXiv: 2503.18666</td><td>DSL 运行时约束。阻止 >90% 代码 Agent 不安全执行</td></tr>\n<tr><td><strong>SAGA + TCGBench</strong></td><td>NeurIPS\
    \ 2025</td><td>人-LLM 协作测试生成。Verifier Accuracy +10.78%</td></tr>\n<tr><td><strong>SWE-MiniSandbox</strong></td><td>arXiv: 2602.11210</td><td>无容器 RL 训练沙箱。磁盘 5%、时间 25%</td></tr>\n</table>\n\n<h2>Top 开源项目清单</h2>\n\
    \n<h3>Harness 优化 / 搜索框架</h3>\n\n<table>\n<tr><th>项目</th><th>链接</th><th>机构</th><th>核心能力</th></tr>\n<tr><td><strong>Meta-Harness</strong></td><td><a href=\"https://yoonholee.com/meta-harness\">yoonholee.com/meta-harness</a></td><td>学术</td><td>Agent\
    \ 驱动 harness 源码级搜索。Claude Code Proposer + 文件系统历史</td></tr>\n<tr><td><strong>HARBOR</strong></td><td>arXiv: 2604.20938</td><td>JPMC</td><td>约束噪声 BO harness 优化器。SAAS surrogate + TuRBO</td></tr>\n</table>\n\
    \n<h3>RL 训练基础设施</h3>\n\n<table>\n<tr><th>项目</th><th>链接</th><th>Stars</th><th>核心能力</th></tr>\n<tr><td><strong>verl</strong></td><td><a href=\"https://github.com/verl-project/verl\">verl-project/verl</a></td><td>~8k+</td><td>字节跳动：最主流\
    \ LLM RL 训练库。2026 新增多轮 Agentic RL</td></tr>\n<tr><td><strong>OpenRLHF</strong></td><td><a href=\"https://github.com/OpenRLHF/OpenRLHF\">OpenRLHF/OpenRLHF</a></td><td>~5k+</td><td>Ray + vLLM。简洁易用。支持\
    \ GRPO/DPO/PPO</td></tr>\n<tr><td><strong>ROLL</strong></td><td><a href=\"https://github.com/alibaba/ROLL\">alibaba/ROLL</a></td><td>~2k+</td><td>阿里：高效易用 RLVR 扩展库</td></tr>\n<tr><td><strong>Trinity-RFT</strong></td><td><a\
    \ href=\"https://github.com/agentscope-ai/Trinity-RFT\">agentscope-ai/Trinity-RFT</a></td><td>新</td><td>通用 RFT 框架。GRPO + 异步 + off-policy + 离线</td></tr>\n</table>\n\n<h3>SWE Agent 专项</h3>\n\n<table>\n\
    <tr><th>项目</th><th>链接</th><th>Stars</th><th>核心能力</th></tr>\n<tr><td><strong>SWE-RL</strong></td><td><a href=\"https://github.com/facebookresearch/swe-rl\">facebookresearch/swe-rl</a></td><td>~1.5k+</td><td>Meta\
    \ NeurIPS'25：首个规模化 SWE RL。从软件演化数据学习</td></tr>\n<tr><td><strong>SWE-MiniSandbox</strong></td><td><a href=\"https://github.com/lblankl/SWE-MiniSandbox\">lblankl/SWE-MiniSandbox</a></td><td>新</td><td>无容器\
    \ SWE RL 沙箱。磁盘 5%、时间 25%</td></tr>\n<tr><td><strong>Live-SWE-agent</strong></td><td><a href=\"https://github.com/OpenAutoCoder/live-swe-agent\">OpenAutoCoder/live-swe-agent</a></td><td>新</td><td>首个运行时自进化\
    \ SWE Agent。79.2% Verified / 45.8% Pro</td></tr>\n<tr><td><strong>MARTI</strong></td><td><a href=\"https://github.com/TsinghuaC3I/MARTI\">TsinghuaC3I/MARTI</a></td><td>503</td><td>清华：多 Agent RL。v2 树搜索\
    \ MARS²</td></tr>\n<tr><td><strong>SWE-ReX</strong></td><td><a href=\"https://github.com/SWE-agent/SWE-ReX\">SWE-agent/SWE-ReX</a></td><td>502</td><td>大规模并行沙箱代码执行</td></tr>\n<tr><td><strong>Tree-GRPO</strong></td><td><a\
    \ href=\"https://github.com/AMAP-ML/Tree-GRPO\">AMAP-ML/Tree-GRPO</a></td><td>新</td><td>阿里 ICLR'26：树搜索替代链式 rollout</td></tr>\n</table>\n\n<h3>Harness 工程资源索引</h3>\n\n<table>\n<tr><th>项目</th><th>链接</th><th>内容</th></tr>\n\
    <tr><td><strong>awesome-agent-harness</strong></td><td><a href=\"https://github.com/RUCAIBox/awesome-agent-harness\">RUCAIBox/awesome-agent-harness</a></td><td>Agent Harness 论文/项目系统性索引</td></tr>\n<tr><td><strong>awesome-RLVR</strong></td><td><a\
    \ href=\"https://github.com/opendilab/awesome-RLVR\">opendilab/awesome-RLVR</a></td><td>RLVR 论文/项目/博客全索引</td></tr>\n<tr><td><strong>Awesome-LLM-RLVR</strong></td><td><a href=\"https://github.com/smiles724/Awesome-LLM-RLVR\"\
    >smiles724/Awesome-LLM-RLVR</a></td><td>持续更新的 LLM RLVR 论文列表</td></tr>\n</table>\n\n<h2>技术声明</h2>\n\n<p>Meta-Harness 和 HARBOR 的技术细节基于其 arXiv 论文摘要及公开分析。Meta-Harness 的实验数据（+7.7 / +4.7 / 10M token 等）来自\
    \ alphaXiv 和 Hugging Face 的分析文章。HARBOR 的 JPMC 生产案例基于论文公开信息，具体实现细节未公开。Datadog 的 harness-first engineering 实践基于其 2026 年工程博客。Agent Harness Survey 的内容来自 Preprints 公开摘要。所有开源项目的 star 数为 2026 年 6 月近似值。</p>\n\
    \n<p>「Harness 自优化的三层不可绕过外层」框架为本文提出的分析框架（⚠️），基于 Meta-Harness/HARBOR/Datadog 三方设计模式的归纳。四阶段演进（Prompt → Context → Harness → Meta-Harness）为基于 2026 年研究趋势的推断。</p>\n"
- title: 自闭环验证：从 Agent-RLVR 看代码 Agent 的自我改进之路
  date: June 2, 2026
  excerpt: Agent 自己生成验证信号 → 驱动自我改进 → 无需人类参与的闭合回路。从 Agent-RLVR 提炼出八条核心启示：可验证性天花板、稀疏奖励饥饿、验证器协同进化、信用分配、采样效率之争、验证税经济学、对抗性验证多样性、双层安全架构。附五级成熟度阶梯。
  content: '<p><img src="/images/agent-rlvr-agent/cover.png" alt="自闭环验证：从 Agent-RLVR 看代码 Agent 的自我改进之路" style="max-width:100%;border-radius:8px;margin:1rem 0;"></p><h2>什么是自闭环验证</h2>


    <blockquote>自闭环验证 = Agent 自己生成验证信号 → 驱动自我改进 → 形成无需人类参与的闭合优化回路。</blockquote>


    <p>传统软件开发验证链中，人是决策中枢：人类写代码 → 人类写测试 → CI 跑测试 → 人类看结果 → 人类决定怎么改。环是<strong>开的</strong>——人在环内做每步决策。</p>


    <p>自闭环验证则不同：Agent 生成代码 → Agent 生成测试 → 沙箱执行 → 验证器判定 → 反馈信号驱动 RL/反思 → Agent 自主改进生成策略。环是<strong>闭的</strong>——人类只在环外设定约束边界，不参与循环内部的决策。</p>


    <p>这个构想并非凭空而来。上一篇文章《<a href="https://harryfan1985.github.io/agent_blog/posts/rlvr-for-code-agents.html">RLVR for Code Agents</a>》剖析了 RLVR 的技术机制；本文将从 Agent-RLVR 的具体实践中，提炼出自闭环验证的<strong>八条核心启示</strong>。</p>


    <p>两者关系：<strong>自闭环验证是目标（What），RLVR 是实现它的训练范式（How）。</strong></p>


    <h2>启示一：可验证性决定闭环的天花板</h2>


    <p>最根本的约束：闭环能跑多远，取决于验证信号能覆盖多少正确性维度。</p>


    <ul>

    <li><strong>数学推理</strong>：答案对/错 → 二值信号 → 闭环充分</li>

    <li><strong>竞技编程</strong>：测试用例覆盖 → 多值信号 → 闭环较强</li>

    <li><strong>软件工程</strong>：功能正确 + 架构合理 + 安全 + 可维护 + 性能 → <strong>验证维度不可穷举</strong> → 闭环永远不完美</li>

    </ul>


    <p>Agent-RLVR 的 817 个 SWE 训练环境暴露了一个冷静的事实：即便精心设计的验证器，也仅覆盖了「patch 是否通过已有测试」。架构回归、安全漏洞、隐性 bug——全在闭环之外。</p>


    <p><strong>推论</strong>：自闭环验证系统必须明确声明验证边界。超出边界的正确性不能靠闭环保证——需要 Harness 的硬约束层兜底。正如 <a href="https://arxiv.org/abs/2503.18666">\tool</a> 的 DSL 运行时约束所示：闭环内可进化，闭环外不可绕过。</p>


    <h2>启示二：稀疏奖励让闭环在长周期任务中「饿死」</h2>


    <p>一次 SWE 修复可能涉及 5-15 轮工具调用。如果只在最终 patch 测试通过时给奖励，信号稀疏比高达 1:15——Agent 不知道哪一步做对了、哪一步做错了。RL 方差爆炸，收敛极慢。</p>


    <p>Agent-RLVR 的 <strong>Guidance Reward</strong> 给出了解法：把中间信号转化为额外的密集奖励：</p>


    <ul>

    <li>编译器错误 → 定位具体行号 → 引导 Agent 修复</li>

    <li>测试失败 → 显示期望值 vs 实际值 → 暗示修改方向</li>

    <li>补丁对比 → 与成功案例的差异 → 学习最优路径</li>

    </ul>


    <p>这让闭环从「最终考试定生死」变成了「每次作业都有反馈」。</p>


    <p><strong>推论</strong>：自闭环验证系统必须设计<strong>中间验证点</strong>。每个工具调用、每个文件编辑都应该有对应的验证信号——不一定精确，但必须有。信号密度是闭环收敛速度的第一序决定因素。</p>


    <h2>启示三：验证器和生成器必须协同进化</h2>


    <p>静态验证器的最大陷阱：</p>


    <pre><code>Agent 学会通过测试 → 但测试没变 → 闭环停止产生新信号 → 进化停滞</code></pre>


    <p><a href="https://arxiv.org/abs/2506.11442">ReVeal</a> 的核心洞察是：验证能力本身也需要通过 RL 训练。Agent 不仅要学会写代码，还要学会<strong>生成更好的测试</strong>、<strong>更准确地判断自己的输出是否正确</strong>。</p>


    <p>这形成了一个<strong>元闭环</strong>：生成能力进化（外层）↔ 验证能力进化（内层）→ 两层互相驱动。</p>


    <p><strong>推论</strong>：自闭环验证不是「先建好验证器，再训练 Agent」的线性流程。验证器本身必须是可进化的——通过对抗（Agent 试图绕过验证 → 验证器学习检测）、通过反思（为什么上次漏掉了这个 bug？）、通过生成（Agent 为已有代码生成更全面的测试）。</p>


    <h2>启示四：Credit Assignment 是闭环的灵魂</h2>


    <p>多轮软件工程任务中最关键的技术挑战不是「对不对」，而是「<strong>哪里开始错的</strong>」。15 步操作中，第 3 步的错误导致第 15 步的最终失败——如何让梯度信号精确指向第 3 步？</p>


    <p><a href="https://neurips.cc/virtual/2025/poster/118123">GiGPO</a>（NeurIPS 2025）的双层优势给出了一个优雅的方向：<strong>回溯性地</strong>从不同轨迹中挖掘步骤级信号：</p>


    <ul>

    <li><strong>Episode 级</strong>：这个 rollout 整体好不好？（宏观信号）</li>

    <li><strong>Step 级</strong>：在其他 rollout 中，当处于相同的环境状态（例如「都打开了同一个文件」）时，下一步做了什么？（微观信号）</li>

    </ul>


    <p>不需要人类标注每个步骤的奖励——系统自己从轨迹中挖掘。</p>


    <p><strong>推论</strong>：自闭环验证系统需要内置「事后归因」能力。当最终验证失败时，系统应该能回溯轨迹、定位失败点、把稀疏信号转化为可操作的步骤级反馈。这比设计更密集的奖励函数更重要。</p>


    <h2>启示五：「高效采样器」之争的深层含义</h2>


    <p>在上一篇文章中我们讨论了 Limit of RLVR 的核心发现：Base 模型的高 k 采样<strong>已经包含所有正确答案</strong>，RLVR 可能只是在压缩搜索空间。</p>


    <p>这对自闭环验证有直接推论：</p>


    <p><strong>如果 RLVR 只是压缩搜索空间</strong>：闭环的「改进」本质上是把模型已有的正确推理路径从「大海捞针」变成「唾手可得」。闭环没有创造新知识——它在<strong>压缩已有知识的搜索成本</strong>。</p>


    <p><strong>如果 RLVR 确实扩展了能力（SWE 场景更可能）</strong>：闭环通过结构化探索（guidance + 环境反馈）引导 Agent 进入 base 模型采样不到的区域。闭环真的在<strong>学习新东西</strong>。</p>


    <p><strong>推论</strong>：不能假设闭环一定会产生真正的能力增长。需要对照实验验证：闭环训练的 Agent 能否解决 base 模型通过任何采样策略都无法解决的问题？如果不能——闭环是压缩器，不是创造器。设计和评估自闭环系统时，必须区分这两种增益。</p>


    <h2>启示六：验证税的经济学约束</h2>


    <p>自闭环验证不是免费的。每轮训练需要：817 个环境 × G 个 rollout × 每次 15 轮工具调用 = <strong>数万次沙箱执行 + 测试运行</strong>。如果验证成本超过人工审核成本，闭环就失去了经济意义。</p>


    <p><strong>推论</strong>：自闭环验证需要「验证预算分配」策略：</p>


    <ul>

    <li><strong>简单任务轻验证</strong>：快速通过，低成本</li>

    <li><strong>高风险任务重验证</strong>：多维度检查，高投入</li>

    <li><strong>可疑结果深度验证</strong>：多轮交叉验证</li>

    </ul>


    <p>静态的「所有输出同样严格验证」在经济上不可持续。验证预算的智能分配是闭环工程化的关键设计维度。</p>


    <h2>启示七：验证信号的多样性是鲁棒性的来源</h2>


    <p>单一验证器 = 单点故障。Agent 学会绕过某一类验证（比如只通过单元测试但引入安全漏洞）后，闭环会<strong>强化</strong>这种行为——因为验证器给了奖励。</p>


    <p><a href="https://docs.nvidia.com/nemotron/latest/nemotron/super3/rl/rlvr.html">Nemotron 3 Super</a> 的多环境 RLVR 提供了方向：21 个环境 × 37 个数据集联合训练，覆盖数学、代码、安全、指令遵循、Agentic 任务——不同验证器互相制衡。</p>


    <p><strong>推论</strong>：自闭环验证需要<strong>对抗性验证多样性</strong>：</p>


    <ul>

    <li>单元测试（功能正确性）</li>

    <li>集成测试（组件交互）</li>

    <li>静态分析（安全漏洞、代码规范）</li>

    <li>行为测试（特定场景下的行为）</li>

    <li>对抗测试（刻意构造的边界情况）</li>

    <li>性能回归（不退化）</li>

    </ul>


    <p>维度越多，Agent 对单一指标的过拟合越难。</p>


    <h2>启示八：闭环的安全边界不可绕过</h2>


    <p>一个完全自主的闭环系统，如果验证器被欺骗，可能进入<strong>「自我强化错误」</strong>的恶性循环：</p>


    <pre><code>Agent 学会写「通过测试但实际错误」的代码

    → 验证器给了奖励

    → Agent 更擅长写这种代码

    → 循环加剧

    → 错误被固化进策略</code></pre>


    <p>这要求自闭环验证必须采用<strong>双层架构</strong>：</p>


    <ul>

    <li><strong>内层（闭环）</strong>：可进化、可学习的验证器——灵活但可被欺骗</li>

    <li><strong>外层（Harness）</strong>：不可绕过的安全/正确性硬约束——精简但不可变</li>

    </ul>


    <p>外层约束来自 Harness Engineering 的设计原则：规则即代码比自然语言指令更可靠。正如 Anthropic 在 2026 Agentic Coding Trends Report 中指出的：Agentic quality control becomes standard —— 但 quality control 本身需要对抗性思维。</p>


    <h2>成熟度阶梯：自闭环验证还有多远</h2>


    <table>

    <tr><th>层级</th><th>能力</th><th>当前状态</th><th>代表工作</th></tr>

    <tr><td><strong>L1</strong></td><td>测试驱动修复</td><td>✅ 已产品化</td><td>Claude Code, Codex CLI</td></tr>

    <tr><td><strong>L2</strong></td><td>自主测试生成</td><td>⚠️ 正在成熟</td><td>SAGA, TCGBench (NeurIPS 2025)</td></tr>

    <tr><td><strong>L3</strong></td><td>生成-验证协同进化</td><td>🔬 研究阶段</td><td>ReVeal (2025)</td></tr>

    <tr><td><strong>L4</strong></td><td>多轮信用分配</td><td>🔬 早期研究</td><td>GiGPO, μCODE (2025)</td></tr>

    <tr><td><strong>L5</strong></td><td><strong>完全自闭环</strong></td><td>❌ 未实现</td><td>——</td></tr>

    </table>


    <p>当前前沿在 L3-L4。L5 需要同时解决：验证器质量天花板、验证多样性、信用分配、安全约束——所有组件在一个闭环中协同工作，且<strong>验证器本身能自主进化</strong>。</p>


    <h2>核心张力</h2>


    <blockquote>闭环越封闭 → 越依赖验证器质量 → 验证器质量依赖人类设计 → 人类仍然在环外。

    <br><br>

    真正的自闭环需要打破这个悖论：让验证器本身进入进化循环。这是下一代 Harness Engineering 的核心命题。</blockquote>


    <p>Code Agent 的自闭环验证不仅仅是工程优化——它是 Agent 基础设施从「人类监督自动化」到「真正自主进化」的转折点。八条启示中，每一条都是一个开放研究问题。谁先系统性地回答这些问题，谁就能率先构建真正自我改进的代码 Agent 系统。</p>


    <h2>参考</h2>


    <ul>

    <li>《RLVR for Code Agents：当强化学习学会「自己批改作业」》— harryfan1985.github.io/agent_blog (2026)</li>

    <li>Agent-RLVR: Training Software Engineering Agents via Guidance and Environment Rewards — arXiv:2506.11425, Scale AI (2025)</li>

    <li>ReVeal: Self-Evolving Code Agents via Reliable Self-Verification — arXiv:2506.11442 (2025)</li>

    <li>GiGPO: Group-in-Group Policy Optimization for LLM Agent Training — NeurIPS 2025</li>

    <li>μCODE: Multi-Turn Code Generation Through Single-Step Rewards — ICML 2025</li>

    <li>Limit of RLVR — NeurIPS 2025, limit-of-rlvr.github.io</li>

    <li>\tool: Customizable Runtime Enforcement for Safe and Reliable LLM Agents — arXiv:2503.18666</li>

    <li>Nemotron 3 Super: Multi-Environment RLVR — NVIDIA Docs (2025)</li>

    <li>SAGA + TCGBench: Rethinking Verification for LLM Code Generation — NeurIPS 2025</li>

    <li>2026 Agentic Coding Trends Report — Anthropic (2026)</li>

    </ul>


    <h2>技术声明</h2>


    <p>本文为基于 Agent-RLVR 及相关研究的推断性分析。五级成熟度阶梯为本文提出的评估框架，非已有学术共识。「闭环是压缩器还是创造器」的二分法基于 Limit of RLVR 的实验发现推断至 SWE 场景，这一推论（⚠️）有待专门对照实验验证。自闭环验证的「双层架构」设计原则综合了 Harness Engineering 范式与 \tool 等运行时约束工作。GiGPO 和 μCODE
    的机制描述基于各自论文的公开摘要。所有实验数据（9.4%→22.4% 等）均来自原始论文。</p>

